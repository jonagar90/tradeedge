<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TradeEdge AI — Test Harness</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  body{background:#060606;color:#e8e8e8;font-family:'JetBrains Mono',ui-monospace,monospace;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#0d0d0d;}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;}
  table{border-collapse:collapse;width:100%;}

  input[type=number]{-moz-appearance:textfield;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useReducer,useMemo,useCallback} = React;
const {LineChart,Line,XAxis,YAxis,Tooltip,ResponsiveContainer,ReferenceLine,AreaChart,Area} = Recharts;

const PROXY = "https://alpaca-proxy.jonagar90.workers.dev";
const BASELINES = {AAPL:225.4,TSLA:248.1,NVDA:138.7,MSFT:422.8,AMZN:198.3,META:575.6,GOOGL:178.9,NFLX:712.4};
const TICKERS = Object.keys(BASELINES);

const DEFAULT_SETTINGS = {
  startingBalance:10000, sizePresets:[10,25,50,100],
  pollMs:15000, stockTickMs:3000, signalIntervalMs:15000,
  tpPct:4, slPct:2, longBiasPct:100, stockVolPct:0.15, assertTolerancePct:0.5,
  dailyLossLimit:200, rsiMin:60, rsiMax:80, volumeMultiplier:1.5,
  noEntryAfterHour:11, noEntryAfterMin:30, forceCloseHour:15, forceCloseMin:45,
};
const STARTING_BALANCE = DEFAULT_SETTINGS.startingBalance;

const fmt=(n,d=2)=>n===null||n===undefined||Number.isNaN(n)?"—":Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=(n,d=2)=>n===null||n===undefined?"—":`${n>=0?"+":""}${n.toFixed(d)}%`;
const nowIso=()=>new Date().toISOString();
const shortTime=iso=>iso?new Date(iso).toLocaleTimeString(undefined,{hour12:false}):"—";
const randn=()=>{let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};

/* ---- EST time helpers ---- */
const getEST=()=>{
  const now=new Date();
  // UTC-4 (EDT) approximation
  const estMs=now.getTime()-(4*3600000);
  const est=new Date(estMs);
  return{h:est.getUTCHours(),m:est.getUTCMinutes(),minsFromOpen:(est.getUTCHours()-9)*60+(est.getUTCMinutes()-30)};
};

/* ---- ORB / VWAP / RSI per ticker ---- */
const makeOrbState=()=>({orbHigh:null,orbLow:null,orbVolSum:0,orbBarCount:0,orbComplete:false,priceHistory:[],volumeHistory:[],vwapNum:0,vwapDen:0,vwap:null});
const orbState={};
for(const t of [...TICKERS,"BTC"]) orbState[t]=makeOrbState();

function updateOrbVwap(ticker,price,volume=100){
  const s=orbState[ticker];
  const {minsFromOpen}=getEST();
  s.vwapNum+=price*volume; s.vwapDen+=volume;
  s.vwap=s.vwapDen>0?s.vwapNum/s.vwapDen:price;
  s.priceHistory.push(price); if(s.priceHistory.length>20)s.priceHistory.shift();
  s.volumeHistory.push(volume); if(s.volumeHistory.length>20)s.volumeHistory.shift();
  if(minsFromOpen>=0&&minsFromOpen<30){
    s.orbHigh=s.orbHigh===null?price:Math.max(s.orbHigh,price);
    s.orbLow=s.orbLow===null?price:Math.min(s.orbLow,price);
    s.orbVolSum+=volume; s.orbBarCount++; s.orbComplete=false;
  } else if(minsFromOpen>=30){
    s.orbComplete=true;
  }
}

function calcRSI(prices){
  if(prices.length<2)return 50;
  let gains=0,losses=0;
  for(let i=1;i<prices.length;i++){const d=prices[i]-prices[i-1];if(d>0)gains+=d;else losses+=Math.abs(d);}
  const n=prices.length-1;
  const rs=(gains/n)/Math.max(losses/n,0.0001);
  return 100-(100/(1+rs));
}

function checkEntry(ticker,price,settings){
  const s=orbState[ticker];
  const {minsFromOpen,h,m}=getEST();
  // Time filter
  if(minsFromOpen<0) return{pass:false,reason:"Market not open yet"};
  // In simulation mode (outside market hours) bypass ORB requirement
  const simMode=minsFromOpen<0||minsFromOpen>390;
  if(!simMode){
    if(!s.orbComplete||s.orbHigh===null) return{pass:false,reason:"ORB not complete (wait 30 min)"};
    if(price<=s.orbHigh) return{pass:false,reason:`Below ORB high $${s.orbHigh.toFixed(2)}`};
    const avgOrbVol=s.orbBarCount>0?s.orbVolSum/s.orbBarCount:0;
    const curVol=s.volumeHistory[s.volumeHistory.length-1]||0;
    const volRatio=avgOrbVol>0?curVol/avgOrbVol:0;
    if(volRatio<settings.volumeMultiplier) return{pass:false,reason:`Vol ${volRatio.toFixed(2)}x < ${settings.volumeMultiplier}x`};
    if(s.vwap&&price<s.vwap) return{pass:false,reason:`Below VWAP $${s.vwap.toFixed(2)}`};
  }
  const rsi=calcRSI(s.priceHistory);
  if(rsi<settings.rsiMin||rsi>settings.rsiMax) return{pass:false,reason:`RSI ${rsi.toFixed(0)} outside ${settings.rsiMin}-${settings.rsiMax}`};
  const volRatio=simMode?1.5+(Math.random()*0.5):((s.volumeHistory[s.volumeHistory.length-1]||0)/(s.orbVolSum/Math.max(s.orbBarCount,1)));
  return{pass:true,rsi,volRatio,vwap:s.vwap||price,orbHigh:s.orbHigh||price};
}

function calcPositionSize(balance,entryPrice,slPct){
  const risk=balance*0.01;
  const slDist=entryPrice*(slPct/100);
  const notional=Math.max(10,(risk/slDist)*entryPrice);
  return Math.min(notional,balance*0.2); // cap at 20% of balance
}

const makeSignal=(ticker,price,settings,balance)=>{
  const check=checkEntry(ticker,price,settings);
  const rsi=calcRSI(orbState[ticker].priceHistory);
  const vwap=orbState[ticker].vwap||price;
  const notional=calcPositionSize(balance,price,settings.slPct);
  const tp=price*(1+settings.tpPct/100);
  const sl=price*(1-settings.slPct/100);
  return{id:`${ticker}-${Date.now()}-${Math.floor(Math.random()*1e4)}`,ticker,direction:"LONG",entry:price,tp,sl,tpPct:settings.tpPct,slPct:settings.slPct,rsi,vwap,orbHigh:orbState[ticker].orbHigh||price,volRatio:check.volRatio||0,entryCondition:check,notional,createdAt:nowIso()};
};

/* ---- Alpaca ---- */
const aHeaders=c=>({"APCA-API-KEY-ID":c.keyId,"APCA-API-SECRET-KEY":c.secret,"Content-Type":"application/json"});
async function aGet(path,creds,data=false){
  const base=data?`${PROXY}/data`:`${PROXY}`;
  const r=await fetch(`${base}${path}`,{headers:aHeaders(creds)});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);}
  return r.json();
}
async function aPost(path,body,creds){
  const r=await fetch(`${PROXY}${path}`,{method:"POST",headers:aHeaders(creds),body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,200)}`);}
  return r.json();
}
const alpaca={
  getAccount:c=>aGet("/v2/account",c),
  getPositions:c=>aGet("/v2/positions",c),
  getLatestTrades:async(syms,c)=>{if(!syms.length)return{};const r=await aGet(`/v2/stocks/trades/latest?symbols=${syms.join(",")}&feed=iex`,c,true);return r?.trades||{};},
  placeOrder:({symbol,notional,side},c)=>aPost("/v2/orders",{symbol,notional:notional.toFixed(2),side,type:"market",time_in_force:"day"},c),
  closePosition:(sym,c)=>fetch(`${PROXY}/v2/positions/${sym}`,{method:"DELETE",headers:aHeaders(c)}).then(async r=>{if(!r.ok&&r.status!==404){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);}return r.status===404?null:r.json();}),
};

/* ---- Reducer ---- */
const initialState={balance:STARTING_BALANCE,openTrades:[],closedTrades:[],equity:[{t:Date.now(),v:STARTING_BALANCE}]};
function tradesReducer(state,action){
  switch(action.type){
    case"OPEN":if(state.openTrades.some(o=>o.ticker===action.trade.ticker))return state;return{...state,openTrades:[...state.openTrades,action.trade]};
    case"CLOSE":{
      const{tradeId,closePrice,reason,t,tolerance=0.5}=action;
      const trade=state.openTrades.find(o=>o.id===tradeId);if(!trade)return state;
      const pnlPct=trade.direction==="LONG"?((closePrice-trade.entry)/trade.entry)*100:((trade.entry-closePrice)/trade.entry)*100;
      const pnl=(pnlPct/100)*trade.size;
      let assertion;
      if(reason==="TP")assertion={expected:`+${trade.tpPct.toFixed(2)}%`,actual:`${pnlPct.toFixed(2)}%`,pass:Math.abs(pnlPct-trade.tpPct)<tolerance};
      else if(reason==="SL"||reason==="VWAP")assertion={expected:`-${trade.slPct.toFixed(2)}%`,actual:`${pnlPct.toFixed(2)}%`,pass:Math.abs(pnlPct+trade.slPct)<tolerance+1};
      else assertion={expected:"manual",actual:`${pnlPct.toFixed(2)}%`,pass:true};
      const newBalance=state.balance+pnl;
      const closed={...trade,closedAt:nowIso(),closePrice,reason,pnl,pnlPct,holdMs:t-new Date(trade.openedAt).getTime(),assertion};
      return{...state,balance:newBalance,openTrades:state.openTrades.filter(o=>o.id!==tradeId),closedTrades:[closed,...state.closedTrades],equity:[...state.equity,{t,v:newBalance}]};
    }
    case"RESET":return{...initialState,equity:[{t:Date.now(),v:STARTING_BALANCE}]};
    default:return state;
  }
}

/* ======= APP ======= */
function App(){
  const [running,setRunning]=useState(false);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [signals,setSignals]=useState([]);
  const [trades,dispatch]=useReducer(tradesReducer,initialState);
  const [dailyLoss,setDailyLoss]=useState(0);
  const [circuitBreaker,setCircuitBreaker]=useState(false);
  const [scanLog,setScanLog]=useState([]); // rejected scan reasons

  const [creds,setCreds]=useState({keyId:"",secret:""});
  const [execMode,setExecMode]=useState("simulated");
  const [connStatus,setConnStatus]=useState({state:"disconnected",message:""});
  const [alpacaAccount,setAlpacaAccount]=useState(null);
  const [alpacaPositions,setAlpacaPositions]=useState([]);
  const [alpacaErrors,setAlpacaErrors]=useState([]);

  const [btcPrice,setBtcPrice]=useState(null);
  const [btcSeries,setBtcSeries]=useState([]);
  const [btcLastFetch,setBtcLastFetch]=useState(null);
  const [btcError,setBtcError]=useState(null);
  const [btcErrors,setBtcErrors]=useState(0);
  const [btcPolls,setBtcPolls]=useState(0);
  const [btcSource,setBtcSource]=useState(null);
  const [stale,setStale]=useState(false);
  const [stockPrices,setStockPrices]=useState(()=>Object.fromEntries(TICKERS.map(t=>[t,BASELINES[t]])));

  const settingsRef=useRef(settings);useEffect(()=>{settingsRef.current=settings;},[settings]);
  const credsRef=useRef(creds);useEffect(()=>{credsRef.current=creds;},[creds]);
  const modeRef=useRef(execMode);useEffect(()=>{modeRef.current=execMode;},[execMode]);
  const priceRef=useRef({BTC:null,...stockPrices});
  const tradesRef=useRef(trades);
  const dailyLossRef=useRef(0);
  useEffect(()=>{priceRef.current={BTC:btcPrice,...stockPrices};},[btcPrice,stockPrices]);
  useEffect(()=>{tradesRef.current=trades;},[trades]);
  useEffect(()=>{dailyLossRef.current=dailyLoss;},[dailyLoss]);

  // Reset daily loss + circuit breaker at 9:30am EST each day
  useEffect(()=>{
    const id=setInterval(()=>{
      const {h,m}=getEST();
      if(h===9&&m===30){setDailyLoss(0);setCircuitBreaker(false);}
    },60000);
    return()=>clearInterval(id);
  },[]);

  // Force close all positions at 3:45pm EST
  useEffect(()=>{
    const id=setInterval(()=>{
      const {h,m}=getEST();
      const s=settingsRef.current;
      if(h===s.forceCloseHour&&m===s.forceCloseMin){
        const open=tradesRef.current.openTrades;
        const now=Date.now();
        for(const trade of open){
          const px=priceRef.current[trade.ticker]??trade.entry;
          dispatch({type:"CLOSE",tradeId:trade.id,closePrice:px,reason:"EOD",t:now,tolerance:10});
        }
      }
    },30000);
    return()=>clearInterval(id);
  },[]);

  const testConnection=async()=>{
    if(!creds.keyId||!creds.secret){setConnStatus({state:"error",message:"paste API Key ID and Secret first"});return;}
    setConnStatus({state:"testing",message:"calling /v2/account…"});
    try{const acct=await alpaca.getAccount(creds);setAlpacaAccount(acct);setConnStatus({state:"connected",message:`${acct.account_number} · $${Number(acct.buying_power).toLocaleString()} bp`});}
    catch(e){setConnStatus({state:"error",message:String(e.message||e)});setAlpacaAccount(null);}
  };

  useEffect(()=>{
    if(connStatus.state!=="connected")return;
    let cancelled=false;
    const refresh=async()=>{try{const[acct,pos]=await Promise.all([alpaca.getAccount(credsRef.current),alpaca.getPositions(credsRef.current)]);if(cancelled)return;setAlpacaAccount(acct);setAlpacaPositions(pos);}catch(e){if(!cancelled)setAlpacaErrors(p=>[{t:Date.now(),msg:`refresh: ${e.message||e}`},...p.slice(0,9)]);}};
    refresh();const id=setInterval(refresh,10000);return()=>{cancelled=true;clearInterval(id);};
  },[connStatus.state]);

  useEffect(()=>{
    if(connStatus.state!=="connected")return;
    let cancelled=false;
    const pull=async()=>{
      try{
        const t=await alpaca.getLatestTrades(TICKERS,credsRef.current);
        if(cancelled)return;
        setStockPrices(prev=>{
          const next={...prev};
          for(const sym of TICKERS){const p=t[sym]?.p;if(typeof p==="number"&&p>0){next[sym]=p;updateOrbVwap(sym,p,t[sym]?.s||100);}}
          return next;
        });
      }catch(e){if(!cancelled)setAlpacaErrors(p=>[{t:Date.now(),msg:`quotes: ${e.message||e}`},...p.slice(0,9)]);}
    };
    pull();const id=setInterval(pull,5000);return()=>{cancelled=true;clearInterval(id);};
  },[connStatus.state]);

  // BTC poll
  useEffect(()=>{
    let cancelled=false;
    const providers=[
      {name:"Coinbase",fetch:async()=>{const r=await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=Number(j?.data?.amount);if(!p||isNaN(p))throw new Error("bad");return p;}},
      {name:"CoinGecko",fetch:async()=>{const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=j?.bitcoin?.usd;if(!p)throw new Error("bad");return p;}},
      {name:"Binance",fetch:async()=>{const r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=Number(j?.price);if(!p||isNaN(p))throw new Error("bad");return p;}},
    ];
    async function poll(){
      const errs=[];
      for(const prov of providers){
        try{const p=await prov.fetch();if(cancelled)return;const t=Date.now();setBtcPrice(p);setBtcLastFetch(t);setBtcSource(prov.name);setBtcError(null);setBtcSeries(prev=>{const next=[...prev,{t,p}];return next.filter(x=>x.t>=t-3600000);});setBtcPolls(n=>n+1);updateOrbVwap("BTC",p);return;}
        catch(e){errs.push(`${prov.name}: ${e.message}`);}
      }
      if(!cancelled){setBtcError(errs.join(" · "));setBtcErrors(n=>n+1);setBtcSource(null);}
    }
    poll();const id=setInterval(poll,settings.pollMs);return()=>{cancelled=true;clearInterval(id);};
  },[settings.pollMs]);

  useEffect(()=>{const id=setInterval(()=>{if(btcLastFetch)setStale(Date.now()-btcLastFetch>settingsRef.current.pollMs*2);},2000);return()=>clearInterval(id);},[btcLastFetch]);

  // Simulated stock ticks
  useEffect(()=>{
    if(connStatus.state==="connected")return;
    const id=setInterval(()=>{
      const vol=settingsRef.current.stockVolPct/100;
      setStockPrices(prev=>{
        const next={...prev};
        for(const t of TICKERS){
          const b=BASELINES[t];
          const newPx=Math.max(0.01,prev[t]+(b-prev[t])*0.02+randn()*b*vol);
          next[t]=newPx;
          updateOrbVwap(t,newPx,Math.floor(500+Math.random()*1500));
        }
        return next;
      });
    },settings.stockTickMs);
    return()=>clearInterval(id);
  },[settings.stockTickMs,connStatus.state]);

  // SL / TP / VWAP exit check
  useEffect(()=>{
    const open=tradesRef.current.openTrades;if(!open.length)return;
    const now=Date.now(),tol=settingsRef.current.assertTolerancePct;
    for(const trade of open){
      const px=priceRef.current[trade.ticker];if(!px)continue;
      let hit=null;
      if(px>=trade.tp)hit="TP";
      else if(px<=trade.sl)hit="SL";
      else if(trade.vwap&&px<trade.vwap)hit="VWAP"; // VWAP stop
      if(hit){
        const closePrice=hit==="TP"?trade.tp:px;
        if(trade.alpacaOrderId&&modeRef.current==="alpaca"&&trade.ticker!=="BTC")
          alpaca.closePosition(trade.ticker,credsRef.current).catch(e=>setAlpacaErrors(p=>[{t:Date.now(),msg:`close ${trade.ticker}: ${e.message||e}`},...p.slice(0,9)]));
        // Track daily loss for circuit breaker
        if(hit==="SL"||hit==="VWAP"){
          const lossDollar=Math.abs((closePrice-trade.entry)/trade.entry*trade.size);
          setDailyLoss(d=>{
            const newLoss=d+lossDollar;
            if(newLoss>=settingsRef.current.dailyLossLimit)setCircuitBreaker(true);
            return newLoss;
          });
        }
        dispatch({type:"CLOSE",tradeId:trade.id,closePrice,reason:hit,t:now,tolerance:tol});
      }
    }
  },[btcPrice,stockPrices]);

  // Signal / entry loop
  useEffect(()=>{
    if(!running)return;
    const fire=async()=>{
      if(circuitBreaker){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:"🚨 Circuit breaker active — daily loss limit reached"},...p.slice(0,29)]);return;}
      const open=new Set(tradesRef.current.openTrades.map(t=>t.ticker));
      const balance=tradesRef.current.balance;
      const candidates=[...TICKERS].filter(t=>!open.has(t)); // BTC excluded — LONG only on stocks
      if(!candidates.length)return;
      const ticker=candidates[Math.floor(Math.random()*candidates.length)];
      const px=priceRef.current[ticker];if(!px)return;
      const sig=makeSignal(ticker,px,settingsRef.current,balance);
      if(!sig.entryCondition.pass){
        setScanLog(p=>[{t:nowIso(),ticker,reason:sig.entryCondition.reason},...p.slice(0,29)]);
        return;
      }
      setSignals(s=>[sig,...s].slice(0,50));
      let alpacaOrderId=null;
      if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
        try{
          const order=await alpaca.placeOrder({symbol:ticker,notional:sig.notional,side:"buy"},credsRef.current);
          alpacaOrderId=order.id;
        }catch(e){
          setAlpacaErrors(p=>[{t:Date.now(),msg:`order ${ticker}: ${e.message||e}`},...p.slice(0,9)]);
          return;
        }
      }
      dispatch({type:"OPEN",trade:{id:`t-${sig.id}`,signalId:sig.id,ticker,direction:"LONG",entry:sig.entry,tp:sig.tp,sl:sig.sl,slPct:sig.slPct,tpPct:sig.tpPct,size:sig.notional,vwap:sig.vwap,openedAt:nowIso(),openPrice:px,alpacaOrderId}});
    };
    fire();const id=setInterval(fire,settings.signalIntervalMs);return()=>clearInterval(id);
  },[running,settings.signalIntervalMs,connStatus.state,circuitBreaker]);

  const stats=useMemo(()=>{
    const closed=trades.closedTrades;
    const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<0);
    const winRate=closed.length?(wins.length/closed.length)*100:0;
    const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnlPct,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((a,b)=>a+b.pnlPct,0)/losses.length:0;
    const avgRR=wins.length&&losses.length?avgWin/Math.abs(avgLoss):null;
    const avgHold=closed.length?closed.reduce((a,b)=>a+b.holdMs,0)/closed.length/1000:0;
    let peak=-Infinity,maxDD=0;
    for(const p of trades.equity){if(p.v>peak)peak=p.v;const dd=((p.v-peak)/peak)*100;if(dd<maxDD)maxDD=dd;}
    const passed=closed.filter(t=>t.assertion?.pass).length;
    return{total:closed.length,open:trades.openTrades.length,winRate,avgRR,avgHoldSec:avgHold,maxDD,pnl:trades.balance-STARTING_BALANCE,pnlPct:((trades.balance-STARTING_BALANCE)/STARTING_BALANCE)*100,assertionsPassed:passed,assertionsTotal:closed.length};
  },[trades]);

  const btcDelta=useMemo(()=>{if(btcSeries.length<2)return null;const f=btcSeries[0].p,l=btcSeries[btcSeries.length-1].p;return{abs:l-f,pct:((l-f)/f)*100};},[btcSeries]);

  const manualClose=(trade)=>{
    const px=priceRef.current[trade.ticker]??trade.entry;
    if(trade.alpacaOrderId&&modeRef.current==="alpaca"&&trade.ticker!=="BTC")
      alpaca.closePosition(trade.ticker,credsRef.current).catch(e=>setAlpacaErrors(p=>[{t:Date.now(),msg:`close ${trade.ticker}: ${e.message||e}`},...p.slice(0,9)]));
    dispatch({type:"CLOSE",tradeId:trade.id,closePrice:px,reason:"MANUAL",t:Date.now(),tolerance:settingsRef.current.assertTolerancePct});
  };

  const S=styles;
  const estNow=getEST();

  return(
    <div style={S.shell}>
      <header style={S.header}>
        <div style={S.brand}><span style={S.brandDot}/><span style={S.brandText}>TRADEEDGE</span><span style={S.brandSub}>// ORB MOMENTUM</span></div>
        <div style={S.headerRight}>
          {circuitBreaker&&<div style={{...S.pill,borderColor:"#FF7A7A",color:"#FF7A7A"}}><span style={{...S.pillDot,background:"#FF7A7A"}}/>🚨 CIRCUIT BREAKER</div>}
          <div style={{...S.pill,borderColor:"#5a5a5a",color:"#5a5a5a"}}>EST {String(estNow.h).padStart(2,"0")}:{String(estNow.m).padStart(2,"0")}</div>
          <AlpacaPill connStatus={connStatus} mode={execMode}/>
          <StatusPill running={running} stale={stale} btcError={btcError}/>
          <button onClick={()=>setRunning(r=>!r)} style={{...S.runBtn,...(running?S.runBtnStop:{})}}>{running?"■ STOP":"▶ START"}</button>
          <button onClick={()=>setSettingsOpen(o=>!o)} style={{...S.resetBtn,...(settingsOpen?{borderColor:"#FFB627",color:"#FFB627"}:{})}}>⚙ SETTINGS</button>
          <button onClick={()=>{dispatch({type:"RESET"});setSignals([]);setDailyLoss(0);setCircuitBreaker(false);setScanLog([]);}} style={S.resetBtn}>RESET</button>
        </div>
      </header>

      {settingsOpen&&<SettingsDrawer settings={settings} onChange={setSettings} onReset={()=>setSettings(DEFAULT_SETTINGS)} onClose={()=>setSettingsOpen(false)} creds={creds} onCredsChange={setCreds} connStatus={connStatus} onTest={testConnection} execMode={execMode} onModeChange={setExecMode} alpacaAccount={alpacaAccount} alpacaErrors={alpacaErrors} dailyLoss={dailyLoss} circuitBreaker={circuitBreaker}/>}

      {/* BTC + stats */}
      <section style={S.row}>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardHead}>
            <div><div style={S.cardLabel}>LIVE FEED — BTC/USD</div>
              <div style={S.cardBigNum}>${btcPrice?fmt(btcPrice,2):"—"} {btcDelta&&<span style={{...S.delta,color:btcDelta.abs>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(btcDelta.pct)} since open</span>}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,auto)",gap:16}}>
              <Diag label="SOURCE" value={btcSource||"—"} bad={!btcSource}/>
              <Diag label="LAST POLL" value={btcLastFetch?shortTime(new Date(btcLastFetch).toISOString()):"—"}/>
              <Diag label="POLLS" value={btcPolls}/>
              <Diag label="ERRORS" value={btcErrors} bad={btcErrors>0}/>
              <Diag label="CADENCE" value={`${settings.pollMs/1000}s`}/>
            </div>
          </div>
          <div style={{height:200,marginTop:12}}>
            <ResponsiveContainer>
              <AreaChart data={btcSeries} margin={{top:6,right:10,left:0,bottom:0}}>
                <defs><linearGradient id="btcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFB627" stopOpacity={0.4}/><stop offset="100%" stopColor="#FFB627" stopOpacity={0}/></linearGradient></defs>
                <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
                <YAxis domain={["auto","auto"]} stroke="#5a5a5a" fontSize={10} tickFormatter={v=>`$${(v/1000).toFixed(1)}k`}/>
                <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"BTC"]}/>
                <Area type="monotone" dataKey="p" stroke="#FFB627" strokeWidth={1.5} fill="url(#btcg)" isAnimationActive={false}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
          {btcError&&<div style={S.errorBar}>ALL PROVIDERS FAILED · retry in {settings.pollMs/1000}s</div>}
          {stale&&!btcError&&<div style={S.warnBar}>⚠ STALE — no fresh tick</div>}
        </div>

        <div style={{...S.card,flex:1,minWidth:260}}>
          <div style={S.cardLabel}>RUN STATS</div>
          <div style={S.bigEquity}>${fmt(trades.balance,2)} <span style={{color:stats.pnl>=0?"#7CFFB2":"#FF7A7A",fontSize:13}}>{fmtPct(stats.pnlPct)}</span></div>
          <div style={S.statGrid}>
            <Stat label="TRADES" v={`${stats.total}`}/><Stat label="OPEN" v={`${stats.open}`}/>
            <Stat label="WIN RATE" v={`${stats.winRate.toFixed(1)}%`}/><Stat label="AVG R:R" v={stats.avgRR?stats.avgRR.toFixed(2):"—"}/>
            <Stat label="MAX DD" v={`${stats.maxDD.toFixed(2)}%`} bad={stats.maxDD<-2}/><Stat label="AVG HOLD" v={`${stats.avgHoldSec.toFixed(0)}s`}/>
          </div>
          <div style={{marginTop:12,background:"#060606",border:"1px solid #1a1a1a",padding:"10px 12px",borderRadius:2}}>
            <div style={S.cardLabel}>DAILY LOSS TRACKER</div>
            <div style={{fontSize:18,fontWeight:500,color:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#e8e8e8",marginTop:4}}>
              -${fmt(dailyLoss,2)} <span style={{fontSize:10,color:"#5a5a5a"}}>/ ${settings.dailyLossLimit} limit</span>
            </div>
            <div style={{marginTop:6,height:4,background:"#1a1a1a",borderRadius:2}}>
              <div style={{height:"100%",width:`${Math.min(100,(dailyLoss/settings.dailyLossLimit)*100)}%`,background:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#7CFFB2",borderRadius:2,transition:"width 0.3s"}}/>
            </div>
          </div>
          <div style={{marginTop:10}}>
            <div style={S.cardLabel}>ASSERTIONS</div>
            <div style={S.assertSummary}><span style={{color:"#7CFFB2"}}>{stats.assertionsPassed}</span><span style={{color:"#5a5a5a"}}> / </span><span>{stats.assertionsTotal}</span><span style={{fontSize:10,color:"#5a5a5a",marginLeft:6}}>exits verified</span></div>
          </div>
        </div>
      </section>

      {connStatus.state==="connected"&&alpacaAccount&&<AlpacaAccountCard account={alpacaAccount} positions={alpacaPositions} mode={execMode} errors={alpacaErrors}/>}

      {/* Equity curve */}
      <section style={S.card}>
        <div style={S.cardLabel}>EQUITY CURVE</div>
        <div style={{height:120,marginTop:8}}>
          <ResponsiveContainer>
            <LineChart data={trades.equity} margin={{top:8,right:10,left:0,bottom:0}}>
              <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
              <YAxis stroke="#5a5a5a" fontSize={10} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"Equity"]}/>
              <ReferenceLine y={STARTING_BALANCE} stroke="#3a3a3a" strokeDasharray="3 3"/>
              <Line type="monotone" dataKey="v" stroke="#7CFFB2" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </section>

      {/* Ticker grid */}
      <section style={S.card}>
        <div style={S.cardLabel}>TICKERS {connStatus.state==="connected"?"(Alpaca IEX · 5s)":"(simulated)"} — ORB · VWAP · RSI</div>
        <div style={S.tickerGrid}>
          {TICKERS.map(t=>{
            const px=stockPrices[t],b=BASELINES[t],drift=((px-b)/b)*100;
            const ob=orbState[t],rsi=calcRSI(ob.priceHistory);
            const aboveVwap=ob.vwap&&px>ob.vwap;
            const aboveOrb=ob.orbHigh&&px>ob.orbHigh;
            const ot=trades.openTrades.find(o=>o.ticker===t);
            return(
              <div key={t} style={{...S.tickerCell,...(aboveOrb&&aboveVwap?{borderColor:"#FFB627"}:{})}}>
                <div style={S.tickerSym}>{t}</div>
                <div style={S.tickerPx}>${fmt(px,2)}</div>
                <div style={{fontSize:9,color:"#5a5a5a",marginTop:2}}>RSI {rsi.toFixed(0)} · {ob.vwap?`VWAP $${fmt(ob.vwap,2)}`:"no VWAP"}</div>
                <div style={{fontSize:9,marginTop:1,color:aboveOrb?"#FFB627":"#3a3a3a"}}>{ob.orbHigh?`ORB $${fmt(ob.orbHigh,2)}`:"no ORB"} {aboveOrb?"↑":""}</div>
                {ot&&<div style={S.tickerBadge}>{ot.direction} · ${fmt(ot.size,0)}</div>}
              </div>
            );
          })}
        </div>
      </section>

      {/* Open + closed */}
      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>OPEN POSITIONS ({trades.openTrades.length})</div>
          {!trades.openTrades.length?<div style={S.empty}>{running?"scanning for ORB breakouts…":"press START to begin"}</div>:(
            <table style={S.table}>
              <thead><tr><th style={S.th}>SYM</th><th style={S.thR}>ENTRY</th><th style={S.thR}>NOW</th><th style={S.thR}>TP</th><th style={S.thR}>SL</th><th style={S.thR}>VWAP</th><th style={S.thR}>UPL</th><th style={S.th}></th></tr></thead>
              <tbody>{trades.openTrades.map(o=>{
                const px=priceRef.current[o.ticker]??o.entry;
                const upl=((px-o.entry)/o.entry)*100;
                const belowVwap=o.vwap&&px<o.vwap;
                return(
                  <tr key={o.id}>
                    <td style={S.td}>{o.ticker}</td>
                    <td style={S.tdR}>{fmt(o.entry,2)}</td><td style={S.tdR}>{fmt(px,2)}</td>
                    <td style={{...S.tdR,color:"#7CFFB2"}}>{fmt(o.tp,2)}</td>
                    <td style={{...S.tdR,color:"#FF7A7A"}}>{fmt(o.sl,2)}</td>
                    <td style={{...S.tdR,color:belowVwap?"#FF7A7A":"#5a5a5a"}}>{fmt(o.vwap,2)}{belowVwap?" ⚠":""}</td>
                    <td style={{...S.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl)}</td>
                    <td style={S.td}><button onClick={()=>manualClose(o)} style={S.closeBtn}>CLOSE</button></td>
                  </tr>
                );
              })}</tbody>
            </table>
          )}
        </div>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardLabel}>TRADE JOURNAL — {trades.closedTrades.length} CLOSED</div>
          {!trades.closedTrades.length?<div style={S.empty}>no closed trades yet</div>:(
            <div style={{maxHeight:300,overflow:"auto"}}>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>TIME</th><th style={S.th}>SYM</th>
                  <th style={S.thR}>ENTRY</th><th style={S.thR}>EXIT</th>
                  <th style={S.th}>RSN</th><th style={S.thR}>PNL%</th><th style={S.thR}>PNL$</th>
                  <th style={S.thR}>RSI</th><th style={S.thR}>VWAP</th><th style={S.thR}>ORB</th>
                  <th style={S.thR}>HOLD</th><th style={S.th}>✓</th>
                </tr></thead>
                <tbody>{trades.closedTrades.map(c=>(
                  <tr key={c.id}>
                    <td style={S.td}>{shortTime(c.closedAt)}</td>
                    <td style={S.td}>{c.ticker}</td>
                    <td style={S.tdR}>{fmt(c.entry,2)}</td>
                    <td style={S.tdR}>{fmt(c.closePrice,2)}</td>
                    <td style={{...S.td,color:c.reason==="TP"?"#7CFFB2":c.reason==="MANUAL"?"#FFB627":"#FF7A7A"}}>{c.reason}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(c.pnlPct)}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{c.pnl>=0?"+":""}{fmt(c.pnl,2)}</td>
                    <td style={S.tdR}>{c.rsi?c.rsi.toFixed(0):"—"}</td>
                    <td style={S.tdR}>{c.vwap?fmt(c.vwap,2):"—"}</td>
                    <td style={S.tdR}>{c.orbHigh?fmt(c.orbHigh,2):"—"}</td>
                    <td style={S.tdR}>{(c.holdMs/1000).toFixed(0)}s</td>
                    <td style={S.td}><span style={{...S.assertChip,background:c.assertion.pass?"#0e3a22":"#3a0e0e",color:c.assertion.pass?"#7CFFB2":"#FF7A7A"}}>{c.assertion.pass?"PASS":"FAIL"}</span></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>
      </section>

      {/* Scan log */}
      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>SIGNAL FEED — ENTRIES ({signals.length})</div>
          {!signals.length?<div style={S.empty}>no entries yet</div>:(
            <div style={{maxHeight:160,overflow:"auto"}}>
              {signals.map(s=>(
                <div key={s.id} style={S.sigRow}>
                  <span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.createdAt)}</span>
                  <span style={{fontWeight:700,minWidth:50,color:"#7CFFB2"}}>{s.ticker}</span>
                  <span style={{fontSize:10,color:"#a0a0a0"}}>entry ${fmt(s.entry,2)} · tp ${fmt(s.tp,2)} · sl ${fmt(s.sl,2)} · rsi {s.rsi.toFixed(0)} · vwap ${fmt(s.vwap,2)} · orb ${fmt(s.orbHigh,2)} · vol {s.volRatio.toFixed(2)}x · size ${fmt(s.notional,2)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>SCAN LOG — REJECTED ({scanLog.length})</div>
          {!scanLog.length?<div style={S.empty}>no rejections yet</div>:(
            <div style={{maxHeight:160,overflow:"auto"}}>
              {scanLog.map((s,i)=>(
                <div key={i} style={{...S.sigRow,borderColor:"#1a1a1a"}}>
                  <span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.t)}</span>
                  <span style={{fontWeight:700,minWidth:50}}>{s.ticker}</span>
                  <span style={{fontSize:10,color:"#FF7A7A"}}>{s.reason}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </section>

      <footer style={S.footer}>ORB momentum strategy · LONG only · 1% risk/trade · TP +{settings.tpPct}% SL -{settings.slPct}% · VWAP stop · circuit breaker ${settings.dailyLossLimit}</footer>
    </div>
  );
}

function StatusPill({running,stale,btcError}){let color="#7CFFB2",text="RUNNING";if(!running){color="#5a5a5a";text="IDLE";}if(running&&(stale||btcError)){color="#FFB627";text="DEGRADED";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function AlpacaPill({connStatus,mode}){let color="#5a5a5a",text="ALPACA OFF";if(connStatus.state==="testing"){color="#FFB627";text="ALPACA…";}else if(connStatus.state==="connected"){color=mode==="alpaca"?"#FFB627":"#7CFFB2";text=mode==="alpaca"?"ALPACA LIVE":"ALPACA READY";}else if(connStatus.state==="error"){color="#FF7A7A";text="ALPACA ERR";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function Diag({label,value,bad}){return<div style={{textAlign:"right"}}><div style={{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"}}>{label}</div><div style={{fontSize:13,marginTop:2,color:bad?"#FF7A7A":"#e8e8e8"}}>{value}</div></div>;}
function Stat({label,v,bad}){return<div style={styles.statCell}><div style={styles.statLabel}>{label}</div><div style={{...styles.statVal,color:bad?"#FF7A7A":"#e8e8e8"}}>{v}</div></div>;}

function AlpacaAccountCard({account,positions,mode,errors}){
  const equity=Number(account.equity),bp=Number(account.buying_power),lastEq=Number(account.last_equity),dayPnl=equity-lastEq,dayPnlPct=lastEq?(dayPnl/lastEq)*100:0;
  return<section style={{...styles.card,borderLeft:"2px solid #FFB627"}}><div style={styles.cardHead}><div><div style={styles.cardLabel}>ALPACA PAPER · {account.account_number}{mode==="alpaca"?<span style={{color:"#FFB627",marginLeft:10}}>· ORDERS LIVE</span>:<span style={{color:"#5a5a5a",marginLeft:10}}>· read-only</span>}</div><div style={styles.cardBigNum}>${fmt(equity,2)} <span style={{...styles.delta,color:dayPnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(dayPnlPct)} today</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,auto)",gap:16}}><Diag label="BUYING POWER" value={`$${fmt(bp,0)}`}/><Diag label="CASH" value={`$${fmt(Number(account.cash),0)}`}/><Diag label="POSITIONS" value={positions.length}/><Diag label="STATUS" value={account.status}/></div></div>{positions.length>0&&<table style={{...styles.table,marginTop:14}}><thead><tr><th style={styles.th}>SYM</th><th style={styles.th}>SIDE</th><th style={styles.thR}>QTY</th><th style={styles.thR}>AVG ENTRY</th><th style={styles.thR}>CURRENT</th><th style={styles.thR}>MKT VAL</th><th style={styles.thR}>UPL</th><th style={styles.thR}>UPL%</th></tr></thead><tbody>{positions.map(p=>{const upl=Number(p.unrealized_pl),uplPct=Number(p.unrealized_plpc)*100;return<tr key={p.asset_id}><td style={styles.td}>{p.symbol}</td><td style={{...styles.td,color:p.side==="long"?"#7CFFB2":"#FF7A7A"}}>{p.side.toUpperCase()}</td><td style={styles.tdR}>{fmt(Number(p.qty),4)}</td><td style={styles.tdR}>{fmt(Number(p.avg_entry_price),2)}</td><td style={styles.tdR}>{fmt(Number(p.current_price),2)}</td><td style={styles.tdR}>{fmt(Number(p.market_value),2)}</td><td style={{...styles.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{upl>=0?"+":""}{fmt(upl,2)}</td><td style={{...styles.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(uplPct)}</td></tr>;})}</tbody></table>}{errors.length>0&&<div style={{marginTop:12}}><div style={styles.cardLabel}>RECENT API ERRORS</div><div style={{maxHeight:80,overflow:"auto",fontSize:10,color:"#FF7A7A"}}>{errors.slice(0,5).map((e,i)=><div key={i} style={{padding:"2px 0"}}><span style={{color:"#5a5a5a"}}>{shortTime(new Date(e.t).toISOString())}</span> {e.msg}</div>)}</div></div>}</section>;
}

function SettingsDrawer({settings,onChange,onReset,onClose,creds,onCredsChange,connStatus,onTest,execMode,onModeChange,alpacaAccount,alpacaErrors,dailyLoss,circuitBreaker}){
  const set=(k,v)=>onChange({...settings,[k]:v});
  return(
    <section style={styles.settingsCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><div style={styles.cardLabel}>SETTINGS</div><div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>changes apply immediately</div></div>
        <div style={{display:"flex",gap:8}}><button onClick={onReset} style={styles.resetBtn}>RESTORE DEFAULTS</button><button onClick={onClose} style={styles.resetBtn}>CLOSE</button></div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#FFB627",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#FFB627"}}>ALPACA PAPER ACCOUNT</div>
        <div style={styles.alpacaWarn}>⚠ paper-trading keys only · stored in memory · never paste live keys here</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <SecretField label="API KEY ID" value={creds.keyId} placeholder="PK…" onChange={v=>onCredsChange({...creds,keyId:v.trim()})} mask={false}/>
          <SecretField label="SECRET KEY" value={creds.secret} placeholder="long random string" onChange={v=>onCredsChange({...creds,secret:v.trim()})} mask/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={onTest} style={styles.testBtn} disabled={connStatus.state==="testing"}>{connStatus.state==="testing"?"TESTING…":"▶ TEST CONNECTION"}</button>
          <ConnIndicator connStatus={connStatus}/>
        </div>
        {connStatus.state==="connected"&&<div style={{marginTop:12}}>
          <div style={styles.fieldLabel}>EXECUTION MODE</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>onModeChange("simulated")} style={{...styles.modeBtn,...(execMode==="simulated"?styles.modeBtnActive:{})}}>SIMULATED<div style={styles.modeBtnSub}>local paper trades only</div></button>
            <button onClick={()=>onModeChange("alpaca")} style={{...styles.modeBtn,...(execMode==="alpaca"?styles.modeBtnActiveAlpaca:{})}}>ALPACA PAPER<div style={styles.modeBtnSub}>real orders to Alpaca paper</div></button>
          </div>
          {alpacaAccount&&execMode==="alpaca"&&<div style={{...styles.alpacaWarn,marginTop:10,color:"#FFB627"}}>⚠ orders will be submitted · buying power: ${fmt(Number(alpacaAccount.buying_power),2)}</div>}
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:14}}>
        <SettingGroup title="STRATEGY">
          <NumField label="TAKE PROFIT %" value={settings.tpPct} min={0.5} max={20} step={0.5} onChange={v=>set("tpPct",v)} help="default 4%"/>
          <NumField label="STOP LOSS %"   value={settings.slPct} min={0.5} max={10} step={0.5} onChange={v=>set("slPct",v)} help="default 2% — VWAP stop may exit earlier"/>
          <NumField label="RSI MIN"        value={settings.rsiMin} min={30} max={70} step={1} onChange={v=>set("rsiMin",v)} help="minimum RSI to enter"/>
          <NumField label="RSI MAX"        value={settings.rsiMax} min={50} max={95} step={1} onChange={v=>set("rsiMax",v)} help="maximum RSI (avoid exhaustion)"/>
          <NumField label="VOL MULTIPLIER" value={settings.volumeMultiplier} min={1} max={5} step={0.1} onChange={v=>set("volumeMultiplier",v)} help="current vol vs ORB avg vol"/>
        </SettingGroup>
        <SettingGroup title="RISK">
          <NumField label="DAILY LOSS LIMIT $" value={settings.dailyLossLimit} min={50} max={5000} step={50} onChange={v=>set("dailyLossLimit",v)} help="circuit breaker triggers at this loss"/>
          <NumField label="NO ENTRY AFTER (HR EST)" value={settings.noEntryAfterHour} min={9} max={15} step={1} onChange={v=>set("noEntryAfterHour",v)} help="default 11 (11:30am)"/>
          <NumField label="NO ENTRY AFTER (MIN)" value={settings.noEntryAfterMin} min={0} max={59} step={1} onChange={v=>set("noEntryAfterMin",v)} help="default 30"/>
          <NumField label="FORCE CLOSE (HR EST)" value={settings.forceCloseHour} min={14} max={16} step={1} onChange={v=>set("forceCloseHour",v)} help="default 15 (3:45pm)"/>
          <NumField label="FORCE CLOSE (MIN)" value={settings.forceCloseMin} min={0} max={59} step={1} onChange={v=>set("forceCloseMin",v)} help="default 45"/>
        </SettingGroup>
        <SettingGroup title="SIM / TIMING">
          <NumField label="STOCK VOL % (σ)" value={settings.stockVolPct} min={0.01} max={2} step={0.01} onChange={v=>set("stockVolPct",v)} help="simulated price noise"/>
          <NumField label="STOCK TICK MS" value={settings.stockTickMs} min={250} max={10000} step={250} onChange={v=>set("stockTickMs",v)} help="simulated price cadence"/>
          <NumField label="BTC POLL MS"   value={settings.pollMs} min={10000} max={120000} step={1000} onChange={v=>set("pollMs",v)} help="≥10s recommended"/>
          <NumField label="SCAN INTERVAL MS" value={settings.signalIntervalMs} min={1000} max={60000} step={500} onChange={v=>set("signalIntervalMs",v)} help="how often to scan for entries"/>
        </SettingGroup>
      </div>
    </section>
  );
}

function SettingGroup({title,children}){return<div style={styles.settingGroup}><div style={styles.settingGroupTitle}>{title}</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div></div>;}
function NumField({label,value,min,max,step,onChange,help}){const[draft,setDraft]=useState(String(value));useEffect(()=>{setDraft(String(value));},[value]);const commit=()=>{const n=Number(draft);if(isNaN(n)){setDraft(String(value));return;}const c=Math.max(min,Math.min(max,n));onChange(c);setDraft(String(c));};return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={styles.fieldLabel}>{label}</div><input type="number" value={draft} min={min} max={max} step={step} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}} style={styles.input}/>{help&&<div style={{fontSize:9,color:"#3a3a3a",marginTop:2}}>{help}</div>}</label>;}
function SecretField({label,value,placeholder,onChange,mask}){const[revealed,setRevealed]=useState(false);return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={styles.fieldLabel}>{label}</div>{mask&&<button type="button" onClick={()=>setRevealed(r=>!r)} style={styles.eyeBtn}>{revealed?"HIDE":"SHOW"}</button>}</div><input type={mask&&!revealed?"password":"text"} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} spellCheck={false} autoComplete="off" style={styles.input}/></label>;}
function ConnIndicator({connStatus}){const cm={disconnected:"#5a5a5a",testing:"#FFB627",connected:"#7CFFB2",error:"#FF7A7A"};const color=cm[connStatus.state]||"#5a5a5a";return<div style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}><span style={{...styles.pillDot,background:color}}/><span style={{color,fontWeight:700,letterSpacing:1.5}}>{connStatus.state.toUpperCase()}</span>{connStatus.message&&<span style={{color:"#a0a0a0",fontSize:10}}>{connStatus.message}</span>}</div>;}
