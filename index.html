            // CANCEL and SKIP rather than recording a phantom position.
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            const isPremarketOrder=check.strategy==="PRE";
            const fillTimeout=isPremarketOrder?(s.preMarketLimitTimeoutSec||90)*1000:5000;
            const fillResult=await waitForFill(order.id,credsRef.current,fillTimeout);
            if(fillResult.filledPrice>0){
              const slippage=((fillResult.filledPrice-px)/px)*100;
              // FILL SANITY GUARD: if the reported fill is wildly off the snapshot (>15%), it's
              // almost certainly a phantom print from the thin premarket feed. Don't trust it —
              // immediately close the position back out and skip. Better to eat a tiny round-trip
              // than to carry a position with a fabricated entry price.
              if(Math.abs(slippage)>15){
                setScanLog(p=>[{t:nowIso(),ticker,reason:`🚫 Phantom fill $${fmt(fillResult.filledPrice,2)} vs snapshot $${fmt(snapshotPx,2)} (${slippage.toFixed(0)}%) — closing & skipping`},...p.slice(0,49)]);
                if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
                  closeAlpacaPos(ticker,credsRef.current).catch(()=>{});
                }
                continue;
              }
              // Use the REAL fill price as entry going forward
              px=fillResult.filledPrice;
              if(fillResult.filledQty>0&&fillResult.filledQty!==qty){
                setScanLog(p=>[{t:nowIso(),ticker,reason:`⚠ Partial fill: ${fillResult.filledQty}/${qty} shares`},...p.slice(0,49)]);
              }
              setScanLog(p=>[{t:nowIso(),ticker,reason:`✅ FILLED ${check.strategy} ${fillResult.filledQty}sh @ $${fmt(fillResult.filledPrice,4)} (slippage: ${slippage>=0?"+":""}${slippage.toFixed(2)}% vs snapshot $${fmt(snapshotPx,2)})`},...p.slice(0,49)]);
              // Recompute SL using the REAL fill price as the anchor.
              // Premarket uses premarket VWAP for structural SL; RTH uses regular VWAP.
              const slVwap=isPremarketOrder?(d.pmVwap||d.vwap):d.vwap;
              if(s.structuralSlEnabled){
                sl=calcStructuralSL(px,slVwap,d.candles1m,{
                  vwapBufferPct:s.structuralSlVwapBufferPct,
                  swingLookback:s.structuralSlSwingLookback,
                  swingBufferPct:s.structuralSlSwingBufferPct,
                  maxSlPct:isPremarketOrder?(s.preMarketSlPct||5):s.structuralSlMaxPct,
                  minSlPct:s.structuralSlMinPct,
                });
              } else {
                sl=px*(1-((isPremarketOrder?s.preMarketSlPct:s.slPct)/100));
              }
              actualSlPct=((px-sl)/px)*100;
              tp=px*(1+(s.tpFinalPct/100));
            } else if(isPremarketOrder){
              // Premarket limit order did NOT fill within the timeout — cancel it and SKIP.
              // Do NOT record a position (the order never filled, so there's nothing to manage).
              await cancelOrdersForTicker(ticker,credsRef.current);
              setScanLog(p=>[{t:nowIso(),ticker,reason:`⏳ PM limit unfilled after ${s.preMarketLimitTimeoutSec||90}s — cancelled, skipping`},...p.slice(0,49)]);
              continue;
            } else {
              // RTH market order didn't confirm within 5s — log a warning. Order may still fill
              // but the bot's entry price will be the snapshot until reconciliation catches up.
              setAlpacaErrors(p=>[{t:Date.now(),msg:`⚠ ${ticker}: fill not confirmed (status=${fillResult.status}). Entry may drift from Alpaca.`},...p.slice(0,9)]);
              setScanLog(p=>[{t:nowIso(),ticker,reason:`⚠ ORDER PLACED but fill unconfirmed — using snapshot $${fmt(px,2)} as entry`},...p.slice(0,49)]);
            }
          }catch(e){setAlpacaErrors(p=>[{t:Date.now(),msg:`order ${ticker}: ${e.message||e}`},...p.slice(0,9)]);setScanLog(p=>[{t:nowIso(),ticker,reason:`❌ ORDER REJECTED: ${e.message||e}`.slice(0,150)},...p.slice(0,49)]);continue;}
        } else {
          setScanLog(p=>[{t:nowIso(),ticker,reason:`✅ SIMULATED ENTRY ${check.strategy} $${size.toFixed(2)} @ $${fmt(px,2)}`},...p.slice(0,49)]);
        }

        const{minsFromOpen:openMins,h:eh,m:em}=getEST();
        const sessionPosition=openMins<15?"OPEN_15M":openMins<60?"MORNING":openMins<210?"MIDDAY":openMins<360?"AFTERNOON":"LATE_AFTERNOON";
        dispatch({type:"OPEN",trade:{id:`t-${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,slPct:actualSlPct,tpPct:s.tpFinalPct,size,originalSize:size,originalShares:qty,vwap:d.vwap,enteredAboveVwap:(d.vwap>0&&px>=d.vwap),ema9:d.ema9,rvol:d.rvol,gapPct:d.gapPct,strategy:check.strategy,score:check.score,openedAt:nowIso(),openPrice:px,partialDone:false,alpacaOrderId,
          // Rich context for trade reports
          entryContext:{
            rsi:check.rsi,
            ema21:d.ema21,
            ema50:d.ema50,
            preMarketHigh:d.preMarketHigh||0,
            vwapExtPct:d.vwap>0?((px-d.vwap)/d.vwap)*100:0,
            atr:d.atr,
            minsFromOpen:openMins,
            sessionPosition,
            estTime:`${String(eh).padStart(2,"0")}:${String(em).padStart(2,"0")}`,
            regime:regime.current,
            openPositionsAtEntry:tradesRef.current.openTrades.length,
            avgDailyVol:d.avgDailyVol||0,
            dayVolume:d.dayVolume||0,
            state:d.state,
          },
          // MFE/MAE tracking — peak and trough during the trade
          maxPrice:px,
          minPrice:px,
        },maxOpen:s.maxOpenTrades});
        open.add(ticker);
        // Reset state machine
        getMkt(ticker).state="IDLE";
        break; // one trade per fire cycle
      }
    };
    // Register fire in a ref so the WS handler can trigger it event-driven on CONFIRM transitions
    fireRef.current=fire;
    fire();const id=setInterval(fire,settings.scanIntervalMs);return()=>{clearInterval(id);fireRef.current=null;};
  },[running,settings.scanIntervalMs,connStatus.state,circuitBreaker]);

  const manualClose=(trade)=>{
    const px=priceRef.current[trade.ticker]??trade.entry;
    resetCounter(trade.ticker);
    if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
    dispatch({type:"CLOSE",tradeId:trade.id,closePrice:px,reason:"MANUAL",t:Date.now()});
  };

  const stats=useMemo(()=>{
    const closed=trades.closedTrades;
    const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<0);
    const winRate=closed.length?(wins.length/closed.length)*100:0;
    const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnlPct,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((a,b)=>a+b.pnlPct,0)/losses.length:0;
    const avgRR=wins.length&&losses.length?avgWin/Math.abs(avgLoss):null;
    const avgHold=closed.length?closed.reduce((a,b)=>a+b.holdMs,0)/closed.length/1000:0;
    let peak=-Infinity,maxDD=0;
    for(const p of trades.equity){if(p.v>peak)peak=p.v;const dd=((p.v-peak)/peak)*100;if(dd<maxDD)maxDD=dd;}
    return{total:closed.length,open:trades.openTrades.length,winRate,avgRR,avgHoldSec:avgHold,maxDD,pnl:trades.balance-STARTING_BALANCE,pnlPct:((trades.balance-STARTING_BALANCE)/STARTING_BALANCE)*100};
  },[trades]);

  // Auto-pick focused ticker when one becomes available
  useEffect(()=>{const openSyms=trades.openTrades.map(o=>o.ticker);if(!focusedTicker&&openSyms.length)setFocusedTicker(openSyms[0]);if(focusedTicker&&!openSyms.includes(focusedTicker))setFocusedTicker(openSyms[0]||null);},[trades.openTrades,focusedTicker]);
  const focusedSeries=focusedTicker?(priceSeries[focusedTicker]||[]):[];
  const focusedDelta=useMemo(()=>{if(focusedSeries.length<2)return null;const f=focusedSeries[0].p,l=focusedSeries[focusedSeries.length-1].p;return{abs:l-f,pct:((l-f)/f)*100};},[focusedSeries]);
  const focusedTrade=focusedTicker?trades.openTrades.find(o=>o.ticker===focusedTicker):null;
  const estNow=getEST();const S=styles;
  const wsColor=wsStatus==="live"?"#7CFFB2":wsStatus==="connecting"||wsStatus==="reconnecting"?"#FFB627":"#5a5a5a";
  const regimeColor=regimeState==="TRENDING"||regimeState==="UNKNOWN"?"#7CFFB2":regimeState==="CHOPPY"?"#FFB627":"#FF7A7A";

  return(
    <div style={S.shell}>
      <header style={S.header}>
        <div style={S.brand}><span style={S.brandDot}/><span style={S.brandText}>TRADEEDGE</span><span style={S.brandSub}>// SELECTIVE MOMENTUM</span></div>
        <div style={S.headerRight}>
          {circuitBreaker&&<div style={{...S.pill,borderColor:"#FF7A7A",color:"#FF7A7A"}}><span style={{...S.pillDot,background:"#FF7A7A"}}/>🚨 CIRCUIT BREAKER</div>}
          <div style={{...S.pill,borderColor:regimeColor,color:regimeColor}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:regimeColor,display:"inline-block",animation:regimeState==="TRENDING"?"pulse 1.5s infinite":"none"}}/>
            {regimeState==="TRENDING"||regimeState==="UNKNOWN"?"TRENDING":regimeState==="CHOPPY"?"CHOPPY":"NO TRADE"} · {regime.failureRate.toFixed(0)}% fail
          </div>
          <div style={{...S.pill,borderColor:"#5a5a5a",color:"#5a5a5a"}}>EST {String(estNow.h).padStart(2,"0")}:{String(estNow.m).padStart(2,"0")} {estNow.isPreMarket?"PRE-MKT":estNow.isMarketOpen?"OPEN":"CLOSED"}</div>
          {connStatus.state==="connected"&&<div style={{...S.pill,borderColor:wsColor,color:wsColor,fontSize:9}}><span style={{width:5,height:5,borderRadius:"50%",background:wsColor,display:"inline-block",marginRight:4,animation:wsStatus==="live"?"pulse 1.5s infinite":"none"}}/>{wsStatus==="live"?"WS LIVE":wsStatus.toUpperCase()}</div>}
          <AlpacaPill connStatus={connStatus} mode={execMode}/>
          <StatusPill running={running} stale={stale}/>
          <button onClick={()=>setRunning(r=>!r)} style={{...S.runBtn,...(running?S.runBtnStop:{})}}>{running?"■ STOP":"▶ START"}</button>
          <button onClick={()=>setSettingsOpen(o=>!o)} style={{...S.resetBtn,...(settingsOpen?{borderColor:"#FFB627",color:"#FFB627"}:{})}}>⚙ SETTINGS</button>
          <button onClick={()=>{
            dispatch({type:"RESET"});
            setSignals([]);
            setDailyLoss(0);
            setCircuitBreaker(false);
            setScanLog([]);
            setRadar([]);
            setAlpacaTickers([]);
            // Clear module-level regime — otherwise NO_TRADE state survives RESET
            regime.current="UNKNOWN";
            regime.recentSignals=[];
            regime.failureRate=0;
            regime.noTradeUntil=0;
            setRegimeState("UNKNOWN");
          }} style={S.resetBtn}>RESET</button>
        </div>
      </header>

      {settingsOpen&&<SettingsDrawer settings={settings} onChange={setSettings} onReset={()=>setSettings(DEFAULT_SETTINGS)} onClose={()=>setSettingsOpen(false)} creds={creds} onCredsChange={setCreds} connStatus={connStatus} onTest={testConnection} execMode={execMode} onModeChange={setExecMode} alpacaAccount={alpacaAccount} alpacaErrors={alpacaErrors} anthropicKey={anthropicKey} onAnthropicKeyChange={setAnthropicKey} finnhubKey={finnhubKey} onFinnhubKeyChange={setFinnhubKey}/>}

      <section style={S.row}>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardHead}>
            <div>
              <div style={S.cardLabel}>LIVE FEED — OPEN POSITIONS</div>
              {focusedTicker?(()=>{const px=priceRef.current[focusedTicker]||(focusedSeries.length?focusedSeries[focusedSeries.length-1].p:null);return(<div style={S.cardBigNum}>{focusedTicker} ${px?fmt(px,2):"—"} {focusedDelta&&<span style={{...S.delta,color:focusedDelta.abs>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(focusedDelta.pct)} since open</span>}</div>);})():(<div style={S.cardBigNum}>— <span style={{fontSize:11,color:"#5a5a5a"}}>no open positions</span></div>)}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",maxWidth:"60%",justifyContent:"flex-end"}}>
              {trades.openTrades.map(o=>{const px=priceRef.current[o.ticker]||o.entry;const upl=((px-o.entry)/o.entry)*100;const active=focusedTicker===o.ticker;return(<button key={o.id} onClick={()=>setFocusedTicker(o.ticker)} style={{background:active?"#1a1a1a":"#060606",border:`1px solid ${active?"#FFB627":"#1a1a1a"}`,color:active?"#FFB627":"#e8e8e8",padding:"4px 8px",fontSize:10,fontFamily:"inherit",borderRadius:2,cursor:"pointer",letterSpacing:1}}>{o.ticker} <span style={{color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl,1)}</span></button>);})}
            </div>
          </div>
          <div style={{height:170,marginTop:12}}>
            {focusedSeries.length>1?(
            <ResponsiveContainer>
              <AreaChart data={focusedSeries} margin={{top:6,right:10,left:0,bottom:0}}>
                <defs><linearGradient id="posg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFB627" stopOpacity={0.4}/><stop offset="100%" stopColor="#FFB627" stopOpacity={0}/></linearGradient></defs>
                <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
                <YAxis domain={["auto","auto"]} stroke="#5a5a5a" fontSize={10} tickFormatter={v=>`$${v.toFixed(2)}`}/>
                <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,focusedTicker]}/>
                {focusedTrade&&<ReferenceLine y={focusedTrade.entry} stroke="#FFB627" strokeDasharray="3 3" label={{value:"ENTRY",fill:"#FFB627",fontSize:9,position:"insideTopRight"}}/>}
                {focusedTrade&&<ReferenceLine y={focusedTrade.tp} stroke="#7CFFB2" strokeDasharray="3 3" label={{value:"TP",fill:"#7CFFB2",fontSize:9,position:"insideTopRight"}}/>}
                {focusedTrade&&<ReferenceLine y={focusedTrade.sl} stroke="#FF7A7A" strokeDasharray="3 3" label={{value:"SL",fill:"#FF7A7A",fontSize:9,position:"insideTopRight"}}/>}
                <Area type="monotone" dataKey="p" stroke="#FFB627" strokeWidth={1.5} fill="url(#posg)" isAnimationActive={false}/>
              </AreaChart>
            </ResponsiveContainer>
            ):(<div style={{...S.empty,height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>{focusedTicker?"waiting for ticks…":"open a position to see live feed"}</div>)}
          </div>
          {stale&&<div style={S.warnBar}>⚠ STALE — no recent Alpaca scan</div>}
        </div>
        <div style={{...S.card,flex:1,minWidth:260}}>
          <div style={S.cardLabel}>RUN STATS</div>
          <div style={S.bigEquity}>${fmt(trades.balance,2)} <span style={{color:stats.pnl>=0?"#7CFFB2":"#FF7A7A",fontSize:13}}>{fmtPct(stats.pnlPct)}</span></div>
          <div style={S.statGrid}>
            <Stat label="TRADES" v={`${stats.total}`}/><Stat label="OPEN" v={`${stats.open}/${settings.maxOpenTrades}`}/>
            <Stat label="WIN RATE" v={`${stats.winRate.toFixed(1)}%`}/><Stat label="AVG R:R" v={stats.avgRR?stats.avgRR.toFixed(2):"—"}/>
            <Stat label="MAX DD" v={`${stats.maxDD.toFixed(2)}%`} bad={stats.maxDD<-3}/><Stat label="AVG HOLD" v={`${stats.avgHoldSec.toFixed(0)}s`}/>
          </div>
          <div style={{marginTop:10,display:"flex",gap:8}}>
            <div style={{flex:1,background:"#060606",border:"1px solid #1a1a1a",padding:"10px 12px",borderRadius:2}}>
              <div style={S.cardLabel}>DAILY P&L (NET)</div>
              <div style={{fontSize:16,fontWeight:500,color:stats.pnl>=0?"#7CFFB2":"#FF7A7A",marginTop:4}}>{stats.pnl>=0?"+":"-"}${fmt(Math.abs(stats.pnl),2)}</div>
              <div style={{fontSize:9,color:"#5a5a5a",marginTop:2}}>realized across all closed trades</div>
            </div>
            <div style={{flex:1,background:"#060606",border:"1px solid #1a1a1a",padding:"10px 12px",borderRadius:2}}>
              <div style={S.cardLabel}>LOSS BUDGET</div>
              <div style={{fontSize:16,fontWeight:500,color:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#e8e8e8",marginTop:4}}>-${fmt(dailyLoss,2)} <span style={{fontSize:10,color:"#5a5a5a"}}>/ ${settings.dailyLossLimit}</span></div>
              <div style={{marginTop:6,height:4,background:"#1a1a1a",borderRadius:2}}><div style={{height:"100%",width:`${Math.min(100,(dailyLoss/settings.dailyLossLimit)*100)}%`,background:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#7CFFB2",borderRadius:2}}/></div>
              <div style={{fontSize:9,color:"#5a5a5a",marginTop:4}}>halts trading at limit (losses only)</div>
            </div>
          </div>
        </div>
      </section>

      {connStatus.state==="connected"&&alpacaAccount&&<AlpacaAccountCard account={alpacaAccount} positions={alpacaPositions} mode={execMode} errors={alpacaErrors}/>}

      {/* Position Reconciliation — surfaces drift between bot state and Alpaca state */}
      {connStatus.state==="connected"&&execMode==="alpaca"&&alpacaPositions.length>0&&(()=>{
        const botTickers=new Set(trades.openTrades.map(t=>t.ticker));
        const alpacaTickers=new Set(alpacaPositions.map(p=>p.symbol));
        const orphaned=alpacaPositions.filter(p=>!botTickers.has(p.symbol));
        if(orphaned.length===0)return null;
        const totalUnrealized=orphaned.reduce((sum,p)=>sum+Number(p.unrealized_pl||0),0);
        return(
          <section style={{...S.card,borderColor:"#FF7A7A",background:"#1a0a0a"}}>
            <div style={{...S.cardLabel,color:"#FF7A7A"}}>⚠ ALPACA DRIFT — {orphaned.length} ORPHANED POSITION{orphaned.length>1?"S":""}</div>
            <div style={{fontSize:10,color:"#FFB627",marginTop:4,marginBottom:8,lineHeight:1.5}}>
              These positions exist on Alpaca but the bot has NO record of them. They're accumulating P&L unmonitored. Likely caused by failed close orders.
              Unrealized P&L: <span style={{color:totalUnrealized>=0?"#7CFFB2":"#FF7A7A",fontWeight:700}}>{totalUnrealized>=0?"+":""}${fmt(totalUnrealized,2)}</span>
            </div>
            <table style={{...S.table,fontSize:11}}>
              <thead><tr>
                <th style={S.th}>SYM</th>
                <th style={S.thR}>QTY</th>
                <th style={S.thR}>AVG ENTRY</th>
                <th style={S.thR}>CURRENT</th>
                <th style={S.thR}>UNREAL P&L</th>
                <th style={S.th}>ACTION</th>
              </tr></thead>
              <tbody>
                {orphaned.map(p=>{
                  const pnl=Number(p.unrealized_pl||0);
                  const pnlPct=Number(p.unrealized_plpc||0)*100;
                  return(<tr key={p.symbol}>
                    <td style={S.td}><b>{p.symbol}</b></td>
                    <td style={S.tdR}>{p.qty}</td>
                    <td style={S.tdR}>${fmt(Number(p.avg_entry_price),2)}</td>
                    <td style={S.tdR}>${fmt(Number(p.current_price),2)}</td>
                    <td style={{...S.tdR,color:pnl>=0?"#7CFFB2":"#FF7A7A"}}>{pnl>=0?"+":""}${fmt(pnl,2)} ({fmtPct(pnlPct)})</td>
                    <td style={S.td}>
                      <button onClick={async()=>{
                        const ok=await closeAlpacaPos(p.symbol,credsRef.current);
                        if(!ok)setAlpacaErrors(prev=>[{t:Date.now(),msg:`Manual close failed for ${p.symbol}`},...prev.slice(0,9)]);
                      }} style={{background:"#0d0d0d",border:"1px solid #FF7A7A",color:"#FF7A7A",padding:"2px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>FORCE CLOSE</button>
                    </td>
                  </tr>);
                })}
              </tbody>
            </table>
            <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={async()=>{
                if(!confirm(`Force-close all ${orphaned.length} orphaned positions on Alpaca? This cancels any pending orders and sells everything.`))return;
                for(const p of orphaned){
                  try{await closeAlpacaPos(p.symbol,credsRef.current);}catch(e){}
                }
              }} style={{background:"#FF7A7A",border:"none",color:"#000",padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>🚨 PANIC CLOSE ALL ORPHANED</button>
              <span style={{fontSize:10,color:"#5a5a5a"}}>Cancels pending orders, then liquidates positions Alpaca-side.</span>
            </div>
          </section>
        );
      })()}

      <section style={S.card}>
        <div style={S.cardLabel}>EQUITY CURVE</div>
        <div style={{height:80,marginTop:8}}>
          <ResponsiveContainer>
            <LineChart data={trades.equity} margin={{top:8,right:10,left:0,bottom:0}}>
              <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
              <YAxis stroke="#5a5a5a" fontSize={10} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"Equity"]}/>
              <ReferenceLine y={STARTING_BALANCE} stroke="#3a3a3a" strokeDasharray="3 3"/>
              <Line type="monotone" dataKey="v" stroke="#7CFFB2" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </section>

      {radar.length>0&&(
        <section style={{...S.card,borderLeft:"2px solid #7CFFB2"}}>
          <div style={{...S.cardLabel,color:"#7CFFB2"}}>🌅 GAP RADAR — {radar.length} CANDIDATES (sorted by score)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginTop:8}}>
            {radar.sort((a,b)=>(b.score||0)-(a.score||0)).map(r=>(
              <div key={r.ticker} style={{background:"#060606",border:`1px solid ${(r.score||0)>=settings.minScore?"#0e3a22":"#1a1a1a"}`,padding:10,borderRadius:2}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,color:(r.score||0)>=settings.minScore?"#7CFFB2":"#e8e8e8"}}>{r.ticker}</div>
                  <div style={{fontSize:10,fontWeight:700,color:(r.score||0)>=settings.minScore?"#7CFFB2":"#5a5a5a"}}>{r.score||0}</div>
                </div>
                <div style={{fontSize:15,marginTop:4}}>${fmt(r.price,2)}</div>
                <div style={{fontSize:11,color:"#7CFFB2",marginTop:2}}>GAP {fmtPct(r.gapPct)}</div>
                <div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>RVOL {r.rvol>0?r.rvol.toFixed(1)+"x":"—"} · ALP</div>
              </div>
            ))}
          </div>
        </section>
      )}

      <section style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div style={S.cardLabel}>MOMENTUM SCANNER — {allTickers.length} SYMBOLS · min score {settings.minScore}</div>
          <div style={{display:"flex",gap:12,fontSize:9,color:"#5a5a5a"}}>
            <span>Alpaca: {alpacaLastScan?shortTime(alpacaLastScan):"—"}</span>
            <span style={{color:wsColor}}>{wsStatus==="live"?"● WS LIVE":"● WS "+wsStatus}</span>
          </div>
        </div>
        {!allTickers.length?<div style={S.empty}>Scanning via Alpaca…</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>TICKER</th><th style={S.th}>STATE</th><th style={S.thR}>SCORE</th>
                <th style={S.thR}>PRICE</th><th style={S.thR}>GAP%</th><th style={S.thR}>RVOL</th>
                <th style={S.thR}>RSI</th><th style={S.thR}>EMA9</th><th style={S.thR}>VWAP</th><th style={S.th}>STATUS</th>
              </tr></thead>
              <tbody>
                {allTickers.slice(0,40).map(ticker=>{
                  const d=tickerData[ticker]||getMkt(ticker);
                  const rsi=calcRSI(d.priceHistory||[]);
                  const score=d.score||0;
                  const check=checkEntry(ticker,settings);
                  const hasPos=trades.openTrades.find(o=>o.ticker===ticker);
                  const stateColor=d.state==="CONFIRM"?"#7CFFB2":d.state==="PULLBACK"?"#FFB627":d.state==="WATCHING"?"#a78bfa":"#3a3a3a";
                  return(
                    <tr key={ticker} style={{background:check.pass?"#0a1a0a":hasPos?"#1a1a0a":"transparent"}}>
                      <td style={{...S.td,fontWeight:700,color:check.pass?"#7CFFB2":hasPos?"#FFB627":"#e8e8e8"}}>{ticker}{hasPos?" 📌":""}</td>
                      <td style={{...S.td,color:stateColor,fontSize:9}}>{d.state||"IDLE"}</td>
                      <td style={{...S.thR,padding:"6px 8px",borderBottom:"1px solid #131313",color:score>=settings.minScore?"#7CFFB2":score>=50?"#FFB627":"#5a5a5a"}}>{score}</td>
                      <td style={S.tdR}>${fmt(d.price,2)}</td>
                      <td style={{...S.tdR,color:d.gapPct>=settings.gapMinPct?"#7CFFB2":d.gapPct>0?"#FFB627":"#5a5a5a"}}>{d.gapPct?fmtPct(d.gapPct):"—"}</td>
                      <td style={{...S.tdR,color:d.rvol>=settings.rvolEntry?"#7CFFB2":d.rvol>=2?"#FFB627":"#5a5a5a"}}>{d.rvol>0?`${d.rvol.toFixed(1)}x`:"—"}</td>
                      <td style={{...S.tdR,color:rsi>=50&&rsi<=80?"#7CFFB2":"#5a5a5a"}}>{rsi.toFixed(0)}</td>
                      <td style={{...S.tdR,color:d.ema9>d.ema21&&d.ema21>0?"#7CFFB2":"#5a5a5a"}}>{d.ema9?`$${fmt(d.ema9,2)}`:"—"}</td>
                      <td style={{...S.tdR,color:d.price>d.vwap?"#7CFFB2":"#5a5a5a"}}>{d.vwap?`$${fmt(d.vwap,2)}`:"—"}</td>
                      <td style={{...S.td,fontSize:9}}>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}>
                          {check.pass?(
                            check.strategy==="QUALITY"
                              ?<span style={{color:"#7CFFB2",fontWeight:700}}>⭐ QUALITY</span>
                              :check.strategy==="PRE"
                              ?<span style={{color:"#B47CFF",fontWeight:700}}>🌙 PREMARKET</span>
                              :check.strategy==="EARLY_IGN"
                              ?<span style={{color:"#FF3B30",fontWeight:700}}>⚡⚡ EARLY</span>
                              :check.strategy==="IGNITION"
                              ?<span style={{color:"#FF6B35",fontWeight:700}}>🔥 IGNITION</span>
                              :check.strategy==="INTRADAY"
                              ?<span style={{color:"#FFD23F",fontWeight:700}}>⚡ INTRADAY</span>
                              :<span style={{color:"#7CFFB2"}}>✅ ENTRY READY</span>
                          ):<span style={{color:"#3a3a3a"}}>{check.reason}</span>}
                          {d.hasCatalyst&&<span title={`Catalyst: ${(d.matchedKeywords||[]).join(", ")} (${d.catalystArticles} articles)`} style={{color:"#7CFFB2",fontSize:11}}>📰</span>}
                          {d.floatShares>0&&d.floatShares<20000000&&<span title={`Float: ${(d.floatShares/1e6).toFixed(1)}M shares`} style={{color:"#FFD23F",fontSize:11}}>🐜</span>}
                          {d.floatShares>=20000000&&d.floatShares<50000000&&<span title={`Float: ${(d.floatShares/1e6).toFixed(1)}M shares`} style={{color:"#5a5a5a",fontSize:11}}>🐢</span>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>OPEN POSITIONS ({trades.openTrades.length}/{settings.maxOpenTrades})</div>
          {!trades.openTrades.length?<div style={S.empty}>{running?"scanning for high-quality setups…":"press START"}</div>:(
            <table style={S.table}>
              <thead><tr><th style={S.th}>SYM</th><th style={S.thR}>SCORE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>NOW</th><th style={S.thR}>SL</th><th style={S.thR}>TP</th><th style={S.thR}>HOLD</th><th style={S.thR}>UPL</th><th style={S.th}>CHART</th><th style={S.th}></th></tr></thead>
              <tbody>{trades.openTrades.map(o=>{
                const px=priceRef.current[o.ticker]??o.entry,upl=((px-o.entry)/o.entry)*100;
                const holdSec=Math.floor((Date.now()-new Date(o.openedAt).getTime())/1000);
                const isLocked=holdSec<60;
                const sparkData=(priceSeries[o.ticker]||[]).slice(-60); // last 60 ticks for sparkline
                const isFocused=focusedTicker===o.ticker;
                return(<tr key={o.id} onClick={()=>setFocusedTicker(o.ticker)} style={{cursor:"pointer",background:isFocused?"#0d0d0d":"transparent"}}>
                  <td style={{...S.td,fontWeight:700,color:isFocused?"#FFB627":"#e8e8e8"}}>{o.ticker}{o.partialDone?" ½":""}</td>
                  <td style={{...S.tdR,color:o.score>=settings.minScore?"#7CFFB2":"#FFB627"}}>{o.score||"—"}</td>
                  <td style={S.tdR}>${fmt(o.entry,2)}</td><td style={S.tdR}>${fmt(px,2)}</td>
                  <td style={{...S.tdR,color:"#FF7A7A"}}>${fmt(o.sl,2)}</td>
                  <td style={{...S.tdR,color:"#7CFFB2"}}>${fmt(o.tp,2)}</td>
                  <td style={{...S.tdR,color:isLocked?"#FFB627":"#5a5a5a"}}>{isLocked?`🔒${holdSec}s`:`${holdSec}s`}</td>
                  <td style={{...S.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl)}</td>
                  <td style={{...S.td,padding:"2px 4px"}}>
                    {sparkData.length>1?(
                      <div style={{width:60,height:24}}>
                        <ResponsiveContainer>
                          <AreaChart data={sparkData} margin={{top:2,right:0,left:0,bottom:0}}>
                            <defs><linearGradient id={`spark-${o.id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={upl>=0?"#7CFFB2":"#FF7A7A"} stopOpacity={0.5}/><stop offset="100%" stopColor={upl>=0?"#7CFFB2":"#FF7A7A"} stopOpacity={0}/></linearGradient></defs>
                            <Area type="monotone" dataKey="p" stroke={upl>=0?"#7CFFB2":"#FF7A7A"} strokeWidth={1} fill={`url(#spark-${o.id})`} isAnimationActive={false}/>
                          </AreaChart>
                        </ResponsiveContainer>
                      </div>
                    ):(<span style={{color:"#3a3a3a",fontSize:9}}>—</span>)}
                  </td>
                  <td style={S.td}><button onClick={e=>{e.stopPropagation();manualClose(o);}} style={S.closeBtn}>CLOSE</button></td>
                </tr>);
              })}</tbody>
            </table>
          )}
        </div>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardLabel}>TRADE JOURNAL ({trades.closedTrades.length})</div>
          {!trades.closedTrades.length?<div style={S.empty}>no closed trades yet</div>:(
            <div style={{maxHeight:240,overflow:"auto"}}>
              <table style={S.table}>
                <thead><tr><th style={S.th}>TIME</th><th style={S.th}>SYM</th><th style={S.thR}>SCORE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>EXIT</th><th style={S.th}>RSN</th><th style={S.thR}>GAP</th><th style={S.thR}>RVOL</th><th style={S.thR}>PNL%</th><th style={S.thR}>PNL$</th><th style={S.thR}>HOLD</th></tr></thead>
                <tbody>{trades.closedTrades.map(c=>{
                  const rsnColor=c.reason==="TP_FINAL"||c.reason==="TP_PARTIAL"||c.reason==="RSI_EXIT"||(c.reason==="EMA9_TRAIL"&&c.pnl>=0)?"#7CFFB2":c.reason==="MANUAL"||c.reason==="EOD_CLOSE"||c.reason==="NO_PROGRESS"?"#FFB627":"#FF7A7A";
                  return(<tr key={c.id}>
                    <td style={S.td}>{shortTime(c.closedAt)}</td>
                    <td style={S.td}>{c.ticker}{c.aiTrade?" 🤖":""}</td>
                    <td style={{...S.tdR,color:c.score>=settings.minScore?"#7CFFB2":"#5a5a5a"}}>{c.score||"—"}</td>
                    <td style={S.tdR}>${fmt(c.entry,2)}</td><td style={S.tdR}>${fmt(c.closePrice,2)}</td>
                    <td style={{...S.td,color:rsnColor,fontSize:9}}>{c.reason}</td>
                    <td style={{...S.tdR,color:"#FFB627"}}>{c.gapPct?fmtPct(c.gapPct):"—"}</td>
                    <td style={S.tdR}>{c.rvol?`${c.rvol.toFixed(1)}x`:"—"}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(c.pnlPct)}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>
                      <div>{c.pnl>=0?"+":""}${fmt(c.pnl,2)}</div>
                      {(c.stage1Pnl||c.stage2Pnl)&&(
                        <div style={{fontSize:9,color:"#7a7a7a",fontWeight:400,marginTop:2,whiteSpace:"nowrap"}}>
                          {c.stage1Pnl!==undefined?<span>S1: {c.stage1Pnl>=0?"+":""}${fmt(c.stage1Pnl,2)}</span>:null}
                          {c.stage2Pnl!==undefined?<span> · S2: {c.stage2Pnl>=0?"+":""}${fmt(c.stage2Pnl,2)}</span>:null}
                          {c.finalSlicePnl!==undefined?<span> · R: {c.finalSlicePnl>=0?"+":""}${fmt(c.finalSlicePnl,2)}</span>:null}
                        </div>
                      )}
                    </td>
                    <td style={S.tdR}>{(c.holdMs/1000).toFixed(0)}s</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          )}
        </div>
      </section>

      <section style={S.card}>
        <div style={S.cardHead}>
          <div>
            <div style={S.cardLabel}>TRADE REPORTS ({trades.closedTrades.length})</div>
            <div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>structured analysis for AI review · expand a row for full report · copy/download for offline analysis</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{
              if(!trades.closedTrades.length)return;
              const reports=trades.closedTrades.slice().reverse().map((c,i)=>buildTradeReport(c,trades.closedTrades.length-i).text).join("\n\n");
              navigator.clipboard.writeText(reports).then(()=>{
                setReportCopiedAt(Date.now());
              }).catch(()=>{});
            }} style={{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#e8e8e8",padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
              {reportCopiedAt&&Date.now()-reportCopiedAt<2000?"✓ COPIED":"COPY ALL"}
            </button>
            <button onClick={()=>{
              if(!trades.closedTrades.length)return;
              const payload={
                exportedAt:new Date().toISOString(),
                exportedAtET:new Date().toLocaleString(undefined,{timeZone:"America/New_York"}),
                summary:{
                  totalTrades:trades.closedTrades.length,
                  wins:trades.closedTrades.filter(t=>t.pnl>=0).length,
                  losses:trades.closedTrades.filter(t=>t.pnl<0).length,
                  netPnl:trades.closedTrades.reduce((a,t)=>a+t.pnl,0),
                  netPnlPct:((trades.balance-STARTING_BALANCE)/STARTING_BALANCE)*100,
                },
                trades:trades.closedTrades.slice().reverse().map((c,i)=>buildTradeReport(c,trades.closedTrades.length-i).json),
              };
              const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              const dateStr=new Date().toISOString().split("T")[0];
              a.href=url;a.download=`tradeedge-reports-${dateStr}.json`;
              document.body.appendChild(a);a.click();document.body.removeChild(a);
              URL.revokeObjectURL(url);
            }} style={{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#e8e8e8",padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>DOWNLOAD JSON</button>
          </div>
        </div>
        {!trades.closedTrades.length?<div style={S.empty}>no closed trades yet — reports will appear here after the first trade closes</div>:(
          <div style={{maxHeight:400,overflow:"auto",marginTop:8}}>
            {trades.closedTrades.map((c,i)=>{
              const tradeIdx=trades.closedTrades.length-i;
              const expanded=expandedReportId===c.id;
              const isWin=c.pnl>=0;
              return(
                <div key={c.id} style={{borderBottom:"1px solid #1a1a1a",padding:"8px 0"}}>
                  <div onClick={()=>setExpandedReportId(expanded?null:c.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",gap:12}}>
                    <div style={{display:"flex",gap:12,alignItems:"center",flex:1,minWidth:0}}>
                      <span style={{color:"#5a5a5a",fontSize:10,minWidth:30}}>#{tradeIdx}</span>
                      <span style={{fontWeight:700,minWidth:60}}>{c.ticker}</span>
                      <span style={{fontSize:9,color:"#5a5a5a",minWidth:70}}>{c.strategy||"—"}</span>
                      <span style={{fontSize:9,color:isWin?"#7CFFB2":"#FF7A7A",minWidth:80}}>{c.reason}</span>
                      <span style={{color:isWin?"#7CFFB2":"#FF7A7A",fontWeight:600}}>{fmtPct(c.pnlPct)}</span>
                      <span style={{fontSize:10,color:isWin?"#7CFFB2":"#FF7A7A"}}>{c.pnl>=0?"+":""}${fmt(c.pnl,2)}</span>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#5a5a5a"}}>{shortTime(c.closedAt)}</span>
                      <button onClick={(e)=>{
                        e.stopPropagation();
                        const{text}=buildTradeReport(c,tradeIdx);
                        navigator.clipboard.writeText(text).then(()=>{
                          setReportCopiedAt(Date.now());
                          setLastCopiedId(c.id);
                        }).catch(()=>{});
                      }} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#5a5a5a",fontSize:9,padding:"2px 6px",cursor:"pointer",fontFamily:"inherit"}}>
                        {lastCopiedId===c.id&&reportCopiedAt&&Date.now()-reportCopiedAt<2000?"✓":"COPY"}
                      </button>
                      <span style={{color:"#5a5a5a",fontSize:10,width:12,textAlign:"center"}}>{expanded?"▼":"▶"}</span>
                    </div>
                  </div>
                  {expanded&&(
                    <pre style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,marginTop:8,fontSize:11,color:"#e8e8e8",fontFamily:"JetBrains Mono,monospace",whiteSpace:"pre-wrap",overflow:"auto",lineHeight:1.5}}>
                      {buildTradeReport(c,tradeIdx).text}
                    </pre>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>ENTRIES TAKEN ({signals.length})</div>
          {!signals.length?<div style={S.empty}>no entries yet</div>:(
            <div style={{maxHeight:130,overflow:"auto"}}>{signals.map(s=><div key={s.id} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.createdAt)}</span><span style={{fontWeight:700,minWidth:50,color:"#7CFFB2"}}>{s.ticker}</span><span style={{fontSize:9,color:"#FFB627",marginRight:6}}>#{s.score}</span><span style={{fontSize:10,color:"#a0a0a0"}}>gap {fmtPct(s.gapPct)} · rvol {s.rvol?.toFixed(1)}x · rsi {s.rsi?.toFixed(0)} · ema9 ${fmt(s.ema9,2)} · r:r {s.rr?.toFixed(1)}</span></div>)}</div>
          )}
        </div>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>SCAN LOG ({scanLog.length})</div>
          {!scanLog.length?<div style={S.empty}>no rejections</div>:(
            <div style={{maxHeight:130,overflow:"auto"}}>{scanLog.map((s,i)=><div key={i} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.t)}</span><span style={{fontWeight:700,minWidth:50}}>{s.ticker}</span><span style={{fontSize:10,color:"#FF7A7A"}}>{s.reason}</span></div>)}</div>
          )}
        </div>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardHead}>
            <div style={S.cardLabel}>ALPACA ERRORS ({alpacaErrors.length})</div>
            {alpacaErrors.length>0&&<button onClick={()=>setAlpacaErrors([])} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#5a5a5a",fontSize:9,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>CLEAR</button>}
          </div>
          {!alpacaErrors.length?<div style={S.empty}>no errors</div>:(
            <div style={{maxHeight:130,overflow:"auto"}}>{alpacaErrors.map((e,i)=><div key={i} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(new Date(e.t).toISOString())}</span><span style={{fontSize:10,color:"#FF7A7A"}}>{e.msg}</span></div>)}</div>
          )}
        </div>
      </section>

      <footer style={S.footer}>selective momentum · max {settings.maxOpenTrades} trades · min score {settings.minScore}/100 · {settings.riskPct}% risk · 3-stage: +{settings.tpPartialPct}% → +{settings.tpStage2Pct}% → runner +{settings.tpFinalPct}% · regime: {regimeState}</footer>
    </div>
  );
}

function StatusPill({running,stale}){let color="#7CFFB2",text="RUNNING";if(!running){color="#5a5a5a";text="IDLE";}if(running&&stale){color="#FFB627";text="DEGRADED";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function AlpacaPill({connStatus,mode}){let color="#5a5a5a",text="ALPACA OFF";if(connStatus.state==="testing"){color="#FFB627";text="ALPACA…";}else if(connStatus.state==="connected"){color=mode==="alpaca"?"#FFB627":"#7CFFB2";text=mode==="alpaca"?"ALPACA LIVE":"ALPACA READY";}else if(connStatus.state==="error"){color="#FF7A7A";text="ALPACA ERR";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function Diag({label,value,bad}){return<div style={{textAlign:"right"}}><div style={{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"}}>{label}</div><div style={{fontSize:13,marginTop:2,color:bad?"#FF7A7A":"#e8e8e8"}}>{value}</div></div>;}
function Stat({label,v,bad}){return<div style={styles.statCell}><div style={styles.statLabel}>{label}</div><div style={{...styles.statVal,color:bad?"#FF7A7A":"#e8e8e8"}}>{v}</div></div>;}

function AlpacaAccountCard({account,positions,mode,errors}){
  const equity=Number(account.equity),bp=Number(account.buying_power),lastEq=Number(account.last_equity),dayPnl=equity-lastEq,dayPnlPct=lastEq?(dayPnl/lastEq)*100:0;
  return<section style={{...styles.card,borderLeft:"2px solid #FFB627"}}><div style={styles.cardHead}><div><div style={styles.cardLabel}>ALPACA PAPER · {account.account_number}{mode==="alpaca"?<span style={{color:"#FFB627",marginLeft:10}}>· ORDERS LIVE</span>:<span style={{color:"#5a5a5a",marginLeft:10}}>· read-only</span>}</div><div style={styles.cardBigNum}>${fmt(equity,2)} <span style={{...styles.delta,color:dayPnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(dayPnlPct)} today</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,auto)",gap:16}}><Diag label="BUYING POWER" value={`$${fmt(bp,0)}`}/><Diag label="CASH" value={`$${fmt(Number(account.cash),0)}`}/><Diag label="POSITIONS" value={positions.length}/><Diag label="STATUS" value={account.status}/></div></div>{errors.length>0&&<div style={{marginTop:12}}><div style={styles.cardLabel}>API ERRORS</div><div style={{maxHeight:60,overflow:"auto",fontSize:10,color:"#FF7A7A"}}>{errors.slice(0,3).map((e,i)=><div key={i}><span style={{color:"#5a5a5a"}}>{shortTime(new Date(e.t).toISOString())}</span> {e.msg}</div>)}</div></div>}</section>;
}

function SettingsDrawer({settings,onChange,onReset,onClose,creds,onCredsChange,connStatus,onTest,execMode,onModeChange,alpacaAccount,anthropicKey,onAnthropicKeyChange,finnhubKey,onFinnhubKeyChange}){
  const set=(k,v)=>onChange({...settings,[k]:v});
  return(
    <section style={styles.settingsCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><div style={styles.cardLabel}>SETTINGS</div><div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>changes apply immediately</div></div>
        <div style={{display:"flex",gap:8}}><button onClick={onReset} style={styles.resetBtn}>RESTORE DEFAULTS</button><button onClick={onClose} style={styles.resetBtn}>CLOSE</button></div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>STRATEGY MODES</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <button onClick={()=>set("preMarketEnabled",!settings.preMarketEnabled)} style={{...styles.modeBtn,...(settings.preMarketEnabled?{background:"#1a0e3a",borderColor:"#a78bfa",color:"#a78bfa"}:{})}}>PRE-MARKET<div style={styles.modeBtnSub}>4am-9:30am</div><div style={{marginTop:6,fontSize:9,color:settings.preMarketEnabled?"#a78bfa":"#5a5a5a"}}>{settings.preMarketEnabled?"● ON":"○ OFF"}</div></button>
          <button onClick={()=>set("gapMomentumEnabled",!settings.gapMomentumEnabled)} style={{...styles.modeBtn,...(settings.gapMomentumEnabled?styles.modeBtnActive:{})}}>GAP MOMENTUM<div style={styles.modeBtnSub}>9:30-10:30am</div><div style={{marginTop:6,fontSize:9,color:settings.gapMomentumEnabled?"#7CFFB2":"#5a5a5a"}}>{settings.gapMomentumEnabled?"● ON":"○ OFF"}</div></button>
          <button onClick={()=>set("continuationEnabled",!settings.continuationEnabled)} style={{...styles.modeBtn,...(settings.continuationEnabled?styles.modeBtnActiveAlpaca:{})}}>CONTINUATION<div style={styles.modeBtnSub}>9:30am-3:30pm</div><div style={{marginTop:6,fontSize:9,color:settings.continuationEnabled?"#FFB627":"#5a5a5a"}}>{settings.continuationEnabled?"● ON":"○ OFF"}</div></button>
        </div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>ANTHROPIC API KEY</div>
        <div style={{...styles.alpacaWarn,marginBottom:10}}>⚠ memory only · console.anthropic.com</div>
        <SecretField label="ANTHROPIC API KEY" value={anthropicKey} placeholder="sk-ant-api03-…" onChange={onAnthropicKeyChange} mask/>
        {anthropicKey&&<div style={{marginTop:6,fontSize:10,color:"#7CFFB2"}}>✓ key set — {anthropicKey.slice(0,16)}…</div>}
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>FINNHUB API KEY (news + float)</div>
        <div style={{...styles.alpacaWarn,marginBottom:10}}>⚠ memory only · finnhub.io · 60 calls/min · routes through Cloudflare Worker for CORS</div>
        <SecretField label="FINNHUB API KEY" value={finnhubKey} placeholder="paste finnhub.io key…" onChange={onFinnhubKeyChange} mask/>
        {finnhubKey&&<div style={{marginTop:6,fontSize:10,color:"#7CFFB2"}}>✓ key set — {finnhubKey.slice(0,12)}…  · catalyst + float detection active</div>}
        {!finnhubKey&&<div style={{marginTop:6,fontSize:10,color:"#5a5a5a"}}>without this key: 📰 catalyst and 🐜 low-float badges will not appear</div>}
      </div>
      <div style={{...styles.settingGroup,borderColor:"#FFB627",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#FFB627"}}>ALPACA PAPER ACCOUNT</div>
        <div style={styles.alpacaWarn}>⚠ paper-trading keys only</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <SecretField label="API KEY ID" value={creds.keyId} placeholder="PK…" onChange={v=>onCredsChange({...creds,keyId:v.trim()})} mask={false}/>
          <SecretField label="SECRET KEY" value={creds.secret} placeholder="long random string" onChange={v=>onCredsChange({...creds,secret:v.trim()})} mask/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={onTest} style={styles.testBtn} disabled={connStatus.state==="testing"}>{connStatus.state==="testing"?"TESTING…":"▶ TEST CONNECTION"}</button>
          <ConnIndicator connStatus={connStatus}/>
        </div>
        {connStatus.state==="connected"&&<div style={{marginTop:12}}>
          <div style={styles.fieldLabel}>EXECUTION MODE</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>onModeChange("simulated")} style={{...styles.modeBtn,...(execMode==="simulated"?styles.modeBtnActive:{})}}>SIMULATED<div style={styles.modeBtnSub}>local paper only</div></button>
            <button onClick={()=>onModeChange("alpaca")} style={{...styles.modeBtn,...(execMode==="alpaca"?styles.modeBtnActiveAlpaca:{})}}>ALPACA PAPER<div style={styles.modeBtnSub}>real orders</div></button>
          </div>
        </div>}
        {connStatus.state==="connected"&&<div style={{marginTop:12}}>
          <div style={styles.fieldLabel}>DATA FEED</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>onChange({...settings,dataFeed:"iex"})} style={{...styles.modeBtn,...(settings.dataFeed==="iex"?styles.modeBtnActive:{})}}>IEX<div style={styles.modeBtnSub}>free · partial · stale on pennies</div></button>
            <button onClick={()=>onChange({...settings,dataFeed:"sip"})} style={{...styles.modeBtn,...(settings.dataFeed==="sip"?styles.modeBtnActiveAlpaca:{})}}>SIP<div style={styles.modeBtnSub}>Algo Trader Plus $99/mo · real</div></button>
          </div>
          <div style={{fontSize:9,color:"#FFB627",marginTop:6,lineHeight:1.4}}>⚠ Only switch to SIP AFTER subscribing to Algo Trader Plus in your Alpaca dashboard. Selecting SIP without the subscription will cause data errors.</div>
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
        <SettingGroup title="QUALITY FILTERS">
          <NumField label="MIN SCORE (0-100)" value={settings.minScore} min={0} max={100} step={5} onChange={v=>set("minScore",v)} help="only trade tickers scoring above this"/>
          <NumField label="MAX OPEN TRADES" value={settings.maxOpenTrades} min={1} max={10} step={1} onChange={v=>set("maxOpenTrades",v)} help="max concurrent positions"/>
          <NumField label="MIN GAP %" value={settings.gapMinPct} min={1} max={50} step={1} onChange={v=>set("gapMinPct",v)}/>
          <NumField label="MIN RVOL" value={settings.rvolEntry} min={1} max={20} step={0.5} onChange={v=>set("rvolEntry",v)}/>
          <NumField label="EXIT RVOL" value={settings.rvolExit} min={1} max={10} step={0.5} onChange={v=>set("rvolExit",v)}/>
          <NumField label="PRICE MIN $" value={settings.priceMin} min={0.01} max={50} step={0.1} onChange={v=>set("priceMin",v)}/>
          <NumField label="PRICE MAX $" value={settings.priceMax} min={1} max={1000} step={1} onChange={v=>set("priceMax",v)}/>
        </SettingGroup>
        <SettingGroup title="EXITS — 3-STAGE SCALE-OUT">
          <div style={{fontSize:9,color:"#7CFFB2",marginBottom:6,lineHeight:1.4}}>Stage 1 takes initial profit + moves SL to breakeven. Stage 2 locks in profit + moves SL up. Stage 3 (runner) trails on EMA9 to catch big moves.</div>
          <NumField label="STAGE 1 TP %" value={settings.tpPartialPct} min={1} max={10} step={0.5} onChange={v=>set("tpPartialPct",v)} help="initial profit take. Default 3% (was 0.5% which was killing winners)."/>
          <NumField label="STAGE 1 SIZE %" value={settings.tpPartialSize*100} min={10} max={60} step={5} onChange={v=>set("tpPartialSize",v/100)} help="% of position to close at Stage 1. Default 35%."/>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginTop:4}}>
            <input type="checkbox" checked={!!settings.tpStage2Enabled} onChange={e=>set("tpStage2Enabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>STAGE 2 ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Locks in profit at Stage 2 by moving SL to Stage 1's exit price.</div>
          <NumField label="STAGE 2 TP %" value={settings.tpStage2Pct} min={3} max={20} step={0.5} onChange={v=>set("tpStage2Pct",v)} help="second profit take. Default 7%."/>
          <NumField label="STAGE 2 SIZE %" value={settings.tpStage2Size*100} min={10} max={60} step={5} onChange={v=>set("tpStage2Size",v/100)} help="% of position to close at Stage 2. Default 35%. Remainder becomes the runner."/>
          <NumField label="RUNNER HARD CAP %" value={settings.tpFinalPct} min={5} max={100} step={1} onChange={v=>set("tpFinalPct",v)} help="full exit if runner reaches this. Default 25%."/>
          <NumField label="RUNNER RSI EXIT" value={settings.runnerRsiExit} min={70} max={95} step={1} onChange={v=>set("runnerRsiExit",v)} help="exit runner if RSI overheats. Default 82."/>
          <NumField label="RUNNER NO-PROGRESS MINS" value={settings.runnerNoProgressMins} min={5} max={120} step={5} onChange={v=>set("runnerNoProgressMins",v)} help="exit runner if N min without new high. Default 30."/>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginTop:8}}>
            <input type="checkbox" checked={!!settings.structuralSlEnabled} onChange={e=>set("structuralSlEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>STRUCTURAL SL ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Places SL below VWAP or recent swing low instead of fixed %. Prevents noise stops on volatile small-caps.</div>
          <NumField label="STRUCTURAL · VWAP BUFFER %" value={settings.structuralSlVwapBufferPct} min={0.1} max={2} step={0.1} onChange={v=>set("structuralSlVwapBufferPct",v)} help="SL placed N% below VWAP. Default 0.5%"/>
          <NumField label="STRUCTURAL · SWING LOOKBACK" value={settings.structuralSlSwingLookback} min={3} max={20} step={1} onChange={v=>set("structuralSlSwingLookback",v)} help="# of 1-min candles to find swing low. Default 5"/>
          <NumField label="STRUCTURAL · SWING BUFFER %" value={settings.structuralSlSwingBufferPct} min={0.1} max={2} step={0.1} onChange={v=>set("structuralSlSwingBufferPct",v)} help="SL placed N% below swing low. Default 0.2%"/>
          <NumField label="STRUCTURAL · MAX SL %" value={settings.structuralSlMaxPct} min={1} max={10} step={0.5} onChange={v=>set("structuralSlMaxPct",v)} help="hard cap — SL never goes wider than this. Default 3%"/>
          <NumField label="STRUCTURAL · MIN SL %" value={settings.structuralSlMinPct} min={0.2} max={3} step={0.1} onChange={v=>set("structuralSlMinPct",v)} help="hard floor — SL never tighter than this. Default 0.5%"/>
          <NumField label="LEGACY SL % (only if structural OFF)" value={settings.slPct} min={0.5} max={10} step={0.5} onChange={v=>set("slPct",v)} help="fallback fixed % SL when structural disabled"/>
          <NumField label="RISK PER TRADE %" value={settings.riskPct} min={0.1} max={2} step={0.1} onChange={v=>set("riskPct",v)} help="% of balance risked"/>
          <NumField label="MAX TRADE SIZE $" value={settings.maxTradeSize} min={10} max={100000} step={10} onChange={v=>set("maxTradeSize",v)}/>
          <NumField label="DAILY LOSS LIMIT $" value={settings.dailyLossLimit} min={50} max={10000} step={50} onChange={v=>set("dailyLossLimit",v)}/>
          <NumField label="COOLDOWN AFTER SL (ms)" value={settings.cooldownMs} min={300000} max={7200000} step={300000} onChange={v=>set("cooldownMs",v)} help="30min default"/>
          <NumField label="POST-EXIT COOLDOWN (mins)" value={(settings.postExitCooldownMs||300000)/60000} min={1} max={60} step={1} onChange={v=>set("postExitCooldownMs",v*60000)} help="prevents re-entry on a ticker we JUST exited. Default 5 min."/>
        </SettingGroup>
        <SettingGroup title="🧪 TESTING MODE">
          <div style={{fontSize:9,color:"#FFB627",marginBottom:6,lineHeight:1.4}}>Turn these OFF to maximize trade volume while testing. Turn back ON for real trading.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.regimeBrakeEnabled} onChange={e=>set("regimeBrakeEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>REGIME BRAKE ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>When ON: bot stops trading after too many losses (NO_TRADE / CHOPPY regimes). When OFF: trades regardless of recent win/loss streak.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.cooldownEnabled} onChange={e=>set("cooldownEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>SL COOLDOWN ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,lineHeight:1.4}}>When ON: a ticker is blocked for 30min after hitting a stop-loss. When OFF: can re-enter immediately.</div>
        </SettingGroup>
        <SettingGroup title="TIMING">
          <NumField label="SCAN INTERVAL MS" value={settings.scanIntervalMs} min={10000} max={300000} step={5000} onChange={v=>set("scanIntervalMs",v)}/>
          <NumField label="MOST ACTIVES COUNT" value={settings.mostActivesCount} min={10} max={50} step={5} onChange={v=>set("mostActivesCount",v)}/>
        </SettingGroup>
        <SettingGroup title="MOMENTUM IGNITION">
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.momentumIgnitionEnabled} onChange={e=>set("momentumIgnitionEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>IGNITION ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Aggressive open-window entry: bypasses pullback/CONFIRM requirement for high-conviction setups in the first N minutes.</div>
          <NumField label="IGNITION WINDOW (MIN FROM OPEN)" value={settings.ignitionWindowMins} min={5} max={60} step={1} onChange={v=>set("ignitionWindowMins",v)} help="how long after the open this lane is active"/>
          <NumField label="MIN GAP %" value={settings.ignitionMinGap} min={5} max={50} step={1} onChange={v=>set("ignitionMinGap",v)} help="minimum gap to qualify as ignition"/>
          <NumField label="MIN RVOL" value={settings.ignitionMinRvol} min={2} max={50} step={1} onChange={v=>set("ignitionMinRvol",v)} help="minimum relative volume"/>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.breakPreMarketHigh} onChange={e=>set("breakPreMarketHigh",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>REQUIRE PREMARKET HIGH BREAK</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,lineHeight:1.4}}>Only fire ignition entries when price breaks above the premarket high by 0.5%.</div>
        </SettingGroup>
        <SettingGroup title="INTRADAY MOMENTUM">
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.intradayMomentumEnabled} onChange={e=>set("intradayMomentumEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>INTRADAY ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Midday lane (10:30am-3:00pm). Catches breakouts after the ignition window closes. Uses last-hour high instead of premarket high.</div>
          <NumField label="MIN RVOL" value={settings.intradayMinRvol} min={2} max={30} step={1} onChange={v=>set("intradayMinRvol",v)} help="minimum relative volume"/>
          <NumField label="MAX VWAP EXTENSION %" value={settings.intradayMaxVwapExt} min={2} max={20} step={1} onChange={v=>set("intradayMaxVwapExt",v)} help="anti-chase — reject if price >N% above VWAP"/>
          <NumField label="BREAKOUT % ABOVE LAST-HOUR HIGH" value={settings.intradayBreakoutPct} min={0.1} max={2} step={0.1} onChange={v=>set("intradayBreakoutPct",v)} help="breakout confirmation buffer"/>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.intradayAvoidDeadZone} onChange={e=>set("intradayAvoidDeadZone",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>AVOID DEAD ZONE (11:30-1:30)</span>
          </label>
          <NumField label="DEAD ZONE RVOL OVERRIDE" value={settings.intradayDeadZoneRvolOverride} min={5} max={50} step={1} onChange={v=>set("intradayDeadZoneRvolOverride",v)} help="RVOL needed to trade during dead zone anyway"/>
        </SettingGroup>
        <SettingGroup title="🌅 PREMARKET SCANNER (Phase A)">
          <div style={{fontSize:9,color:"#7CFFB2",marginBottom:6,lineHeight:1.4}}>Scans 7:00–9:30 AM ET for stocks gapping ≥N%. Adds them to the watchlist so they're prewarmed and ready when the market opens. Does NOT trade premarket.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.premarketScannerEnabled} onChange={e=>set("premarketScannerEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>PREMARKET SCANNER ENABLED</span>
          </label>
          <NumField label="MIN GAP %" value={settings.premarketMinGap} min={5} max={50} step={1} onChange={v=>set("premarketMinGap",v)} help="default 10% — wider net catches more"/>
        </SettingGroup>
        <SettingGroup title="🌙 PREMARKET TRADING (Option C — limit orders)">
          <div style={{fontSize:9,color:"#FFB627",marginBottom:6,lineHeight:1.4}}>⚠ Trades during premarket (7:00–9:30 AM ET) using LIMIT orders + dedicated premarket indicators (PM VWAP, PM high, PM volume). Thin liquidity & wide spreads — high risk. Limit orders may not fill.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.preMarketEnabled} onChange={e=>set("preMarketEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>PREMARKET TRADING ENABLED</span>
          </label>
          <NumField label="START HOUR (ET)" value={settings.preMarketStartHour} min={4} max={9} step={1} onChange={v=>set("preMarketStartHour",v)} help="default 7 = 7:00 AM. Earlier = thinner liquidity."/>
          <NumField label="MIN GAP %" value={settings.preMarketMinGap} min={5} max={100} step={1} onChange={v=>set("preMarketMinGap",v)} help="default 15%"/>
          <NumField label="MIN PM VOLUME (shares)" value={settings.preMarketMinVolume} min={1000} max={1000000} step={1000} onChange={v=>set("preMarketMinVolume",v)} help="cumulative premarket shares. Default 50,000. RVOL unreliable PM."/>
          <NumField label="MAX EXT ABOVE PM VWAP %" value={settings.preMarketMaxExtPct} min={1} max={30} step={1} onChange={v=>set("preMarketMaxExtPct",v)} help="reject if chasing too far above PM VWAP. Default 8%"/>
          <NumField label="RSI MAX" value={settings.preMarketRsiMax} min={50} max={90} step={1} onChange={v=>set("preMarketRsiMax",v)} help="default 75"/>
          <NumField label="LIMIT BUFFER %" value={settings.preMarketLimitBufferPct} min={0.1} max={3} step={0.1} onChange={v=>set("preMarketLimitBufferPct",v)} help="place limit buy this % above price to improve fills. Default 0.5%"/>
          <NumField label="LIMIT TIMEOUT (sec)" value={settings.preMarketLimitTimeoutSec} min={15} max={300} step={15} onChange={v=>set("preMarketLimitTimeoutSec",v)} help="cancel unfilled limit orders after this. Default 90s"/>
          <NumField label="MAX PM POSITIONS" value={settings.preMarketMaxPositions} min={1} max={3} step={1} onChange={v=>set("preMarketMaxPositions",v)} help="concurrent premarket positions. Default 2 (conservative)"/>
          <NumField label="PM STOP LOSS %" value={settings.preMarketSlPct} min={1} max={15} step={0.5} onChange={v=>set("preMarketSlPct",v)} help="wider SL for premarket spreads. Default 5%"/>
        </SettingGroup>
        <SettingGroup title="⚡⚡ EARLY IGNITION (Phase B — risky)">
          <div style={{fontSize:9,color:"#FFB627",marginBottom:6,lineHeight:1.4}}>⚠ High-risk lane. Fires in first 5 min after open with relaxed VWAP/EMA requirements. Catches early breakouts but more false signals. Test carefully.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.earlyIgnitionEnabled} onChange={e=>set("earlyIgnitionEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>EARLY IGNITION ENABLED</span>
          </label>
          <NumField label="WINDOW (mins from open)" value={settings.earlyIgnitionWindowMins} min={1} max={15} step={1} onChange={v=>set("earlyIgnitionWindowMins",v)} help="default 5 = first 5 min"/>
          <NumField label="MIN GAP %" value={settings.earlyIgnitionMinGap} min={10} max={50} step={1} onChange={v=>set("earlyIgnitionMinGap",v)} help="default 15% (higher than IGNITION's 12%)"/>
          <NumField label="MIN RVOL (x)" value={settings.earlyIgnitionMinRvol} min={1} max={50} step={1} onChange={v=>set("earlyIgnitionMinRvol",v)} help="default 5x (lower than IGNITION's 8x — first min has limited data)"/>
          <NumField label="RSI MAX" value={settings.earlyIgnitionRsiMax} min={60} max={95} step={1} onChange={v=>set("earlyIgnitionRsiMax",v)} help="default 80 — wider tolerance for momentum"/>
        </SettingGroup>
        <SettingGroup title="EOD FORCE-CLOSE">
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.eodCloseEnabled} onChange={e=>set("eodCloseEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>EOD CLOSE ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Force-close all open positions N minutes before market close. Prevents overnight gap risk.</div>
          <NumField label="MINUTES BEFORE 4PM CLOSE" value={settings.eodCloseMinsBeforeClose} min={5} max={60} step={5} onChange={v=>set("eodCloseMinsBeforeClose",v)} help="default 30 = 3:30pm close"/>
        </SettingGroup>
        <SettingGroup title="⭐ QUALITY SETUP (strict A+ lane)">
          <div style={{fontSize:9,color:"#7CFFB2",marginBottom:6,lineHeight:1.4}}>The strictest entry filter: float, gap, RVOL, catalyst, breakout, structure. Runs 9:45-10:30am. Expect 0-3 trades/day.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.qualitySetupEnabled} onChange={e=>set("qualitySetupEnabled",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>QUALITY MODE ENABLED</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Adds a new ⭐ QUALITY lane. Runs alongside IGNITION/INTRADAY — turn off the others to A/B test.</div>
          <NumField label="MAX FLOAT (millions of shares)" value={settings.qualityMaxFloat/1e6} min={1} max={500} step={1} onChange={v=>set("qualityMaxFloat",v*1e6)} help="reject if float &gt; this. Default 20M."/>
          <NumField label="MIN GAP %" value={settings.qualityMinGap} min={5} max={100} step={1} onChange={v=>set("qualityMinGap",v)} help="default 20"/>
          <NumField label="MAX GAP %" value={settings.qualityMaxGap} min={50} max={500} step={10} onChange={v=>set("qualityMaxGap",v)} help="default 150"/>
          <NumField label="MIN RVOL (x)" value={settings.qualityMinRvol} min={5} max={100} step={1} onChange={v=>set("qualityMinRvol",v)} help="default 15x. Very strict."/>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <input type="checkbox" checked={!!settings.qualityRequireCatalyst} onChange={e=>set("qualityRequireCatalyst",e.target.checked)} style={{cursor:"pointer"}}/>
            <span style={styles.fieldLabel}>REQUIRE CATALYST (📰)</span>
          </label>
          <div style={{fontSize:9,color:"#5a5a5a",marginTop:-4,marginBottom:4,lineHeight:1.4}}>Skip tickers without recent news matching catalyst keywords.</div>
          <NumField label="5m RSI MIN" value={settings.qualityRsiMin} min={30} max={60} step={1} onChange={v=>set("qualityRsiMin",v)} help="default 45"/>
          <NumField label="5m RSI MAX" value={settings.qualityRsiMax} min={55} max={85} step={1} onChange={v=>set("qualityRsiMax",v)} help="default 68. Rejects extended."/>
          <NumField label="WINDOW START (mins from open)" value={settings.qualityWindowStartMins} min={0} max={60} step={5} onChange={v=>set("qualityWindowStartMins",v)} help="default 15 = 9:45am"/>
          <NumField label="WINDOW END (mins from open)" value={settings.qualityWindowEndMins} min={15} max={120} step={5} onChange={v=>set("qualityWindowEndMins",v)} help="default 60 = 10:30am"/>
          <NumField label="VOL SURGE MULTIPLIER" value={settings.qualityVolumeSurgeMultiplier} min={1} max={10} step={0.5} onChange={v=>set("qualityVolumeSurgeMultiplier",v)} help="1-min vol ≥ N× avg of last 10 mins. Default 2x."/>
        </SettingGroup>
      </div>
    </section>
  );
}

function SettingGroup({title,children}){return<div style={styles.settingGroup}><div style={styles.settingGroupTitle}>{title}</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div></div>;}
function NumField({label,value,min,max,step,onChange,help}){const[draft,setDraft]=useState(String(value));useEffect(()=>{setDraft(String(value));},[value]);const commit=()=>{const n=Number(draft);if(isNaN(n)){setDraft(String(value));return;}const c=Math.max(min,Math.min(max,n));onChange(c);setDraft(String(c));};return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={styles.fieldLabel}>{label}</div><input type="number" value={draft} min={min} max={max} step={step} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}} style={styles.input}/>{help&&<div style={{fontSize:9,color:"#3a3a3a",marginTop:2}}>{help}</div>}</label>;}
function SecretField({label,value,placeholder,onChange,mask}){const[revealed,setRevealed]=useState(false);return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={styles.fieldLabel}>{label}</div>{mask&&<button type="button" onClick={()=>setRevealed(r=>!r)} style={styles.eyeBtn}>{revealed?"HIDE":"SHOW"}</button>}</div><input type={mask&&!revealed?"password":"text"} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} spellCheck={false} autoComplete="off" style={styles.input}/></label>;}
function ConnIndicator({connStatus}){const cm={disconnected:"#5a5a5a",testing:"#FFB627",connected:"#7CFFB2",error:"#FF7A7A"};const color=cm[connStatus.state]||"#5a5a5a";return<div style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}><span style={{...styles.pillDot,background:color}}/><span style={{color,fontWeight:700,letterSpacing:1.5}}>{connStatus.state.toUpperCase()}</span>{connStatus.message&&<span style={{color:"#a0a0a0",fontSize:10}}>{connStatus.message}</span>}</div>;}
