  tpPartialSize:0.4,  // close 40% at partial

const fmt=(n,d=2)=>n===null||n===undefined||Number.isNaN(n)?"—":Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});

const getEST=()=>{
  const est=new Date(new Date().getTime()-(4*3600000));
  const h=est.getUTCHours(),m=est.getUTCMinutes();
  const minsFromOpen=(h-9)*60+(m-30);
  return{h,m,minsFromOpen,isPreMarket:h>=4&&minsFromOpen<0,isMarketOpen:minsFromOpen>=0&&minsFromOpen<=390};
};

/* ================================================================
   MARKET REGIME DETECTOR
   ================================================================ */
const regime={
  current:"UNKNOWN", // TRENDING | CHOPPY | NO_TRADE
  failureRate:0,
  recentSignals:[], // {result:'WIN'|'LOSS', t}
  noTradeUntil:0,
};

function updateRegime(result){
  const now=Date.now();
  regime.recentSignals.push({result,t:now});
  // keep last 10 signals from last 30 min
  regime.recentSignals=regime.recentSignals.filter(s=>now-s.t<1800000).slice(-10);
  const losses=regime.recentSignals.filter(s=>s.result==="LOSS").length;
  regime.failureRate=regime.recentSignals.length>0?(losses/regime.recentSignals.length)*100:0;
  if(regime.failureRate>=60){regime.current="NO_TRADE";regime.noTradeUntil=now+1800000;}
  else if(regime.failureRate>=40){regime.current="CHOPPY";}
  else{regime.current="TRENDING";}
}

function getRegimeMultiplier(){
  if(regime.current==="TRENDING")return 1.0;
  if(regime.current==="CHOPPY")return 0.5;
  return 0; // NO_TRADE
}

/* ================================================================
   PER-TICKER MARKET DATA + STATE MACHINE
   ================================================================ */
const mktData={};
const getMkt=t=>{
  if(!mktData[t])mktData[t]={
    price:0,prevClose:0,open:0,preMarketHigh:0,
    volume:0,avgVolByMinute:{},
    priceHistory:[],   // raw ticks
    candles1m:[],      // 1m OHLCV
    currentCandle:null,
    ema9:0,ema21:0,ema50:0,
    vwapNum:0,vwapDen:0,vwap:0,
    firstCandleHigh:0,firstCandleLow:0,firstCandleDone:false,
    rvol:0,gapPct:0,
    atr:0,atrHistory:[],
    // State machine
    state:"IDLE", // IDLE→WATCHING→PULLBACK→CONFIRM→ENTERED
    breakoutLevel:0,breakoutVolume:0,breakoutTime:0,
    pullbackLow:0,pullbackCandles:0,
    confirmCandle:null,
    // scoring
    score:0,
    // tracking
    slHits:0,lastSlTime:0,failedBreakouts:0,lastFailTime:0,
    // exit counters
    vwapBelowCount:0,rvolLowCount:0,redCandleCount:0,
    // partial exit tracking
    partialDone:false,
    source:"alpaca",
  };
  return mktData[t];
};

function calcEMA(prices,period){
  if(prices.length<period)return prices[prices.length-1]||0;
  const k=2/(period+1);
  let ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);
  return ema;
}

function calcRSI(prices){
  if(prices.length<2)return 50;
  let g=0,l=0;
  for(let i=1;i<prices.length;i++){const d=prices[i]-prices[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const n=prices.length-1;
  return 100-(100/(1+(g/n)/Math.max(l/n,0.0001)));
}

function calcATR(candles,period=14){
  if(candles.length<2)return 0;
  const trs=candles.slice(-period).map((c,i,a)=>{
    if(i===0)return c.high-c.low;
    const prev=a[i-1];
    return Math.max(c.high-c.low,Math.abs(c.high-prev.close),Math.abs(c.low-prev.close));
  });
  return trs.reduce((a,b)=>a+b,0)/trs.length;
}

function updateMkt(ticker,price,volume,prevClose,open){
  const d=getMkt(ticker);
  const{h,m,minsFromOpen}=getEST();
  const now=Date.now();
  d.price=price;
  if(prevClose>0)d.prevClose=prevClose;
  if(open>0)d.open=open;
  if(d.prevClose>0)d.gapPct=((d.open||price)-d.prevClose)/d.prevClose*100;
  if(minsFromOpen<0&&price>d.preMarketHigh)d.preMarketHigh=price;
  if(volume>0){d.vwapNum+=price*volume;d.vwapDen+=volume;d.vwap=d.vwapDen>0?d.vwapNum/d.vwapDen:price;d.volume+=volume;}
  // First candle tracking
  if(minsFromOpen===0){if(price>d.firstCandleHigh)d.firstCandleHigh=price;if(d.firstCandleLow===0||price<d.firstCandleLow)d.firstCandleLow=price;}
  if(minsFromOpen===1&&!d.firstCandleDone)d.firstCandleDone=true;
  // Price history & EMAs
  d.priceHistory.push(price);if(d.priceHistory.length>100)d.priceHistory.shift();
  if(d.priceHistory.length>=9)d.ema9=calcEMA(d.priceHistory,9);
  if(d.priceHistory.length>=21)d.ema21=calcEMA(d.priceHistory,21);
  if(d.priceHistory.length>=50)d.ema50=calcEMA(d.priceHistory,50);
  // 1m candle building
  const minKey=`${h}:${String(m).padStart(2,"0")}`;
  if(!d.currentCandle||d.currentCandle.key!==minKey){
    if(d.currentCandle)d.candles1m.push({...d.currentCandle});
    if(d.candles1m.length>60)d.candles1m.shift();
    d.currentCandle={key:minKey,open:price,high:price,low:price,close:price,volume:volume||0,t:now};
  } else {
    d.currentCandle.high=Math.max(d.currentCandle.high,price);
    d.currentCandle.low=Math.min(d.currentCandle.low,price);
    d.currentCandle.close=price;
    d.currentCandle.volume+=(volume||0);
  }
  // ATR
  if(d.candles1m.length>=2){const atr=calcATR(d.candles1m);d.atr=atr;d.atrHistory.push(atr);if(d.atrHistory.length>14)d.atrHistory.shift();}
  // RVOL
  if(volume>0){
    const k=minKey;
    if(!d.avgVolByMinute[k])d.avgVolByMinute[k]=[];
    d.avgVolByMinute[k].push(volume);if(d.avgVolByMinute[k].length>20)d.avgVolByMinute[k].shift();
    const arr=d.avgVolByMinute[k];
    const avg=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(avg>0)d.rvol=volume/avg;
  }
  // State machine update
  updateStateMachine(ticker,price,volume);
}

/* ================================================================
   STATE MACHINE: IDLE → WATCHING → PULLBACK → CONFIRM
   ================================================================ */
function updateStateMachine(ticker,price,volume){
  const d=getMkt(ticker);
  const{minsFromOpen}=getEST();
  if(minsFromOpen<0||minsFromOpen>360)return;

  switch(d.state){
    case"IDLE":
      // Detect breakout above first candle high or recent resistance
      if(d.firstCandleDone&&price>d.firstCandleHigh*1.002&&d.rvol>=5&&volume>0){
        d.state="WATCHING";
        d.breakoutLevel=price;
        d.breakoutVolume=volume;
        d.breakoutTime=Date.now();
        d.pullbackCandles=0;
      }
      break;

    case"WATCHING":
      // Wait for pullback (retracement toward VWAP/EMA9)
      if(Date.now()-d.breakoutTime>300000){d.state="IDLE";break;} // 5 min timeout
      const retraceTarget=Math.max(d.vwap,d.ema9)*0.999;
      if(price<=d.breakoutLevel*0.985&&price>=retraceTarget){
        d.state="PULLBACK";
        d.pullbackLow=price;
        d.pullbackCandles=0;
      }
      // If price extends without pullback — too extended, skip
      if(price>d.breakoutLevel*1.10){d.state="IDLE";}
      break;

    case"PULLBACK":
      d.pullbackCandles++;
      if(price<d.pullbackLow)d.pullbackLow=price;
      // Pullback failed — closed below VWAP or EMA9
      if(price<d.vwap*0.995||price<d.ema9*0.995){
        d.state="IDLE";d.failedBreakouts++;d.lastFailTime=Date.now();
        break;
      }
      // Too many pullback candles = momentum lost
      if(d.pullbackCandles>6){d.state="IDLE";break;}
      // Continuation candle: price pushes back above pullback high
      if(price>d.breakoutLevel*0.99&&d.rvol>=3&&d.currentCandle&&d.currentCandle.close>d.currentCandle.open){
        d.state="CONFIRM";
        d.confirmCandle={price,volume,ema9:d.ema9,ema21:d.ema21,vwap:d.vwap,t:Date.now()};
      }
      break;

    case"CONFIRM":
      // Confirmation is valid for 2 candles then reset
      if(Date.now()-d.confirmCandle?.t>120000){d.state="IDLE";}
      break;
  }
}

/* ================================================================
   TICKER SCORING (0-100)
   ================================================================ */
function scoreTickker(ticker,s){
  const d=getMkt(ticker);
  let score=0;
  // RVOL (25 pts)
  if(d.rvol>=10)score+=25;
  else if(d.rvol>=5)score+=15;
  else if(d.rvol>=2)score+=5;
  // Gap quality (20 pts)
  if(d.gapPct>=20)score+=20;
  else if(d.gapPct>=10)score+=12;
  else if(d.gapPct>=5)score+=6;
  // Trend strength — EMA alignment (20 pts)
  if(d.ema9>d.ema21&&d.ema21>0&&d.ema9>d.ema9*0.999)score+=20;
  else if(d.ema9>d.ema21)score+=12;
  // Structure score (20 pts)
  // Higher lows in last 5 candles
  const last5=d.candles1m.slice(-5);
  if(last5.length>=3){
    const lows=last5.map(c=>c.low);
    const higherLows=lows.every((l,i)=>i===0||l>=lows[i-1]);
    if(higherLows)score+=10;
  }
  // State machine confirmation
  if(d.state==="CONFIRM")score+=10;
  // Liquidity (15 pts) — based on RVOL × price as proxy for dollar volume
  const dollarVol=d.rvol*d.price*1000;
  if(dollarVol>5000000)score+=15;
  else if(dollarVol>1000000)score+=8;
  else score+=2;
  // Penalty — failed breakouts
  if(d.failedBreakouts>=3&&Date.now()-d.lastFailTime<1800000)score-=30;
  // Penalty — recent SL
  if(Date.now()-d.lastSlTime<s.cooldownMs)score=-100;
  d.score=Math.max(0,Math.min(100,score));
  return d.score;
}

/* ================================================================
   ENTRY CHECK — ALL LAYERS MUST PASS
   ================================================================ */
function checkEntry(ticker,s){
  const d=getMkt(ticker);
  const{minsFromOpen,isMarketOpen,isPreMarket}=getEST();
  const now=Date.now();
  const rsi=calcRSI(d.priceHistory);

  // Pre-market
  if(isPreMarket){
    if(!s.preMarketEnabled)return{pass:false,reason:"Pre-market disabled"};
    if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price outside range`};
    if(d.gapPct<s.gapMinPct)return{pass:false,reason:`Gap ${d.gapPct.toFixed(1)}% < ${s.gapMinPct}%`};
    return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,strategy:"PRE",score:d.score};
  }

  if(!isMarketOpen)return{pass:false,reason:"Market closed"};

  // Time filters
  if(minsFromOpen>60&&!s.continuationEnabled)return{pass:false,reason:"After 10:30am — GAP window closed"};
  if(minsFromOpen>360)return{pass:false,reason:"After 3:30pm"};
  const{h,m}=getEST();
  // Dead zone 11:30am-2pm unless continuation explicitly on
  if(h===11&&m>=30&&h<14&&regime.current==="CHOPPY")return{pass:false,reason:"Dead zone (11:30-2pm choppy)"};
  // 30 min before close
  if(minsFromOpen>360)return{pass:false,reason:"< 30 min to close"};

  // Regime gate
  if(regime.current==="NO_TRADE")return{pass:false,reason:`🚫 NO_TRADE regime (${regime.failureRate.toFixed(0)}% fail rate)`};
  if(regime.current==="CHOPPY"&&d.gapPct<15)return{pass:false,reason:"CHOPPY regime — gap < 15% required"};

  // Price filter
  if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price $${d.price.toFixed(2)} outside $${s.priceMin}-$${s.priceMax}`};

  // Cooldown / blacklist
  if(now-d.lastSlTime<s.cooldownMs)return{pass:false,reason:`Cooldown — SL hit ${Math.round((now-d.lastSlTime)/60000)}m ago`};
  if(d.failedBreakouts>=3&&now-d.lastFailTime<1800000)return{pass:false,reason:`Blacklisted — 3 failed breakouts`};

  // Score gate
  const score=scoreTickker(ticker,s);
  if(score<s.minScore)return{pass:false,reason:`Score ${score}/100 < ${s.minScore} min`};

  // Gap requirement
  if(d.gapPct<s.gapMinPct)return{pass:false,reason:`Gap ${d.gapPct.toFixed(1)}% < ${s.gapMinPct}%`};

  // State machine — must be in CONFIRM state
  if(d.state!=="CONFIRM")return{pass:false,reason:`State: ${d.state} (need CONFIRM)`};

  // EMA alignment
  if(d.ema9>0&&d.ema21>0&&d.ema9<d.ema21)return{pass:false,reason:`EMA9 < EMA21 — no trend`};

  // VWAP filter
  if(d.vwap>0&&d.price<d.vwap)return{pass:false,reason:`Below VWAP $${d.vwap.toFixed(2)}`};

  // RSI filter — not overextended
  if(rsi>80)return{pass:false,reason:`RSI ${rsi.toFixed(0)} > 80 — overextended`};
  if(rsi<50)return{pass:false,reason:`RSI ${rsi.toFixed(0)} < 50 — weak momentum`};

  // ATR compression check — skip if volatility too low
  if(d.atr>0&&d.atrHistory.length>=5){
    const avgAtr=d.atrHistory.reduce((a,b)=>a+b,0)/d.atrHistory.length;
    if(d.atr<avgAtr*0.5)return{pass:false,reason:"ATR compressed — choppy"};
  }

  // RVOL
  if(d.rvol>0&&d.rvol<s.rvolEntry)return{pass:false,reason:`RVOL ${d.rvol.toFixed(1)}x < ${s.rvolEntry}x`};

  // Too extended from VWAP — chasing
  if(d.vwap>0){
    const extPct=((d.price-d.vwap)/d.vwap)*100;
    if(extPct>15)return{pass:false,reason:`Price ${extPct.toFixed(1)}% above VWAP — chasing`};
  }

  const strategy=minsFromOpen<=60?"GAP":"CONT";
  return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,strategy,score,vwap:d.vwap,ema9:d.ema9};
}

/* ================================================================
   YAHOO + ALPACA SCANNERS
   ================================================================ */
async function fetchYahooGappers(minGap,minPrice,maxPrice){
  const results={};
  const urls=["https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?scrIds=day_gainers&count=50","https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?scrIds=most_actives&count=50"];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers:{Accept:"application/json"}});
      if(!r.ok)continue;
      const j=await r.json();
      const quotes=j?.finance?.result?.[0]?.quotes||[];
      for(const q of quotes){
        if(!q.symbol||results[q.symbol])continue;
        const price=q.regularMarketPrice||q.preMarketPrice||0;
        const changeP=q.regularMarketChangePercent||q.preMarketChangePercent||0;
        if(price<minPrice||price>maxPrice||changeP<minGap)continue;
        results[q.symbol]={symbol:q.symbol,price,prevClose:q.regularMarketPreviousClose||0,changeP,volume:q.regularMarketVolume||0};
      }
    }catch(e){}
  }
  return Object.values(results);
}

async function fetchYahooQuotes(symbols){
  if(!symbols.length)return{};
  const result={};
  for(let i=0;i<symbols.length;i+=20){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.slice(i,i+20).join(",")}&fields=regularMarketPrice,regularMarketVolume,regularMarketChangePercent,regularMarketPreviousClose,preMarketPrice,preMarketChangePercent,preMarketVolume,regularMarketOpen`);
      if(!r.ok)continue;
      const j=await r.json();
      for(const q of j?.quoteResponse?.result||[]){
        if(q.symbol)result[q.symbol]={price:q.preMarketPrice||q.regularMarketPrice||0,prevClose:q.regularMarketPreviousClose||0,open:q.regularMarketOpen||0,volume:q.preMarketVolume||q.regularMarketVolume||0,changeP:q.preMarketChangePercent||q.regularMarketChangePercent||0};
      }
    }catch(e){}
  }
  return result;
}

const aH=c=>({"APCA-API-KEY-ID":c.keyId,"APCA-API-SECRET-KEY":c.secret,"Content-Type":"application/json"});
async function aGet(path,creds,data=false){const r=await fetch(`${data?`${PROXY}/data`:PROXY}${path}`,{headers:aH(creds)});if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);}return r.json();}
async function aPost(path,body,creds){const r=await fetch(`${PROXY}${path}`,{method:"POST",headers:aH(creds),body:JSON.stringify(body)});if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,200)}`);}return r.json();}
async function closeAlpacaPos(ticker,creds){for(let i=0;i<3;i++){try{const r=await fetch(`${PROXY}/v2/positions/${ticker}`,{method:"DELETE",headers:aH(creds)});if(r.ok||r.status===404)return true;}catch(e){}await new Promise(res=>setTimeout(res,500));}return false;}
const alpaca={
  getAccount:c=>aGet("/v2/account",c),
  getPositions:c=>aGet("/v2/positions",c),
  getMostActives:async(c,n=30)=>{for(const p of[`/v1beta1/screener/stocks/most-actives?by=volume&top=${n}`,`/v2/stocks/most-actives?by=volume&top=${n}`]){try{const r=await aGet(p,c,true);const l=r?.most_actives||r?.stocks||[];if(l.length>0)return l;}catch(e){}}return[];},
  getSnapshots:async(syms,c)=>{if(!syms.length)return{};const result={};for(let i=0;i<syms.length;i+=50){try{const r=await aGet(`/v2/stocks/snapshots?symbols=${syms.slice(i,i+50).join(",")}&feed=iex`,c,true);Object.assign(result,r||{});}catch(e){}}return result;},
};

/* ================================================================
   REDUCER
   ================================================================ */
const initialState={balance:STARTING_BALANCE,openTrades:[],closedTrades:[],equity:[{t:Date.now(),v:STARTING_BALANCE}]};
function reducer(state,action){
  switch(action.type){
    case"OPEN":
      if(state.openTrades.some(o=>o.ticker===action.trade.ticker))return state;
      if(state.openTrades.length>=action.maxOpen)return state;
      return{...state,openTrades:[...state.openTrades,action.trade]};
    case"CLOSE_PARTIAL":{
      const trade=state.openTrades.find(o=>o.id===action.tradeId);
      if(!trade||trade.partialDone)return state;
      const partialPnl=(action.pct/100)*trade.size*(action.closePrice-trade.entry)/trade.entry;
      return{...state,balance:state.balance+partialPnl,openTrades:state.openTrades.map(o=>o.id===action.tradeId?{...o,partialDone:true,sl:o.entry,size:o.size*(1-action.sizePct)}:{...o})};
    }
    case"CLOSE":{
      const{tradeId,closePrice,reason,t}=action;
      const trade=state.openTrades.find(o=>o.id===tradeId);
      if(!trade)return state;
      const pnlPct=trade.direction==="LONG"?((closePrice-trade.entry)/trade.entry)*100:((trade.entry-closePrice)/trade.entry)*100;
      const pnl=(pnlPct/100)*trade.size;
      const assertion={expected:"—",actual:`${pnlPct.toFixed(2)}%`,pass:reason==="TP_FINAL"||reason==="TP_PARTIAL"||reason==="MANUAL"?pnl>0:true};
      const newBalance=state.balance+pnl;
      return{...state,balance:newBalance,openTrades:state.openTrades.filter(o=>o.id!==tradeId),closedTrades:[{...trade,closedAt:nowIso(),closePrice,reason,pnl,pnlPct,holdMs:t-new Date(trade.openedAt).getTime(),assertion},...state.closedTrades],equity:[...state.equity,{t,v:newBalance}]};
    }
    case"RESET":return{...initialState,equity:[{t:Date.now(),v:STARTING_BALANCE}]};
    default:return state;
  }
}


/* ================================================================
   APP
   ================================================================ */
function App(){
  const [running,setRunning]=useState(false);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [tradeSize,setTradeSize]=useState(25);
  const [anthropicKey,setAnthropicKey]=useState("");
  const [signals,setSignals]=useState([]);
  const [scanLog,setScanLog]=useState([]);
  const [radar,setRadar]=useState([]);
  const [circuitBreaker,setCircuitBreaker]=useState(false);
  const [regimeState,setRegimeState]=useState("UNKNOWN");
  const [creds,setCreds]=useState({keyId:"",secret:""});
  const [execMode,setExecMode]=useState("simulated");
  const [connStatus,setConnStatus]=useState({state:"disconnected",message:""});
  const [alpacaAccount,setAlpacaAccount]=useState(null);
  const [alpacaPositions,setAlpacaPositions]=useState([]);
  const [alpacaErrors,setAlpacaErrors]=useState([]);
  const [alpacaTickers,setAlpacaTickers]=useState([]);
  const [yahooTickers,setYahooTickers]=useState([]);
  const [tickerData,setTickerData]=useState({});
  const [alpacaLastScan,setAlpacaLastScan]=useState(null);
  const [yahooLastScan,setYahooLastScan]=useState(null);
  const [wsStatus,setWsStatus]=useState("off");
  const [trades,dispatch]=useReducer(reducer,initialState);
  const [dailyLoss,setDailyLoss]=useState(0);
  const [stale,setStale]=useState(false);

  const settingsRef=useRef(settings);useEffect(()=>{settingsRef.current=settings;},[settings]);
  const credsRef=useRef(creds);useEffect(()=>{credsRef.current=creds;},[creds]);
  const modeRef=useRef(execMode);useEffect(()=>{modeRef.current=execMode;},[execMode]);
  const priceRef=useRef({});
  // Live price-series buffer per ticker for charting open positions
  const [priceSeries,setPriceSeries]=useState({}); // {TICKER:[{t,p},...]}
  const [focusedTicker,setFocusedTicker]=useState(null); // which ticker the hero chart shows
  const tradesRef=useRef(trades);useEffect(()=>{tradesRef.current=trades;},[trades]);
  const alpacaTickersRef=useRef(alpacaTickers);useEffect(()=>{alpacaTickersRef.current=alpacaTickers;},[alpacaTickers]);
  const yahooTickersRef=useRef(yahooTickers);useEffect(()=>{yahooTickersRef.current=yahooTickers;},[yahooTickers]);
  const allTickers=useMemo(()=>[...new Set([...alpacaTickers,...yahooTickers])],[alpacaTickers,yahooTickers]);
  const allTickersRef=useRef(allTickers);useEffect(()=>{allTickersRef.current=allTickers;},[allTickers]);

  // Regime polling
  useEffect(()=>{const id=setInterval(()=>setRegimeState(regime.current),5000);return()=>clearInterval(id);},[]);
  useEffect(()=>{const id=setInterval(()=>{const{h,m}=getEST();if(h===9&&m===30){setDailyLoss(0);setCircuitBreaker(false);}}   ,60000);return()=>clearInterval(id);},[]);

  const testConnection=async()=>{
    if(!creds.keyId||!creds.secret){setConnStatus({state:"error",message:"paste API keys first"});return;}
    setConnStatus({state:"testing",message:"connecting…"});
    try{const acct=await alpaca.getAccount(creds);setAlpacaAccount(acct);setConnStatus({state:"connected",message:`${acct.account_number} · $${Number(acct.buying_power).toLocaleString()} bp`});}
    catch(e){setConnStatus({state:"error",message:String(e.message||e)});setAlpacaAccount(null);}
  };

  useEffect(()=>{if(connStatus.state!=="connected")return;let cancelled=false;const refresh=async()=>{try{const[acct,pos]=await Promise.all([alpaca.getAccount(credsRef.current),alpaca.getPositions(credsRef.current)]);if(cancelled)return;setAlpacaAccount(acct);setAlpacaPositions(pos);}catch(e){if(!cancelled)setAlpacaErrors(p=>[{t:Date.now(),msg:`refresh: ${e.message||e}`},...p.slice(0,9)]);}};refresh();const id=setInterval(refresh,10000);return()=>{cancelled=true;clearInterval(id);};},[connStatus.state]);

  // Alpaca scan
  useEffect(()=>{if(connStatus.state!=="connected")return;let cancelled=false;const scan=async()=>{try{const actives=await alpaca.getMostActives(credsRef.current,settingsRef.current.mostActivesCount);if(cancelled)return;const syms=actives.map(a=>a.symbol).filter(s=>s&&s.length<=5);const snaps=await alpaca.getSnapshots(syms,credsRef.current);if(cancelled)return;const s=settingsRef.current;const newRadar=[];for(const sym of syms){const snap=snaps[sym];if(!snap)continue;const price=snap.latestTrade?.p||snap.minuteBar?.c||0;const prevClose=snap.prevDailyBar?.c||0;const open=snap.dailyBar?.o||0;const volume=snap.minuteBar?.v||0;const vwap=snap.dailyBar?.vw||0;if(!price)continue;updateMkt(sym,price,volume,prevClose,open);if(vwap>0)getMkt(sym).vwap=vwap;getMkt(sym).source="alpaca";priceRef.current[sym]=price;const d=getMkt(sym);scoreTickker(sym,s);const{isPreMarket}=getEST();if(isPreMarket&&d.gapPct>=s.gapMinPct&&price>=s.priceMin&&price<=s.priceMax)newRadar.push({ticker:sym,price,gapPct:d.gapPct,volume,rvol:d.rvol,prevClose,score:d.score,source:"Alpaca"});}if(newRadar.length)setRadar(prev=>{const ex=prev.filter(r=>!newRadar.find(n=>n.ticker===r.ticker));return[...newRadar,...ex].sort((a,b)=>b.gapPct-a.gapPct).slice(0,30);});setAlpacaTickers(syms);setAlpacaLastScan(new Date().toISOString());setTickerData(prev=>{const next={...prev};for(const sym of syms)next[sym]={...getMkt(sym)};return next;});}catch(e){setAlpacaErrors(p=>[{t:Date.now(),msg:`scan: ${e.message||e}`},...p.slice(0,9)]);}};scan();const id=setInterval(scan,settings.scanIntervalMs);return()=>{cancelled=true;clearInterval(id);};},[connStatus.state,settings.scanIntervalMs]);

  // Yahoo scan
  useEffect(()=>{let cancelled=false;const scan=async()=>{try{const s=settingsRef.current;const gappers=await fetchYahooGappers(s.gapMinPct,s.priceMin,s.priceMax);if(cancelled||!gappers.length)return;const syms=gappers.map(g=>g.symbol).filter(s=>s&&s.length<=6);const quotes=await fetchYahooQuotes(syms);if(cancelled)return;const newRadar=[];const newSyms=[];for(const sym of syms){const q=quotes[sym]||{};const g=gappers.find(x=>x.symbol===sym)||{};const price=q.price||g.price||0;const prevClose=q.prevClose||g.prevClose||0;const volume=q.volume||g.volume||0;const changeP=q.changeP||g.changeP||0;if(!price)continue;updateMkt(sym,price,volume,prevClose,q.open||0);getMkt(sym).source="yahoo";scoreTickker(sym,s);priceRef.current[sym]=price;if(changeP>=s.gapMinPct)newRadar.push({ticker:sym,price,gapPct:changeP,volume,rvol:getMkt(sym).rvol,prevClose,score:getMkt(sym).score,source:"Yahoo"});newSyms.push(sym);}if(newRadar.length)setRadar(prev=>{const ex=prev.filter(r=>!newRadar.find(n=>n.ticker===r.ticker));return[...newRadar,...ex].sort((a,b)=>b.gapPct-a.gapPct).slice(0,30);});setYahooTickers(prev=>[...new Set([...prev,...newSyms])]);setYahooLastScan(new Date().toISOString());setTickerData(prev=>{const next={...prev};for(const sym of newSyms)next[sym]={...getMkt(sym)};return next;});}catch(e){}};scan();const id=setInterval(scan,120000);return()=>{cancelled=true;clearInterval(id);};},[settings.gapMinPct,settings.priceMin,settings.priceMax]);

  // WebSocket
  useEffect(()=>{if(connStatus.state!=="connected"||!allTickers.length)return;let ws=null,reconnectTimer=null;const connect=()=>{setWsStatus("connecting");try{ws=new WebSocket("wss://stream.data.alpaca.markets/v2/iex");ws.onopen=()=>ws.send(JSON.stringify({action:"auth",key:credsRef.current.keyId,secret:credsRef.current.secret}));ws.onmessage=(e)=>{try{const msgs=JSON.parse(e.data);for(const msg of msgs){if(msg.T==="success"&&msg.msg==="authenticated"){setWsStatus("live");ws.send(JSON.stringify({action:"subscribe",trades:allTickersRef.current.slice(0,100)}));}if(msg.T==="t"&&msg.S&&msg.p){const sym=msg.S,p=msg.p,v=msg.s||0,t=Date.now();updateMkt(sym,p,v);priceRef.current[sym]=p;setTickerData(prev=>({...prev,[sym]:{...getMkt(sym),price:p}}));// only buffer series for tickers we have open positions on
const openSymbols=new Set(tradesRef.current.openTrades.map(o=>o.ticker));if(openSymbols.has(sym)){setPriceSeries(prev=>{const arr=prev[sym]||[];const next=[...arr,{t,p}].filter(x=>x.t>=t-3600000);// 1h rolling window
return{...prev,[sym]:next};});}}}}catch(err){}};ws.onerror=()=>setWsStatus("error");ws.onclose=()=>{setWsStatus("reconnecting");reconnectTimer=setTimeout(connect,2000);};}catch(e){setWsStatus("error");reconnectTimer=setTimeout(connect,3000);}};connect();return()=>{clearTimeout(reconnectTimer);try{if(ws)ws.close();}catch(e){}setWsStatus("off");};},[connStatus.state,allTickers.length]);

  // Data staleness — if no Alpaca scan in 2x scan interval, mark stale
  useEffect(()=>{const id=setInterval(()=>{if(!alpacaLastScan){setStale(false);return;}const age=Date.now()-new Date(alpacaLastScan).getTime();setStale(age>settingsRef.current.scanIntervalMs*2);},2000);return()=>clearInterval(id);},[alpacaLastScan]);

  // ============================================================
  // EXIT CHECKS — ADAPTIVE WITH PARTIAL PROFIT
  // ============================================================
  useEffect(()=>{
    const open=tradesRef.current.openTrades;if(!open.length)return;
    const now=Date.now(),s=settingsRef.current;
    for(const trade of open){
      const d=getMkt(trade.ticker);const px=priceRef.current[trade.ticker];if(!px)continue;
      const holdMs=now-new Date(trade.openedAt).getTime();
      if(holdMs<60000)continue; // min 60s hold
      const counter=getCounter(trade.ticker);
      const uplPct=((px-trade.entry)/trade.entry)*100;

      // PHASE 2: Partial profit + move to breakeven
      if(!trade.partialDone&&uplPct>=s.tpPartialPct){
        dispatch({type:"CLOSE_PARTIAL",tradeId:trade.id,closePrice:px,pct:uplPct,sizePct:s.tpPartialSize});
        getMkt(trade.ticker).partialDone=true;
        continue;
      }

      let hit=null;

      // Hard TP (runner target)
      if(px>=trade.entry*(1+s.tpFinalPct/100)){hit="TP_FINAL";resetCounter(trade.ticker);}

      // Hard SL (or breakeven after partial)
      else if(px<=trade.sl){hit="SL";resetCounter(trade.ticker);}

      // VWAP stop — 3 consecutive ticks below VWAP
      else if(d.vwap>0&&px<d.vwap*0.998){
        counter.vwapBelow++;counter.rvolLow=0;counter.redCandles=0;
        if(counter.vwapBelow>=3){hit="VWAP_STOP";resetCounter(trade.ticker);}
      }

      // EMA9 trailing stop — 3 closes below EMA9 after partial
      else if(trade.partialDone&&d.ema9>0&&px<d.ema9*0.998){
        counter.redCandles++;
        if(counter.redCandles>=3){hit="EMA9_TRAIL";resetCounter(trade.ticker);}
      }

      // RVOL fade — 5 ticks
      else if(d.rvol>0&&d.rvol<s.rvolExit){
        counter.rvolLow++;counter.vwapBelow=0;
        if(counter.rvolLow>=5){hit="RVOL_FADE";resetCounter(trade.ticker);}
      }

      else{resetCounter(trade.ticker);}

      if(hit){
        const closePrice=px;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
        const isLoss=closePrice<trade.entry;
        if(isLoss){
          const loss=Math.abs((closePrice-trade.entry)/trade.entry*trade.size);
          setDailyLoss(d=>{const nl=d+loss;if(nl>=settingsRef.current.dailyLossLimit)setCircuitBreaker(true);return nl;});
          getMkt(trade.ticker).slHits++;getMkt(trade.ticker).lastSlTime=Date.now();
          updateRegime("LOSS");setRegimeState(regime.current);
        } else {
          updateRegime("WIN");setRegimeState(regime.current);
        }
        dispatch({type:"CLOSE",tradeId:trade.id,closePrice,reason:hit,t:now});
      }
    }
  },[tickerData]);

  // ============================================================
  // ENTRY LOOP
  // ============================================================
  useEffect(()=>{
    if(!running)return;
    const fire=async()=>{
      if(circuitBreaker){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:"🚨 Circuit breaker"},...p.slice(0,49)]);return;}
      if(regime.current==="NO_TRADE"){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:`🚫 NO_TRADE regime (${regime.failureRate.toFixed(0)}% fail rate)`},...p.slice(0,49)]);return;}
      const open=new Set(tradesRef.current.openTrades.map(t=>t.ticker));
      const openCount=tradesRef.current.openTrades.length;
      if(openCount>=settingsRef.current.maxOpenTrades){return;}
      const balance=tradesRef.current.balance;
      const s=settingsRef.current;
      const{minsFromOpen,isPreMarket}=getEST();

      // Score all tickers, sort by score, take top candidates
      const scored=allTickersRef.current
        .filter(t=>!open.has(t))
        .map(t=>({ticker:t,score:scoreTickker(t,s)}))
        .filter(t=>t.score>=s.minScore)
        .sort((a,b)=>b.score-a.score)
        .slice(0,5); // only check top 5 scored

      for(const {ticker} of scored){
        const check=checkEntry(ticker,s);
        if(!check.pass){
          setScanLog(p=>[{t:nowIso(),ticker,reason:check.reason},...p.slice(0,49)]);
          continue;
        }
        const d=getMkt(ticker);const px=d.price;if(!px)continue;

        // Risk-based position sizing
        const riskAmt=balance*(s.riskPct/100)*getRegimeMultiplier();
        const slDist=px*(s.slPct/100);
        const calcSize=riskAmt/slDist*px;
        const size=Math.min(calcSize,s.maxTradeSize,balance*0.05);
        if(size<10)continue;

        const sl=px*(1-(s.slPct/100));
        const tp=px*(1+(s.tpFinalPct/100));

        setSignals(prev=>[{id:`${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,tpPct:s.tpFinalPct,slPct:s.slPct,size,rvol:d.rvol,gapPct:d.gapPct,rsi:calcRSI(d.priceHistory),vwap:d.vwap,ema9:d.ema9,strategy:check.strategy,score:check.score,rr:((tp-px)/(px-sl)),createdAt:nowIso()},...prev].slice(0,50));

        let alpacaOrderId=null;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
          try{
            let body;
            if(check.strategy==="PRE"){const qty=Math.max(1,Math.floor(size/px));body={symbol:ticker,qty:String(qty),side:"buy",type:"market",time_in_force:"day",extended_hours:true};}
            else body={symbol:ticker,notional:size.toFixed(2),side:"buy",type:"market",time_in_force:"day"};
            const order=await aPost("/v2/orders",body,credsRef.current);
            alpacaOrderId=order.id;
          }catch(e){setAlpacaErrors(p=>[{t:Date.now(),msg:`order ${ticker}: ${e.message||e}`},...p.slice(0,9)]);continue;}
        }

        dispatch({type:"OPEN",trade:{id:`t-${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,slPct:s.slPct,tpPct:s.tpFinalPct,size,vwap:d.vwap,ema9:d.ema9,rvol:d.rvol,gapPct:d.gapPct,strategy:check.strategy,score:check.score,openedAt:nowIso(),openPrice:px,partialDone:false,alpacaOrderId},maxOpen:s.maxOpenTrades});
        open.add(ticker);
        // Reset state machine
        getMkt(ticker).state="IDLE";
        break; // one trade per fire cycle
      }
    };
    fire();const id=setInterval(fire,settings.scanIntervalMs);return()=>clearInterval(id);
  },[running,settings.scanIntervalMs,connStatus.state,circuitBreaker]);

  const manualClose=(trade)=>{
    const px=priceRef.current[trade.ticker]??trade.entry;
    resetCounter(trade.ticker);
    if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
    dispatch({type:"CLOSE",tradeId:trade.id,closePrice:px,reason:"MANUAL",t:Date.now()});
  };

  const stats=useMemo(()=>{
    const closed=trades.closedTrades;
    const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<0);
    const winRate=closed.length?(wins.length/closed.length)*100:0;
    const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnlPct,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((a,b)=>a+b.pnlPct,0)/losses.length:0;
    const avgRR=wins.length&&losses.length?avgWin/Math.abs(avgLoss):null;
    const avgHold=closed.length?closed.reduce((a,b)=>a+b.holdMs,0)/closed.length/1000:0;
    let peak=-Infinity,maxDD=0;
    for(const p of trades.equity){if(p.v>peak)peak=p.v;const dd=((p.v-peak)/peak)*100;if(dd<maxDD)maxDD=dd;}
    return{total:closed.length,open:trades.openTrades.length,winRate,avgRR,avgHoldSec:avgHold,maxDD,pnl:trades.balance-STARTING_BALANCE,pnlPct:((trades.balance-STARTING_BALANCE)/STARTING_BALANCE)*100};
  },[trades]);

  // Auto-pick focused ticker when one becomes available
  useEffect(()=>{const openSyms=trades.openTrades.map(o=>o.ticker);if(!focusedTicker&&openSyms.length)setFocusedTicker(openSyms[0]);if(focusedTicker&&!openSyms.includes(focusedTicker))setFocusedTicker(openSyms[0]||null);},[trades.openTrades,focusedTicker]);
  const focusedSeries=focusedTicker?(priceSeries[focusedTicker]||[]):[];
  const focusedDelta=useMemo(()=>{if(focusedSeries.length<2)return null;const f=focusedSeries[0].p,l=focusedSeries[focusedSeries.length-1].p;return{abs:l-f,pct:((l-f)/f)*100};},[focusedSeries]);
  const focusedTrade=focusedTicker?trades.openTrades.find(o=>o.ticker===focusedTicker):null;
  const estNow=getEST();const S=styles;
  const wsColor=wsStatus==="live"?"#7CFFB2":wsStatus==="connecting"||wsStatus==="reconnecting"?"#FFB627":"#5a5a5a";
  const regimeColor=regimeState==="TRENDING"?"#7CFFB2":regimeState==="CHOPPY"?"#FFB627":"#FF7A7A";

  return(
    <div style={S.shell}>
      <header style={S.header}>
        <div style={S.brand}><span style={S.brandDot}/><span style={S.brandText}>TRADEEDGE</span><span style={S.brandSub}>// SELECTIVE MOMENTUM</span></div>
        <div style={S.headerRight}>
          {circuitBreaker&&<div style={{...S.pill,borderColor:"#FF7A7A",color:"#FF7A7A"}}><span style={{...S.pillDot,background:"#FF7A7A"}}/>🚨 CIRCUIT BREAKER</div>}
          <div style={{...S.pill,borderColor:regimeColor,color:regimeColor}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:regimeColor,display:"inline-block",animation:regimeState==="TRENDING"?"pulse 1.5s infinite":"none"}}/>
            {regimeState==="TRENDING"?"TRENDING":regimeState==="CHOPPY"?"CHOPPY":"NO TRADE"} · {regime.failureRate.toFixed(0)}% fail
          </div>
          <div style={{...S.pill,borderColor:"#5a5a5a",color:"#5a5a5a"}}>EST {String(estNow.h).padStart(2,"0")}:{String(estNow.m).padStart(2,"0")} {estNow.isPreMarket?"PRE-MKT":estNow.isMarketOpen?"OPEN":"CLOSED"}</div>
          {connStatus.state==="connected"&&<div style={{...S.pill,borderColor:wsColor,color:wsColor,fontSize:9}}><span style={{width:5,height:5,borderRadius:"50%",background:wsColor,display:"inline-block",marginRight:4,animation:wsStatus==="live"?"pulse 1.5s infinite":"none"}}/>{wsStatus==="live"?"WS LIVE":wsStatus.toUpperCase()}</div>}
          <AlpacaPill connStatus={connStatus} mode={execMode}/>
          <StatusPill running={running} stale={stale}/>
          <button onClick={()=>setRunning(r=>!r)} style={{...S.runBtn,...(running?S.runBtnStop:{})}}>{running?"■ STOP":"▶ START"}</button>
          <button onClick={()=>setSettingsOpen(o=>!o)} style={{...S.resetBtn,...(settingsOpen?{borderColor:"#FFB627",color:"#FFB627"}:{})}}>⚙ SETTINGS</button>
          <button onClick={()=>{dispatch({type:"RESET"});setSignals([]);setDailyLoss(0);setCircuitBreaker(false);setScanLog([]);setRadar([]);setYahooTickers([]);setAlpacaTickers([]);}} style={S.resetBtn}>RESET</button>
        </div>
      </header>

      {settingsOpen&&<SettingsDrawer settings={settings} onChange={setSettings} onReset={()=>setSettings(DEFAULT_SETTINGS)} onClose={()=>setSettingsOpen(false)} creds={creds} onCredsChange={setCreds} connStatus={connStatus} onTest={testConnection} execMode={execMode} onModeChange={setExecMode} alpacaAccount={alpacaAccount} alpacaErrors={alpacaErrors} anthropicKey={anthropicKey} onAnthropicKeyChange={setAnthropicKey}/>}

      <section style={S.row}>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardHead}>
            <div>
              <div style={S.cardLabel}>LIVE FEED — OPEN POSITIONS</div>
              {focusedTicker?(()=>{const px=priceRef.current[focusedTicker]||(focusedSeries.length?focusedSeries[focusedSeries.length-1].p:null);return(<div style={S.cardBigNum}>{focusedTicker} ${px?fmt(px,2):"—"} {focusedDelta&&<span style={{...S.delta,color:focusedDelta.abs>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(focusedDelta.pct)} since open</span>}</div>);})():(<div style={S.cardBigNum}>— <span style={{fontSize:11,color:"#5a5a5a"}}>no open positions</span></div>)}
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",maxWidth:"60%",justifyContent:"flex-end"}}>
              {trades.openTrades.map(o=>{const px=priceRef.current[o.ticker]||o.entry;const upl=((px-o.entry)/o.entry)*100;const active=focusedTicker===o.ticker;return(<button key={o.id} onClick={()=>setFocusedTicker(o.ticker)} style={{background:active?"#1a1a1a":"#060606",border:`1px solid ${active?"#FFB627":"#1a1a1a"}`,color:active?"#FFB627":"#e8e8e8",padding:"4px 8px",fontSize:10,fontFamily:"inherit",borderRadius:2,cursor:"pointer",letterSpacing:1}}>{o.ticker} <span style={{color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl,1)}</span></button>);})}
            </div>
          </div>
          <div style={{height:170,marginTop:12}}>
            {focusedSeries.length>1?(
            <ResponsiveContainer>
              <AreaChart data={focusedSeries} margin={{top:6,right:10,left:0,bottom:0}}>
                <defs><linearGradient id="posg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFB627" stopOpacity={0.4}/><stop offset="100%" stopColor="#FFB627" stopOpacity={0}/></linearGradient></defs>
                <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
                <YAxis domain={["auto","auto"]} stroke="#5a5a5a" fontSize={10} tickFormatter={v=>`$${v.toFixed(2)}`}/>
                <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,focusedTicker]}/>
                {focusedTrade&&<ReferenceLine y={focusedTrade.entry} stroke="#FFB627" strokeDasharray="3 3" label={{value:"ENTRY",fill:"#FFB627",fontSize:9,position:"insideTopRight"}}/>}
                {focusedTrade&&<ReferenceLine y={focusedTrade.tp} stroke="#7CFFB2" strokeDasharray="3 3" label={{value:"TP",fill:"#7CFFB2",fontSize:9,position:"insideTopRight"}}/>}
                {focusedTrade&&<ReferenceLine y={focusedTrade.sl} stroke="#FF7A7A" strokeDasharray="3 3" label={{value:"SL",fill:"#FF7A7A",fontSize:9,position:"insideTopRight"}}/>}
                <Area type="monotone" dataKey="p" stroke="#FFB627" strokeWidth={1.5} fill="url(#posg)" isAnimationActive={false}/>
              </AreaChart>
            </ResponsiveContainer>
            ):(<div style={{...S.empty,height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>{focusedTicker?"waiting for ticks…":"open a position to see live feed"}</div>)}
          </div>
          {stale&&<div style={S.warnBar}>⚠ STALE — no recent Alpaca scan</div>}
        </div>
        <div style={{...S.card,flex:1,minWidth:260}}>
          <div style={S.cardLabel}>RUN STATS</div>
          <div style={S.bigEquity}>${fmt(trades.balance,2)} <span style={{color:stats.pnl>=0?"#7CFFB2":"#FF7A7A",fontSize:13}}>{fmtPct(stats.pnlPct)}</span></div>
          <div style={S.statGrid}>
            <Stat label="TRADES" v={`${stats.total}`}/><Stat label="OPEN" v={`${stats.open}/${settings.maxOpenTrades}`}/>
            <Stat label="WIN RATE" v={`${stats.winRate.toFixed(1)}%`}/><Stat label="AVG R:R" v={stats.avgRR?stats.avgRR.toFixed(2):"—"}/>
            <Stat label="MAX DD" v={`${stats.maxDD.toFixed(2)}%`} bad={stats.maxDD<-3}/><Stat label="AVG HOLD" v={`${stats.avgHoldSec.toFixed(0)}s`}/>
          </div>
          <div style={{marginTop:10,background:"#060606",border:"1px solid #1a1a1a",padding:"10px 12px",borderRadius:2}}>
            <div style={S.cardLabel}>DAILY LOSS</div>
            <div style={{fontSize:16,fontWeight:500,color:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#e8e8e8",marginTop:4}}>-${fmt(dailyLoss,2)} <span style={{fontSize:10,color:"#5a5a5a"}}>/ ${settings.dailyLossLimit}</span></div>
            <div style={{marginTop:6,height:4,background:"#1a1a1a",borderRadius:2}}><div style={{height:"100%",width:`${Math.min(100,(dailyLoss/settings.dailyLossLimit)*100)}%`,background:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#7CFFB2",borderRadius:2}}/></div>
          </div>
        </div>
      </section>

      {connStatus.state==="connected"&&alpacaAccount&&<AlpacaAccountCard account={alpacaAccount} positions={alpacaPositions} mode={execMode} errors={alpacaErrors}/>}

      <section style={S.card}>
        <div style={S.cardLabel}>EQUITY CURVE</div>
        <div style={{height:80,marginTop:8}}>
          <ResponsiveContainer>
            <LineChart data={trades.equity} margin={{top:8,right:10,left:0,bottom:0}}>
              <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
              <YAxis stroke="#5a5a5a" fontSize={10} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"Equity"]}/>
              <ReferenceLine y={STARTING_BALANCE} stroke="#3a3a3a" strokeDasharray="3 3"/>
              <Line type="monotone" dataKey="v" stroke="#7CFFB2" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </section>

      {radar.length>0&&(
        <section style={{...S.card,borderLeft:"2px solid #7CFFB2"}}>
          <div style={{...S.cardLabel,color:"#7CFFB2"}}>🌅 GAP RADAR — {radar.length} CANDIDATES (sorted by score)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginTop:8}}>
            {radar.sort((a,b)=>(b.score||0)-(a.score||0)).map(r=>(
              <div key={r.ticker} style={{background:"#060606",border:`1px solid ${(r.score||0)>=settings.minScore?"#0e3a22":"#1a1a1a"}`,padding:10,borderRadius:2}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,color:(r.score||0)>=settings.minScore?"#7CFFB2":"#e8e8e8"}}>{r.ticker}</div>
                  <div style={{fontSize:10,fontWeight:700,color:(r.score||0)>=settings.minScore?"#7CFFB2":"#5a5a5a"}}>{r.score||0}</div>
                </div>
                <div style={{fontSize:15,marginTop:4}}>${fmt(r.price,2)}</div>
                <div style={{fontSize:11,color:"#7CFFB2",marginTop:2}}>GAP {fmtPct(r.gapPct)}</div>
                <div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>RVOL {r.rvol>0?r.rvol.toFixed(1)+"x":"—"} · {r.source==="Yahoo"?<span style={{color:"#FFB627"}}>YF</span>:"ALP"}</div>
              </div>
            ))}
          </div>
        </section>
      )}

      <section style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div style={S.cardLabel}>MOMENTUM SCANNER — {allTickers.length} SYMBOLS · min score {settings.minScore}</div>
          <div style={{display:"flex",gap:12,fontSize:9,color:"#5a5a5a"}}>
            <span>Alpaca: {alpacaLastScan?shortTime(alpacaLastScan):"—"}</span>
            <span style={{color:"#FFB627"}}>Yahoo: {yahooLastScan?shortTime(yahooLastScan):"—"}</span>
            <span style={{color:wsColor}}>{wsStatus==="live"?"● WS LIVE":"● WS "+wsStatus}</span>
          </div>
        </div>
        {!allTickers.length?<div style={S.empty}>Scanning via Yahoo Finance + Alpaca…</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>TICKER</th><th style={S.th}>STATE</th><th style={S.thR}>SCORE</th>
                <th style={S.thR}>PRICE</th><th style={S.thR}>GAP%</th><th style={S.thR}>RVOL</th>
                <th style={S.thR}>RSI</th><th style={S.thR}>EMA9</th><th style={S.thR}>VWAP</th><th style={S.th}>STATUS</th>
              </tr></thead>
              <tbody>
                {allTickers.slice(0,40).map(ticker=>{
                  const d=tickerData[ticker]||getMkt(ticker);
                  const rsi=calcRSI(d.priceHistory||[]);
                  const score=d.score||0;
                  const check=checkEntry(ticker,settings);
                  const hasPos=trades.openTrades.find(o=>o.ticker===ticker);
                  const stateColor=d.state==="CONFIRM"?"#7CFFB2":d.state==="PULLBACK"?"#FFB627":d.state==="WATCHING"?"#a78bfa":"#3a3a3a";
                  return(
                    <tr key={ticker} style={{background:check.pass?"#0a1a0a":hasPos?"#1a1a0a":"transparent"}}>
                      <td style={{...S.td,fontWeight:700,color:check.pass?"#7CFFB2":hasPos?"#FFB627":"#e8e8e8"}}>{ticker}{hasPos?" 📌":""}</td>
                      <td style={{...S.td,color:stateColor,fontSize:9}}>{d.state||"IDLE"}</td>
                      <td style={{...S.thR,padding:"6px 8px",borderBottom:"1px solid #131313",color:score>=settings.minScore?"#7CFFB2":score>=50?"#FFB627":"#5a5a5a"}}>{score}</td>
                      <td style={S.tdR}>${fmt(d.price,2)}</td>
                      <td style={{...S.tdR,color:d.gapPct>=settings.gapMinPct?"#7CFFB2":d.gapPct>0?"#FFB627":"#5a5a5a"}}>{d.gapPct?fmtPct(d.gapPct):"—"}</td>
                      <td style={{...S.tdR,color:d.rvol>=settings.rvolEntry?"#7CFFB2":d.rvol>=2?"#FFB627":"#5a5a5a"}}>{d.rvol>0?`${d.rvol.toFixed(1)}x`:"—"}</td>
                      <td style={{...S.tdR,color:rsi>=50&&rsi<=80?"#7CFFB2":"#5a5a5a"}}>{rsi.toFixed(0)}</td>
                      <td style={{...S.tdR,color:d.ema9>d.ema21&&d.ema21>0?"#7CFFB2":"#5a5a5a"}}>{d.ema9?`$${fmt(d.ema9,2)}`:"—"}</td>
                      <td style={{...S.tdR,color:d.price>d.vwap?"#7CFFB2":"#5a5a5a"}}>{d.vwap?`$${fmt(d.vwap,2)}`:"—"}</td>
                      <td style={{...S.td,fontSize:9}}>
                        {check.pass?<span style={{color:"#7CFFB2"}}>✅ ENTRY READY</span>:<span style={{color:"#3a3a3a"}}>{check.reason}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>OPEN POSITIONS ({trades.openTrades.length}/{settings.maxOpenTrades})</div>
          {!trades.openTrades.length?<div style={S.empty}>{running?"scanning for high-quality setups…":"press START"}</div>:(
            <table style={S.table}>
              <thead><tr><th style={S.th}>SYM</th><th style={S.thR}>SCORE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>NOW</th><th style={S.thR}>SL</th><th style={S.thR}>TP</th><th style={S.thR}>HOLD</th><th style={S.thR}>UPL</th><th style={S.th}>CHART</th><th style={S.th}></th></tr></thead>
              <tbody>{trades.openTrades.map(o=>{
                const px=priceRef.current[o.ticker]??o.entry,upl=((px-o.entry)/o.entry)*100;
                const holdSec=Math.floor((Date.now()-new Date(o.openedAt).getTime())/1000);
                const isLocked=holdSec<60;
                const sparkData=(priceSeries[o.ticker]||[]).slice(-60); // last 60 ticks for sparkline
                const isFocused=focusedTicker===o.ticker;
                return(<tr key={o.id} onClick={()=>setFocusedTicker(o.ticker)} style={{cursor:"pointer",background:isFocused?"#0d0d0d":"transparent"}}>
                  <td style={{...S.td,fontWeight:700,color:isFocused?"#FFB627":"#e8e8e8"}}>{o.ticker}{o.partialDone?" ½":""}</td>
                  <td style={{...S.tdR,color:o.score>=settings.minScore?"#7CFFB2":"#FFB627"}}>{o.score||"—"}</td>
                  <td style={S.tdR}>${fmt(o.entry,2)}</td><td style={S.tdR}>${fmt(px,2)}</td>
                  <td style={{...S.tdR,color:"#FF7A7A"}}>${fmt(o.sl,2)}</td>
                  <td style={{...S.tdR,color:"#7CFFB2"}}>${fmt(o.tp,2)}</td>
                  <td style={{...S.tdR,color:isLocked?"#FFB627":"#5a5a5a"}}>{isLocked?`🔒${holdSec}s`:`${holdSec}s`}</td>
                  <td style={{...S.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl)}</td>
                  <td style={{...S.td,padding:"2px 4px"}}>
                    {sparkData.length>1?(
                      <div style={{width:60,height:24}}>
                        <ResponsiveContainer>
                          <AreaChart data={sparkData} margin={{top:2,right:0,left:0,bottom:0}}>
                            <defs><linearGradient id={`spark-${o.id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={upl>=0?"#7CFFB2":"#FF7A7A"} stopOpacity={0.5}/><stop offset="100%" stopColor={upl>=0?"#7CFFB2":"#FF7A7A"} stopOpacity={0}/></linearGradient></defs>
                            <Area type="monotone" dataKey="p" stroke={upl>=0?"#7CFFB2":"#FF7A7A"} strokeWidth={1} fill={`url(#spark-${o.id})`} isAnimationActive={false}/>
                          </AreaChart>
                        </ResponsiveContainer>
                      </div>
                    ):(<span style={{color:"#3a3a3a",fontSize:9}}>—</span>)}
                  </td>
                  <td style={S.td}><button onClick={e=>{e.stopPropagation();manualClose(o);}} style={S.closeBtn}>CLOSE</button></td>
                </tr>);
              })}</tbody>
            </table>
          )}
        </div>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardLabel}>TRADE JOURNAL ({trades.closedTrades.length})</div>
          {!trades.closedTrades.length?<div style={S.empty}>no closed trades yet</div>:(
            <div style={{maxHeight:240,overflow:"auto"}}>
              <table style={S.table}>
                <thead><tr><th style={S.th}>TIME</th><th style={S.th}>SYM</th><th style={S.thR}>SCORE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>EXIT</th><th style={S.th}>RSN</th><th style={S.thR}>GAP</th><th style={S.thR}>RVOL</th><th style={S.thR}>PNL%</th><th style={S.thR}>PNL$</th><th style={S.thR}>HOLD</th></tr></thead>
                <tbody>{trades.closedTrades.map(c=>{
                  const rsnColor=c.reason==="TP_FINAL"||c.reason==="TP_PARTIAL"?"#7CFFB2":c.reason==="MANUAL"?"#FFB627":"#FF7A7A";
                  return(<tr key={c.id}>
                    <td style={S.td}>{shortTime(c.closedAt)}</td>
                    <td style={S.td}>{c.ticker}{c.aiTrade?" 🤖":""}</td>
                    <td style={{...S.tdR,color:c.score>=settings.minScore?"#7CFFB2":"#5a5a5a"}}>{c.score||"—"}</td>
                    <td style={S.tdR}>${fmt(c.entry,2)}</td><td style={S.tdR}>${fmt(c.closePrice,2)}</td>
                    <td style={{...S.td,color:rsnColor,fontSize:9}}>{c.reason}</td>
                    <td style={{...S.tdR,color:"#FFB627"}}>{c.gapPct?fmtPct(c.gapPct):"—"}</td>
                    <td style={S.tdR}>{c.rvol?`${c.rvol.toFixed(1)}x`:"—"}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(c.pnlPct)}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{c.pnl>=0?"+":""}{fmt(c.pnl,2)}</td>
                    <td style={S.tdR}>{(c.holdMs/1000).toFixed(0)}s</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          )}
        </div>
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>ENTRIES TAKEN ({signals.length})</div>
          {!signals.length?<div style={S.empty}>no entries yet</div>:(
            <div style={{maxHeight:130,overflow:"auto"}}>{signals.map(s=><div key={s.id} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.createdAt)}</span><span style={{fontWeight:700,minWidth:50,color:"#7CFFB2"}}>{s.ticker}</span><span style={{fontSize:9,color:"#FFB627",marginRight:6}}>#{s.score}</span><span style={{fontSize:10,color:"#a0a0a0"}}>gap {fmtPct(s.gapPct)} · rvol {s.rvol?.toFixed(1)}x · rsi {s.rsi?.toFixed(0)} · ema9 ${fmt(s.ema9,2)} · r:r {s.rr?.toFixed(1)}</span></div>)}</div>
          )}
        </div>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>SCAN LOG ({scanLog.length})</div>
          {!scanLog.length?<div style={S.empty}>no rejections</div>:(
            <div style={{maxHeight:130,overflow:"auto"}}>{scanLog.map((s,i)=><div key={i} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.t)}</span><span style={{fontWeight:700,minWidth:50}}>{s.ticker}</span><span style={{fontSize:10,color:"#FF7A7A"}}>{s.reason}</span></div>)}</div>
          )}
        </div>
      </section>

      <footer style={S.footer}>selective momentum · max {settings.maxOpenTrades} trades · min score {settings.minScore}/100 · {settings.riskPct}% risk · partial +{settings.tpPartialPct}% → runner to +{settings.tpFinalPct}% · regime: {regimeState}</footer>
    </div>
  );
}

function StatusPill({running,stale}){let color="#7CFFB2",text="RUNNING";if(!running){color="#5a5a5a";text="IDLE";}if(running&&stale){color="#FFB627";text="DEGRADED";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function AlpacaPill({connStatus,mode}){let color="#5a5a5a",text="ALPACA OFF";if(connStatus.state==="testing"){color="#FFB627";text="ALPACA…";}else if(connStatus.state==="connected"){color=mode==="alpaca"?"#FFB627":"#7CFFB2";text=mode==="alpaca"?"ALPACA LIVE":"ALPACA READY";}else if(connStatus.state==="error"){color="#FF7A7A";text="ALPACA ERR";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function Diag({label,value,bad}){return<div style={{textAlign:"right"}}><div style={{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"}}>{label}</div><div style={{fontSize:13,marginTop:2,color:bad?"#FF7A7A":"#e8e8e8"}}>{value}</div></div>;}
function Stat({label,v,bad}){return<div style={styles.statCell}><div style={styles.statLabel}>{label}</div><div style={{...styles.statVal,color:bad?"#FF7A7A":"#e8e8e8"}}>{v}</div></div>;}

function AlpacaAccountCard({account,positions,mode,errors}){
  const equity=Number(account.equity),bp=Number(account.buying_power),lastEq=Number(account.last_equity),dayPnl=equity-lastEq,dayPnlPct=lastEq?(dayPnl/lastEq)*100:0;
  return<section style={{...styles.card,borderLeft:"2px solid #FFB627"}}><div style={styles.cardHead}><div><div style={styles.cardLabel}>ALPACA PAPER · {account.account_number}{mode==="alpaca"?<span style={{color:"#FFB627",marginLeft:10}}>· ORDERS LIVE</span>:<span style={{color:"#5a5a5a",marginLeft:10}}>· read-only</span>}</div><div style={styles.cardBigNum}>${fmt(equity,2)} <span style={{...styles.delta,color:dayPnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(dayPnlPct)} today</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,auto)",gap:16}}><Diag label="BUYING POWER" value={`$${fmt(bp,0)}`}/><Diag label="CASH" value={`$${fmt(Number(account.cash),0)}`}/><Diag label="POSITIONS" value={positions.length}/><Diag label="STATUS" value={account.status}/></div></div>{errors.length>0&&<div style={{marginTop:12}}><div style={styles.cardLabel}>API ERRORS</div><div style={{maxHeight:60,overflow:"auto",fontSize:10,color:"#FF7A7A"}}>{errors.slice(0,3).map((e,i)=><div key={i}><span style={{color:"#5a5a5a"}}>{shortTime(new Date(e.t).toISOString())}</span> {e.msg}</div>)}</div></div>}</section>;
}

function SettingsDrawer({settings,onChange,onReset,onClose,creds,onCredsChange,connStatus,onTest,execMode,onModeChange,alpacaAccount,anthropicKey,onAnthropicKeyChange}){
  const set=(k,v)=>onChange({...settings,[k]:v});
  return(
    <section style={styles.settingsCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><div style={styles.cardLabel}>SETTINGS</div><div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>changes apply immediately</div></div>
        <div style={{display:"flex",gap:8}}><button onClick={onReset} style={styles.resetBtn}>RESTORE DEFAULTS</button><button onClick={onClose} style={styles.resetBtn}>CLOSE</button></div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>STRATEGY MODES</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <button onClick={()=>set("preMarketEnabled",!settings.preMarketEnabled)} style={{...styles.modeBtn,...(settings.preMarketEnabled?{background:"#1a0e3a",borderColor:"#a78bfa",color:"#a78bfa"}:{})}}>PRE-MARKET<div style={styles.modeBtnSub}>4am-9:30am</div><div style={{marginTop:6,fontSize:9,color:settings.preMarketEnabled?"#a78bfa":"#5a5a5a"}}>{settings.preMarketEnabled?"● ON":"○ OFF"}</div></button>
          <button onClick={()=>set("gapMomentumEnabled",!settings.gapMomentumEnabled)} style={{...styles.modeBtn,...(settings.gapMomentumEnabled?styles.modeBtnActive:{})}}>GAP MOMENTUM<div style={styles.modeBtnSub}>9:30-10:30am</div><div style={{marginTop:6,fontSize:9,color:settings.gapMomentumEnabled?"#7CFFB2":"#5a5a5a"}}>{settings.gapMomentumEnabled?"● ON":"○ OFF"}</div></button>
          <button onClick={()=>set("continuationEnabled",!settings.continuationEnabled)} style={{...styles.modeBtn,...(settings.continuationEnabled?styles.modeBtnActiveAlpaca:{})}}>CONTINUATION<div style={styles.modeBtnSub}>9:30am-3:30pm</div><div style={{marginTop:6,fontSize:9,color:settings.continuationEnabled?"#FFB627":"#5a5a5a"}}>{settings.continuationEnabled?"● ON":"○ OFF"}</div></button>
        </div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>ANTHROPIC API KEY</div>
        <div style={{...styles.alpacaWarn,marginBottom:10}}>⚠ memory only · console.anthropic.com</div>
        <SecretField label="ANTHROPIC API KEY" value={anthropicKey} placeholder="sk-ant-api03-…" onChange={onAnthropicKeyChange} mask/>
        {anthropicKey&&<div style={{marginTop:6,fontSize:10,color:"#7CFFB2"}}>✓ key set — {anthropicKey.slice(0,16)}…</div>}
      </div>
      <div style={{...styles.settingGroup,borderColor:"#FFB627",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#FFB627"}}>ALPACA PAPER ACCOUNT</div>
        <div style={styles.alpacaWarn}>⚠ paper-trading keys only</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <SecretField label="API KEY ID" value={creds.keyId} placeholder="PK…" onChange={v=>onCredsChange({...creds,keyId:v.trim()})} mask={false}/>
          <SecretField label="SECRET KEY" value={creds.secret} placeholder="long random string" onChange={v=>onCredsChange({...creds,secret:v.trim()})} mask/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={onTest} style={styles.testBtn} disabled={connStatus.state==="testing"}>{connStatus.state==="testing"?"TESTING…":"▶ TEST CONNECTION"}</button>
          <ConnIndicator connStatus={connStatus}/>
        </div>
        {connStatus.state==="connected"&&<div style={{marginTop:12}}>
          <div style={styles.fieldLabel}>EXECUTION MODE</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>onModeChange("simulated")} style={{...styles.modeBtn,...(execMode==="simulated"?styles.modeBtnActive:{})}}>SIMULATED<div style={styles.modeBtnSub}>local paper only</div></button>
            <button onClick={()=>onModeChange("alpaca")} style={{...styles.modeBtn,...(execMode==="alpaca"?styles.modeBtnActiveAlpaca:{})}}>ALPACA PAPER<div style={styles.modeBtnSub}>real orders</div></button>
          </div>
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
        <SettingGroup title="QUALITY FILTERS">
          <NumField label="MIN SCORE (0-100)" value={settings.minScore} min={0} max={100} step={5} onChange={v=>set("minScore",v)} help="only trade tickers scoring above this"/>
          <NumField label="MAX OPEN TRADES" value={settings.maxOpenTrades} min={1} max={10} step={1} onChange={v=>set("maxOpenTrades",v)} help="max concurrent positions"/>
          <NumField label="MIN GAP %" value={settings.gapMinPct} min={1} max={50} step={1} onChange={v=>set("gapMinPct",v)}/>
          <NumField label="MIN RVOL" value={settings.rvolEntry} min={1} max={20} step={0.5} onChange={v=>set("rvolEntry",v)}/>
          <NumField label="EXIT RVOL" value={settings.rvolExit} min={1} max={10} step={0.5} onChange={v=>set("rvolExit",v)}/>
          <NumField label="PRICE MIN $" value={settings.priceMin} min={0.01} max={50} step={0.1} onChange={v=>set("priceMin",v)}/>
          <NumField label="PRICE MAX $" value={settings.priceMax} min={1} max={1000} step={1} onChange={v=>set("priceMax",v)}/>
        </SettingGroup>
        <SettingGroup title="EXITS AND RISK">
          <NumField label="PARTIAL TP %" value={settings.tpPartialPct} min={0.2} max={3} step={0.1} onChange={v=>set("tpPartialPct",v)} help="close 40% here, move SL to breakeven"/>
          <NumField label="PARTIAL SIZE %" value={settings.tpPartialSize*100} min={10} max={80} step={10} onChange={v=>set("tpPartialSize",v/100)} help="% of position to close at partial TP"/>
          <NumField label="RUNNER TP %" value={settings.tpFinalPct} min={2} max={30} step={0.5} onChange={v=>set("tpFinalPct",v)} help="full exit for remaining position"/>
          <NumField label="SL %" value={settings.slPct} min={0.5} max={10} step={0.5} onChange={v=>set("slPct",v)} help="tighter = better R:R"/>
          <NumField label="RISK PER TRADE %" value={settings.riskPct} min={0.1} max={2} step={0.1} onChange={v=>set("riskPct",v)} help="% of balance risked"/>
          <NumField label="MAX TRADE SIZE $" value={settings.maxTradeSize} min={10} max={100000} step={10} onChange={v=>set("maxTradeSize",v)}/>
          <NumField label="DAILY LOSS LIMIT $" value={settings.dailyLossLimit} min={50} max={10000} step={50} onChange={v=>set("dailyLossLimit",v)}/>
          <NumField label="COOLDOWN AFTER SL (ms)" value={settings.cooldownMs} min={300000} max={7200000} step={300000} onChange={v=>set("cooldownMs",v)} help="30min default"/>
        </SettingGroup>
        <SettingGroup title="TIMING">
          <NumField label="SCAN INTERVAL MS" value={settings.scanIntervalMs} min={10000} max={300000} step={5000} onChange={v=>set("scanIntervalMs",v)}/>
          <NumField label="MOST ACTIVES COUNT" value={settings.mostActivesCount} min={10} max={50} step={5} onChange={v=>set("mostActivesCount",v)}/>
        </SettingGroup>
      </div>
    </section>
  );
}

function SettingGroup({title,children}){return<div style={styles.settingGroup}><div style={styles.settingGroupTitle}>{title}</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div></div>;}
function NumField({label,value,min,max,step,onChange,help}){const[draft,setDraft]=useState(String(value));useEffect(()=>{setDraft(String(value));},[value]);const commit=()=>{const n=Number(draft);if(isNaN(n)){setDraft(String(value));return;}const c=Math.max(min,Math.min(max,n));onChange(c);setDraft(String(c));};return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={styles.fieldLabel}>{label}</div><input type="number" value={draft} min={min} max={max} step={step} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}} style={styles.input}/>{help&&<div style={{fontSize:9,color:"#3a3a3a",marginTop:2}}>{help}</div>}</label>;}
function SecretField({label,value,placeholder,onChange,mask}){const[revealed,setRevealed]=useState(false);return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={styles.fieldLabel}>{label}</div>{mask&&<button type="button" onClick={()=>setRevealed(r=>!r)} style={styles.eyeBtn}>{revealed?"HIDE":"SHOW"}</button>}</div><input type={mask&&!revealed?"password":"text"} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} spellCheck={false} autoComplete="off" style={styles.input}/></label>;}
function ConnIndicator({connStatus}){const cm={disconnected:"#5a5a5a",testing:"#FFB627",connected:"#7CFFB2",error:"#FF7A7A"};const color=cm[connStatus.state]||"#5a5a5a";return<div style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}><span style={{...styles.pillDot,background:color}}/><span style={{color,fontWeight:700,letterSpacing:1.5}}>{connStatus.state.toUpperCase()}</span>{connStatus.message&&<span style={{color:"#a0a0a0",fontSize:10}}>{connStatus.message}</span>}</div>;}

const styles={
  shell:{fontFamily:"'JetBrains Mono',ui-monospace,monospace",background:"#060606",color:"#e8e8e8",minHeight:"100vh",padding:16,display:"flex",flexDirection:"column",gap:12},
  header:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 12px",borderBottom:"1px solid #1a1a1a",flexWrap:"wrap",gap:8},
  brand:{display:"flex",alignItems:"center",gap:10},
  brandDot:{width:8,height:8,background:"#FFB627",borderRadius:1,boxShadow:"0 0 12px #FFB627"},
  brandText:{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,letterSpacing:2,fontSize:16},
  brandSub:{color:"#5a5a5a",fontSize:11,letterSpacing:1},
  headerRight:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"},
  pill:{display:"inline-flex",alignItems:"center",gap:6,border:"1px solid",padding:"4px 10px",fontSize:10,letterSpacing:1.5,borderRadius:2},
  pillDot:{width:6,height:6,borderRadius:"50%"},
  runBtn:{background:"#7CFFB2",color:"#0d0d0d",border:"none",padding:"8px 16px",fontSize:11,fontWeight:700,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2},
  runBtnStop:{background:"#FF7A7A"},
  resetBtn:{background:"transparent",color:"#e8e8e8",border:"1px solid #2a2a2a",padding:"8px 14px",fontSize:11,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2},
  closeBtn:{background:"transparent",border:"1px solid #3a3a3a",color:"#a0a0a0",fontSize:9,letterSpacing:1,fontFamily:"inherit",cursor:"pointer",padding:"3px 7px",borderRadius:2},
  row:{display:"flex",gap:12,flexWrap:"wrap"},
  card:{background:"#0d0d0d",border:"1px solid #1a1a1a",padding:14,borderRadius:2,flex:1,minWidth:0},
  cardHead:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"},
  cardLabel:{fontSize:10,letterSpacing:2,color:"#5a5a5a",fontWeight:700,marginBottom:6},
  cardBigNum:{fontSize:26,fontWeight:500,letterSpacing:-0.5},
  delta:{fontSize:11,marginLeft:8,fontWeight:500},
  errorBar:{marginTop:10,padding:"6px 10px",background:"#3a0e0e",color:"#FF7A7A",fontSize:11,borderRadius:2},
  warnBar:{marginTop:10,padding:"6px 10px",background:"#3a2a0e",color:"#FFB627",fontSize:11,borderRadius:2},
  bigEquity:{fontSize:22,marginTop:4,fontWeight:500},
  statGrid:{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8},
  statCell:{background:"#060606",padding:"8px 10px",border:"1px solid #1a1a1a",borderRadius:2},
  statLabel:{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"},
  statVal:{fontSize:13,marginTop:2,fontWeight:500},
  settingsCard:{background:"#0d0d0d",border:"1px solid #1a1a1a",borderLeft:"2px solid #FFB627",padding:16,borderRadius:2},
  settingGroup:{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2},
  settingGroupTitle:{fontSize:9,letterSpacing:2,color:"#FFB627",fontWeight:700,marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1a1a1a"},
  fieldLabel:{fontSize:9,letterSpacing:1.5,color:"#5a5a5a",fontWeight:700},
  input:{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#e8e8e8",padding:"6px 8px",fontSize:12,fontFamily:"'JetBrains Mono',monospace",borderRadius:2,outline:"none",width:"100%"},
  alpacaWarn:{fontSize:10,color:"#FFB627",background:"#3a2a0e",padding:"6px 10px",borderRadius:2,letterSpacing:0.3,lineHeight:1.5},
  testBtn:{background:"#FFB627",color:"#0d0d0d",border:"none",padding:"8px 14px",fontSize:10,fontWeight:700,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2},
  eyeBtn:{background:"transparent",color:"#5a5a5a",border:"none",fontSize:9,letterSpacing:1,fontFamily:"inherit",cursor:"pointer",padding:0},
  modeBtn:{flex:1,background:"#060606",color:"#e8e8e8",border:"1px solid #2a2a2a",padding:"10px 12px",fontSize:11,fontWeight:700,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2,textAlign:"left"},
  modeBtnSub:{fontSize:9,fontWeight:400,letterSpacing:0.3,color:"#5a5a5a",marginTop:4},
  modeBtnActive:{background:"#0e3a22",borderColor:"#7CFFB2",color:"#7CFFB2"},
  modeBtnActiveAlpaca:{background:"#3a2a0e",borderColor:"#FFB627",color:"#FFB627"},
  empty:{color:"#5a5a5a",fontSize:12,padding:"20px 0",textAlign:"center"},
  table:{fontSize:11,marginTop:8},
  th:{textAlign:"left",color:"#5a5a5a",fontWeight:400,fontSize:9,letterSpacing:1.5,padding:"6px 8px",borderBottom:"1px solid #1a1a1a"},
  thR:{textAlign:"right",color:"#5a5a5a",fontWeight:400,fontSize:9,letterSpacing:1.5,padding:"6px 8px",borderBottom:"1px solid #1a1a1a"},
  td:{padding:"6px 8px",borderBottom:"1px solid #131313"},
  tdR:{padding:"6px 8px",borderBottom:"1px solid #131313",textAlign:"right"},
  sigRow:{display:"flex",gap:14,padding:"6px 4px",borderBottom:"1px solid #131313",fontSize:11,alignItems:"center"},
  footer:{textAlign:"center",color:"#3a3a3a",fontSize:10,letterSpacing:1.5,marginTop:4,padding:8},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
