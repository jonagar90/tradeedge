const fmt=(n,d=2)=>n===null||n===undefined||Number.isNaN(n)?"—":Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=(n,d=2)=>n===null||n===undefined?"—":`${n>=0?"+":""}${n.toFixed(d)}%`;
const nowIso=()=>new Date().toISOString();
const shortTime=iso=>iso?new Date(iso).toLocaleTimeString(undefined,{hour12:false}):"—";

const getEST=()=>{
  const est=new Date(new Date().getTime()-(4*3600000));
  const h=est.getUTCHours(),m=est.getUTCMinutes();
  const minsFromOpen=(h-9)*60+(m-30);
  return{h,m,minsFromOpen,isPreMarket:h>=4&&minsFromOpen<0,isMarketOpen:minsFromOpen>=0&&minsFromOpen<=390};
};

/* ---- per-ticker market data ---- */
const mktData={};
const getMkt=t=>{
  if(!mktData[t])mktData[t]={price:0,prevClose:0,open:0,preMarketHigh:0,volume:0,avgVolByMinute:{},priceHistory:[],vwapNum:0,vwapDen:0,vwap:0,firstCandleHigh:0,firstCandleLow:0,firstCandleDone:false,rvol:0,gapPct:0,source:"alpaca"};
  return mktData[t];
};
function updateMkt(ticker,price,volume,prevClose,open){
  const d=getMkt(ticker);
  const {h,m,minsFromOpen}=getEST();
  d.price=price;
  if(prevClose>0)d.prevClose=prevClose;
  if(open>0)d.open=open;
  if(d.prevClose>0)d.gapPct=((d.open||price)-d.prevClose)/d.prevClose*100;
  if(minsFromOpen<0&&price>d.preMarketHigh)d.preMarketHigh=price;
  if(volume>0){d.vwapNum+=price*volume;d.vwapDen+=volume;d.vwap=d.vwapDen>0?d.vwapNum/d.vwapDen:price;d.volume+=volume;}
  if(minsFromOpen===0){if(price>d.firstCandleHigh)d.firstCandleHigh=price;if(d.firstCandleLow===0||price<d.firstCandleLow)d.firstCandleLow=price;}
  if(minsFromOpen===1&&!d.firstCandleDone)d.firstCandleDone=true;
  d.priceHistory.push(price);if(d.priceHistory.length>20)d.priceHistory.shift();
  if(volume>0){
    const k=`${h}:${String(m).padStart(2,"0")}`;
    if(!d.avgVolByMinute[k])d.avgVolByMinute[k]=[];
    d.avgVolByMinute[k].push(volume);
    if(d.avgVolByMinute[k].length>20)d.avgVolByMinute[k].shift();
    const arr=d.avgVolByMinute[k];
    const avg=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(avg>0)d.rvol=volume/avg;
  }
}
function calcRSI(prices){
  if(prices.length<2)return 50;
  let g=0,l=0;
  for(let i=1;i<prices.length;i++){const d=prices[i]-prices[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const n=prices.length-1;
  return 100-(100/(1+(g/n)/Math.max(l/n,0.0001)));
}

/* ---- Yahoo Finance scanners ---- */
async function fetchYahooGappers(minGap,minPrice,maxPrice){
  const results={};
  const urls=[
    "https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?scrIds=day_gainers&count=50",
    "https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?scrIds=most_actives&count=50",
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers:{Accept:"application/json"}});
      if(!r.ok)continue;
      const j=await r.json();
      const quotes=j?.finance?.result?.[0]?.quotes||[];
      for(const q of quotes){
        if(!q.symbol||results[q.symbol])continue;
        const price=q.regularMarketPrice||q.preMarketPrice||0;
        const changeP=q.regularMarketChangePercent||q.preMarketChangePercent||0;
        if(price<minPrice||price>maxPrice||changeP<minGap)continue;
        results[q.symbol]={
          symbol:q.symbol,
          price,
          prevClose:q.regularMarketPreviousClose||0,
          changeP,
          volume:q.regularMarketVolume||q.preMarketVolume||0,
        };
      }
    }catch(e){}
  }
  return Object.values(results);
}

async function fetchYahooQuotes(symbols){
  if(!symbols.length)return{};
  const result={};
  for(let i=0;i<symbols.length;i+=20){
    const chunk=symbols.slice(i,i+20);
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${chunk.join(",")}&fields=regularMarketPrice,regularMarketVolume,regularMarketChangePercent,regularMarketPreviousClose,preMarketPrice,preMarketChangePercent,preMarketVolume,regularMarketOpen`);
      if(!r.ok)continue;
      const j=await r.json();
      for(const q of j?.quoteResponse?.result||[]){
        if(q.symbol)result[q.symbol]={
          price:q.preMarketPrice||q.regularMarketPrice||0,
          prevClose:q.regularMarketPreviousClose||0,
          open:q.regularMarketOpen||0,
          volume:q.preMarketVolume||q.regularMarketVolume||0,
          changeP:q.preMarketChangePercent||q.regularMarketChangePercent||0,
        };
      }
    }catch(e){}
  }
  return result;
}

/* ---- Entry logic ---- */
function checkPreMarketEntry(ticker,s){
  const d=getMkt(ticker);
  const{isPreMarket,h}=getEST();
  if(!isPreMarket)return{pass:false,reason:"Not pre-market"};
  if(h<4)return{pass:false,reason:"Before 4am EST"};
  if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price $${d.price.toFixed(2)} outside $${s.priceMin}-$${s.priceMax}`};
  if(d.gapPct<s.gapMinPct)return{pass:false,reason:`Gap ${d.gapPct.toFixed(1)}% < ${s.gapMinPct}%`};
  if(d.rvol>0&&d.rvol<2)return{pass:false,reason:`RVOL ${d.rvol.toFixed(1)}x < 2x`};
  const rsi=calcRSI(d.priceHistory);
  if(rsi<50)return{pass:false,reason:`RSI ${rsi.toFixed(0)} < 50`};
  return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,vwap:d.vwap};
}

function checkGapEntry(ticker,s){
  const d=getMkt(ticker);
  const{minsFromOpen,isMarketOpen,isPreMarket}=getEST();
  const rsi=calcRSI(d.priceHistory);
  if(isPreMarket)return{pass:false,reason:`Pre-market ${d.gapPct>=s.gapMinPct?d.gapPct.toFixed(1)+"% gap — waiting for open":""}`,preMarket:d.gapPct>=s.gapMinPct};
  if(!isMarketOpen)return{pass:false,reason:"Market closed"};
  if(minsFromOpen>60)return{pass:false,reason:"After 10:30am window"};
  if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price $${d.price.toFixed(2)} outside $${s.priceMin}-$${s.priceMax}`};
  if(d.gapPct<s.gapMinPct)return{pass:false,reason:`Gap ${d.gapPct.toFixed(1)}% < ${s.gapMinPct}%`};
  if(!d.firstCandleDone)return{pass:false,reason:"Waiting for 1st candle"};
  if(d.price<=d.firstCandleHigh)return{pass:false,reason:`Below 1st candle high $${d.firstCandleHigh.toFixed(2)}`};
  if(d.rvol>0&&d.rvol<s.rvolEntry)return{pass:false,reason:`RVOL ${d.rvol.toFixed(1)}x < ${s.rvolEntry}x`};
  if(rsi<s.rsiMin||rsi>s.rsiMax)return{pass:false,reason:`RSI ${rsi.toFixed(0)} outside ${s.rsiMin}-${s.rsiMax}`};
  if(d.vwap>0&&d.price<d.vwap)return{pass:false,reason:`Below VWAP $${d.vwap.toFixed(2)}`};
  const slDist=d.price-d.firstCandleLow;
  const tpDist=d.price*(s.tpPct1/100);
  const rr=slDist>0?tpDist/slDist:0;
  if(rr<2)return{pass:false,reason:`R:R ${rr.toFixed(1)} < 2.0`};
  return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,vwap:d.vwap,firstCandleHigh:d.firstCandleHigh,firstCandleLow:d.firstCandleLow,rr};
}

function checkContEntry(ticker,s){
  const d=getMkt(ticker);
  const{minsFromOpen,isMarketOpen}=getEST();
  const rsi=calcRSI(d.priceHistory);
  if(!isMarketOpen)return{pass:false,reason:"Market closed"};
  if(minsFromOpen<1||minsFromOpen>360)return{pass:false,reason:"Outside 9:30am-3:30pm"};
  if(!d.open)return{pass:false,reason:"No open price"};
  if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price outside range`};
  const moveFromOpen=((d.price-d.open)/d.open)*100;
  if(moveFromOpen<s.contMinMove)return{pass:false,reason:`Move ${moveFromOpen.toFixed(1)}% < ${s.contMinMove}% from open`};
  if(d.rvol>0&&d.rvol<s.contRvolMin)return{pass:false,reason:`RVOL ${d.rvol.toFixed(1)}x < ${s.contRvolMin}x`};
  if(rsi<s.contRsiMin||rsi>s.contRsiMax)return{pass:false,reason:`RSI ${rsi.toFixed(0)} outside range`};
  if(d.vwap>0&&d.price<d.vwap)return{pass:false,reason:"Below VWAP"};
  const recentHigh=d.priceHistory.length>0?Math.max(...d.priceHistory):d.price;
  if(((recentHigh-d.price)/recentHigh)*100>2)return{pass:false,reason:"More than 2% below recent high"};
  return{pass:true,rsi,rvol:d.rvol,moveFromOpen,vwap:d.vwap};
}

/* ---- Alpaca helpers ---- */
const aH=c=>({"APCA-API-KEY-ID":c.keyId,"APCA-API-SECRET-KEY":c.secret,"Content-Type":"application/json"});
async function aGet(path,creds,data=false){
  const r=await fetch(`${data?`${PROXY}/data`:PROXY}${path}`,{headers:aH(creds)});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);}
  return r.json();
}
async function aPost(path,body,creds){
  const r=await fetch(`${PROXY}${path}`,{method:"POST",headers:aH(creds),body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,200)}`);}
  return r.json();
}
async function closeAlpacaPos(ticker,creds){
  for(let i=0;i<3;i++){
    try{const r=await fetch(`${PROXY}/v2/positions/${ticker}`,{method:"DELETE",headers:aH(creds)});if(r.ok||r.status===404)return true;}
    catch(e){}
    await new Promise(res=>setTimeout(res,500));
  }
  return false;
}
const alpaca={

    }

};

/* ---- Claude BTC AI ---- */
async function analyzeBTC(price,series,rsi,vwap,key){
  const prices=series.slice(-20).map(p=>p.p);
  const high=Math.max(...prices),low=Math.min(...prices);
  const chg=prices.length>1?((prices[prices.length-1]-prices[0])/prices[0]*100).toFixed(2):0;
  const prompt=`You are an elite Bitcoin scalper with 10+ years experience.\nBTC: $${price.toFixed(2)} RSI:${rsi.toFixed(1)} VWAP:${vwap?"$"+vwap.toFixed(2):"N/A"} 1h-High:$${high.toFixed(2)} Low:$${low.toFixed(2)} Chg:${chg}%\nRecent:${prices.map(p=>"$"+p.toFixed(0)).join(",")}\nAnalyze: structure, liquidity, order blocks, VWAP, RSI, EMA, S/R, smart money.\nJSON only, no markdown:\n{"bias":"BULLISH|BEARISH|NEUTRAL","structure":"one sentence","setup":{"direction":"LONG|SHORT|NO TRADE","entry":0,"stopLoss":0,"tp1":0,"tp2":0,"rr":"1:2","duration":"5-15 min"},"confidence":75,"confidenceReason":"one sentence","management":{"breakeven":0,"invalidation":"one sentence"},"warnings":"one sentence","verdict":"STRONG LONG|STRONG SHORT|WAIT|NO TRADE","leverage":"2x-3x","probability":72}`;
  const resp=await fetch(`${PROXY}/v1/messages`,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  if(!resp.ok)throw new Error(`Claude API ${resp.status}`);
  const data=await resp.json();
  const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

/* ---- Reducer ---- */
const initialState={balance:STARTING_BALANCE,openTrades:[],closedTrades:[],equity:[{t:Date.now(),v:STARTING_BALANCE}]};
function reducer(state,action){
  switch(action.type){
    case"OPEN":
      if(state.openTrades.some(o=>o.ticker===action.trade.ticker&&action.trade.ticker!=="BTC"))return state;
      return{...state,openTrades:[...state.openTrades,action.trade]};
    case"CLOSE":{
      const{tradeId,closePrice,reason,t,tolerance=0.5}=action;
      const trade=state.openTrades.find(o=>o.id===tradeId);
      if(!trade)return state;
      const pnlPct=trade.direction==="LONG"?((closePrice-trade.entry)/trade.entry)*100:((trade.entry-closePrice)/trade.entry)*100;
      const pnl=(pnlPct/100)*trade.size;
      const assertion=reason==="TP1"||reason==="TP2"?{expected:`+${trade.tpPct.toFixed(2)}%`,actual:`${pnlPct.toFixed(2)}%`,pass:pnlPct>0}:reason==="SL"?{expected:`-${trade.slPct.toFixed(2)}%`,actual:`${pnlPct.toFixed(2)}%`,pass:Math.abs(pnlPct+trade.slPct)<tolerance+1}:{expected:"manual",actual:`${pnlPct.toFixed(2)}%`,pass:true};
      return{...state,balance:state.balance+pnl,openTrades:state.openTrades.filter(o=>o.id!==tradeId),closedTrades:[{...trade,closedAt:nowIso(),closePrice,reason,pnl,pnlPct,holdMs:t-new Date(trade.openedAt).getTime(),assertion},...state.closedTrades],equity:[...state.equity,{t,v:state.balance+pnl}]};
    }
    case"RESET":return{...initialState,equity:[{t:Date.now(),v:STARTING_BALANCE}]};
    default:return state;
  }
}

/* ---- BTC Panel ---- */
function BTCPanel({btcPrice,btcSeries,trades,dispatch,priceRef,settingsRef,tradeSize,setTradeSize,anthropicKey}){
  const [tab,setTab]=useState("manual");
  const [manDir,setManDir]=useState("LONG");
  const [manTp,setManTp]=useState("");
  const [manSl,setManSl]=useState("");
  const [manMsg,setManMsg]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResult,setAiResult]=useState(null);
  const [aiError,setAiError]=useState(null);
  const [aiTime,setAiTime]=useState(null);
  const d=getMkt("BTC");
  const rsi=calcRSI(d.priceHistory);
  const openBtc=trades.openTrades.filter(t=>t.ticker==="BTC");
  const manEntry=()=>{
    if(!btcPrice){setManMsg("No BTC price");return;}
    const tpPct=Number(manTp||settingsRef.current.tpPct1);
    const slPct=Number(manSl||settingsRef.current.slPct);
    const entry=btcPrice;
    const tp=manDir==="LONG"?entry*(1+tpPct/100):entry*(1-tpPct/100);
    const sl=manDir==="LONG"?entry*(1-slPct/100):entry*(1+slPct/100);
    dispatch({type:"OPEN",trade:{id:`BTC-MAN-${Date.now()}`,ticker:"BTC",direction:manDir,entry,tp,sl,tpPct,slPct,size:tradeSize,vwap:d.vwap||entry,openedAt:nowIso(),openPrice:entry,manual:true}});
    setManMsg(`✓ ${manDir} $${tradeSize} @ $${entry.toFixed(2)}`);
    setTimeout(()=>setManMsg(""),3000);
  };
  const execAi=()=>{
    if(!aiResult||aiResult.setup.direction==="NO TRADE")return;
    const dir=aiResult.setup.direction,entry=btcPrice;
    const tp=aiResult.setup.tp1||entry*(1+settingsRef.current.tpPct1/100);
    const sl=aiResult.setup.stopLoss||entry*(1-settingsRef.current.slPct/100);
    dispatch({type:"OPEN",trade:{id:`BTC-AI-${Date.now()}`,ticker:"BTC",direction:dir,entry,tp,sl,tpPct:Math.abs((tp-entry)/entry*100),slPct:Math.abs((sl-entry)/entry*100),size:tradeSize,vwap:d.vwap||entry,openedAt:nowIso(),openPrice:entry,aiTrade:true}});
  };
  const runAi=async()=>{
    if(!btcPrice){setAiError("No BTC price");return;}
    if(!anthropicKey){setAiError("Add Anthropic key in ⚙ Settings");return;}
    setAiLoading(true);setAiError(null);setAiResult(null);
    try{const r=await analyzeBTC(btcPrice,btcSeries,rsi,d.vwap,anthropicKey);setAiResult(r);setAiTime(new Date().toLocaleTimeString());}
    catch(e){setAiError(e.message||String(e));}
    finally{setAiLoading(false);}
  };
  const vc=v=>v==="STRONG LONG"?"#7CFFB2":v==="STRONG SHORT"?"#FF7A7A":v==="WAIT"?"#FFB627":"#5a5a5a";
  const bc=b=>b==="BULLISH"?"#7CFFB2":b==="BEARISH"?"#FF7A7A":"#FFB627";
  const S=styles;
  return(
    <section style={{...S.card,borderLeft:"2px solid #FFB627"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={S.cardLabel}>BTC TRADING PANEL</div>
          <div style={{fontSize:20,fontWeight:500}}>${btcPrice?fmt(btcPrice,2):"—"} <span style={{fontSize:11,color:"#5a5a5a"}}>RSI {rsi.toFixed(0)} · VWAP {d.vwap?`$${fmt(d.vwap,2)}`:"—"} · {openBtc.length} open</span></div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {[10,25,50,100].map(s=><button key={s} onClick={()=>setTradeSize(s)} style={{background:tradeSize===s?"#FFB627":"#060606",color:tradeSize===s?"#0d0d0d":"#e8e8e8",border:`1px solid ${tradeSize===s?"#FFB627":"#2a2a2a"}`,padding:"6px 10px",fontSize:11,fontFamily:"inherit",cursor:"pointer",borderRadius:2,fontWeight:tradeSize===s?700:400}}>${s}</button>)}
          <button onClick={()=>setTab("manual")} style={{...S.resetBtn,...(tab==="manual"?{borderColor:"#FFB627",color:"#FFB627"}:{})}}>MANUAL</button>
          <button onClick={()=>setTab("ai")} style={{...S.resetBtn,...(tab==="ai"?{borderColor:"#7CFFB2",color:"#7CFFB2"}:{})}}>🤖 AI</button>
        </div>
      </div>
      {tab==="manual"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2}}>
            <div style={S.cardLabel}>NEW BTC TRADE — ${tradeSize}</div>
            <div style={{display:"flex",gap:6,margin:"8px 0"}}>
              <button onClick={()=>setManDir("LONG")} style={{...S.modeBtn,flex:1,padding:"8px",...(manDir==="LONG"?S.modeBtnActive:{})}}>LONG</button>
              <button onClick={()=>setManDir("SHORT")} style={{...S.modeBtn,flex:1,padding:"8px",...(manDir==="SHORT"?{background:"#3a0e0e",borderColor:"#FF7A7A",color:"#FF7A7A"}:{})}}>SHORT</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              <label style={{display:"flex",flexDirection:"column",gap:3}}><div style={S.fieldLabel}>TP %</div><input type="number" value={manTp} onChange={e=>setManTp(e.target.value)} style={S.input} placeholder={settingsRef.current.tpPct1}/></label>
              <label style={{display:"flex",flexDirection:"column",gap:3}}><div style={S.fieldLabel}>SL %</div><input type="number" value={manSl} onChange={e=>setManSl(e.target.value)} style={S.input} placeholder={settingsRef.current.slPct}/></label>
            </div>
            <button onClick={manEntry} style={{...S.runBtn,width:"100%",background:manDir==="LONG"?"#7CFFB2":"#FF7A7A"}}>EXECUTE {manDir} @ ${btcPrice?fmt(btcPrice,2):"—"}</button>
            {manMsg&&<div style={{marginTop:8,fontSize:11,color:"#7CFFB2"}}>{manMsg}</div>}
          </div>
          <div style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2}}>
            <div style={S.cardLabel}>OPEN BTC ({openBtc.length})</div>
            {!openBtc.length?<div style={S.empty}>no BTC positions</div>:(
              <div style={{maxHeight:140,overflow:"auto"}}>{openBtc.map(o=>{
                const px=priceRef.current["BTC"]??o.entry;
                const upl=o.direction==="LONG"?((px-o.entry)/o.entry)*100:((o.entry-px)/o.entry)*100;
                return(<div key={o.id} style={{borderBottom:"1px solid #1a1a1a",padding:"6px 0",fontSize:11}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:o.direction==="LONG"?"#7CFFB2":"#FF7A7A",fontWeight:700}}>{o.direction} {o.aiTrade?"🤖":"✋"}</span>
                    <span style={{color:upl>=0?"#7CFFB2":"#FF7A7A",fontWeight:700}}>{fmtPct(upl)}</span>
                    <button onClick={()=>{const cpx=priceRef.current["BTC"]??o.entry;dispatch({type:"CLOSE",tradeId:o.id,closePrice:cpx,reason:"MANUAL",t:Date.now(),tolerance:10});}} style={S.closeBtn}>CLOSE</button>
                  </div>
                  <div style={{color:"#5a5a5a",fontSize:10,marginTop:2}}>entry ${fmt(o.entry,2)} · now ${fmt(px,2)} · tp ${fmt(o.tp,2)} · sl ${fmt(o.sl,2)}</div>
                </div>);
              })}</div>
            )}
          </div>
        </div>
      )}
      {tab==="ai"&&(
        <div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
            <button onClick={runAi} disabled={aiLoading} style={{...S.testBtn,opacity:aiLoading?0.6:1}}>{aiLoading?"🔍 ANALYZING…":"🤖 ANALYZE BTC NOW"}</button>
            {aiTime&&<span style={{fontSize:10,color:"#5a5a5a"}}>last: {aiTime}</span>}
            {aiError&&<span style={{fontSize:11,color:"#FF7A7A"}}>{aiError}</span>}
          </div>
          {aiLoading&&<div style={{background:"#060606",border:"1px solid #1a1a1a",padding:20,borderRadius:2,textAlign:"center",color:"#FFB627",fontSize:12,letterSpacing:2}}>ANALYZING MARKET STRUCTURE · LIQUIDITY · SMART MONEY…</div>}
          {aiResult&&!aiLoading&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{background:"#060606",border:`1px solid ${vc(aiResult.verdict)}`,padding:12,borderRadius:2}}>
                  <div style={S.cardLabel}>FINAL VERDICT</div>
                  <div style={{fontSize:22,fontWeight:700,color:vc(aiResult.verdict),marginTop:4}}>{aiResult.verdict}</div>
                  <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
                    <div><div style={S.cardLabel}>BIAS</div><div style={{color:bc(aiResult.bias),fontWeight:700}}>{aiResult.bias}</div></div>
                    <div><div style={S.cardLabel}>CONF</div><div style={{fontWeight:700}}>{aiResult.confidence}%</div></div>
                    <div><div style={S.cardLabel}>LEV</div><div style={{color:"#FFB627",fontWeight:700}}>{aiResult.leverage}</div></div>
                    <div><div style={S.cardLabel}>PROB</div><div style={{fontWeight:700}}>{aiResult.probability}%</div></div>
                  </div>
                  <div style={{marginTop:8,fontSize:10,color:"#a0a0a0"}}>{aiResult.confidenceReason}</div>
                </div>
                {aiResult.setup.direction!=="NO TRADE"&&(
                  <div style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2}}>
                    <div style={S.cardLabel}>SETUP — {aiResult.setup.direction}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                      <div><div style={S.cardLabel}>ENTRY</div><div style={{fontSize:14,fontWeight:500}}>${fmt(aiResult.setup.entry,2)}</div></div>
                      <div><div style={S.cardLabel}>STOP</div><div style={{fontSize:14,color:"#FF7A7A",fontWeight:500}}>${fmt(aiResult.setup.stopLoss,2)}</div></div>
                      <div><div style={S.cardLabel}>TP1</div><div style={{fontSize:14,color:"#7CFFB2",fontWeight:500}}>${fmt(aiResult.setup.tp1,2)}</div></div>
                      <div><div style={S.cardLabel}>TP2</div><div style={{fontSize:14,color:"#7CFFB2",fontWeight:500}}>${fmt(aiResult.setup.tp2,2)}</div></div>
                      <div><div style={S.cardLabel}>R:R</div><div style={{fontSize:14,color:"#FFB627",fontWeight:500}}>{aiResult.setup.rr}</div></div>
                      <div><div style={S.cardLabel}>DUR</div><div style={{fontSize:14,fontWeight:500}}>{aiResult.setup.duration}</div></div>
                    </div>
                    <button onClick={execAi} style={{...S.runBtn,width:"100%",marginTop:10,background:aiResult.setup.direction==="LONG"?"#7CFFB2":"#FF7A7A",color:"#0d0d0d"}}>⚡ EXECUTE AI {aiResult.setup.direction} ${tradeSize}</button>
                  </div>
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2}}>
                  <div style={S.cardLabel}>MARKET STRUCTURE</div>
                  <div style={{fontSize:11,color:"#a0a0a0",marginTop:6,lineHeight:1.6}}>{aiResult.structure}</div>
                </div>
                <div style={{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2}}>
                  <div style={S.cardLabel}>MANAGEMENT</div>
                  <div style={{fontSize:11,marginTop:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#5a5a5a"}}>B/E AT</span><span>${fmt(aiResult.management.breakeven,2)}</span></div>
                    <div style={{color:"#a0a0a0",lineHeight:1.5,marginTop:4}}><span style={{color:"#FF7A7A"}}>INVALIDATION: </span>{aiResult.management.invalidation}</div>
                  </div>
                </div>
                <div style={{background:"#3a2a0e",border:"1px solid #FFB627",padding:12,borderRadius:2}}>
                  <div style={{...S.cardLabel,color:"#FFB627"}}>⚠ WARNINGS</div>
                  <div style={{fontSize:11,color:"#FFB627",marginTop:6,lineHeight:1.5}}>{aiResult.warnings}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </section>
  );
}

/* ---- APP ---- */
function App(){
  const [running,setRunning]=useState(false);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [tradeSize,setTradeSize]=useState(25);
  const [anthropicKey,setAnthropicKey]=useState("");
  const [signals,setSignals]=useState([]);
  const [scanLog,setScanLog]=useState([]);
  const [radar,setRadar]=useState([]);
  const [trades,dispatch]=useReducer(reducer,initialState);
  const [dailyLoss,setDailyLoss]=useState(0);
  const [circuitBreaker,setCircuitBreaker]=useState(false);
  // Alpaca
  const [creds,setCreds]=useState({keyId:"",secret:""});
  const [execMode,setExecMode]=useState("simulated");
  const [connStatus,setConnStatus]=useState({state:"disconnected",message:""});
  const [alpacaAccount,setAlpacaAccount]=useState(null);
  const [alpacaPositions,setAlpacaPositions]=useState([]);
  const [alpacaErrors,setAlpacaErrors]=useState([]);
  // Scanner
  const [alpacaTickers,setAlpacaTickers]=useState([]);
  const [yahooTickers,setYahooTickers]=useState([]);
  const [tickerData,setTickerData]=useState({});
  const [alpacaLastScan,setAlpacaLastScan]=useState(null);
  const [yahooLastScan,setYahooLastScan]=useState(null);
  const [yahooScanErrors,setYahooScanErrors]=useState(0);
  const [wsStatus,setWsStatus]=useState("off");
  // BTC
  const [btcPrice,setBtcPrice]=useState(null);
  const [btcSeries,setBtcSeries]=useState([]);
  const [btcLastFetch,setBtcLastFetch]=useState(null);
  const [btcError,setBtcError]=useState(null);
  const [btcErrors,setBtcErrors]=useState(0);
  const [btcPolls,setBtcPolls]=useState(0);
  const [btcSource,setBtcSource]=useState(null);
  const [stale,setStale]=useState(false);

  const settingsRef=useRef(settings);useEffect(()=>{settingsRef.current=settings;},[settings]);
  const credsRef=useRef(creds);useEffect(()=>{credsRef.current=creds;},[creds]);
  const modeRef=useRef(execMode);useEffect(()=>{modeRef.current=execMode;},[execMode]);
  const priceRef=useRef({BTC:null});
  const tradesRef=useRef(trades);useEffect(()=>{tradesRef.current=trades;},[trades]);
  const alpacaTickersRef=useRef(alpacaTickers);useEffect(()=>{alpacaTickersRef.current=alpacaTickers;},[alpacaTickers]);
  const yahooTickersRef=useRef(yahooTickers);useEffect(()=>{yahooTickersRef.current=yahooTickers;},[yahooTickers]);

  const allTickers=useMemo(()=>[...new Set([...alpacaTickers,...yahooTickers])],[alpacaTickers,yahooTickers]);
  const allTickersRef=useRef(allTickers);useEffect(()=>{allTickersRef.current=allTickers;},[allTickers]);

  useEffect(()=>{const id=setInterval(()=>{const{h,m}=getEST();if(h===9&&m===30){setDailyLoss(0);setCircuitBreaker(false);}},60000);return()=>clearInterval(id);},[]);

  const testConnection=async()=>{
    if(!creds.keyId||!creds.secret){setConnStatus({state:"error",message:"paste API keys first"});return;}
    setConnStatus({state:"testing",message:"connecting…"});
    try{const acct=await alpaca.getAccount(creds);setAlpacaAccount(acct);setConnStatus({state:"connected",message:`${acct.account_number} · $${Number(acct.buying_power).toLocaleString()} bp`});}
    catch(e){setConnStatus({state:"error",message:String(e.message||e)});setAlpacaAccount(null);}
  };

  useEffect(()=>{
    if(connStatus.state!=="connected")return;
    let cancelled=false;
    const refresh=async()=>{try{const[acct,pos]=await Promise.all([alpaca.getAccount(credsRef.current),alpaca.getPositions(credsRef.current)]);if(cancelled)return;setAlpacaAccount(acct);setAlpacaPositions(pos);}catch(e){if(!cancelled)setAlpacaErrors(p=>[{t:Date.now(),msg:`refresh: ${e.message||e}`},...p.slice(0,9)]);}};
    refresh();const id=setInterval(refresh,10000);return()=>{cancelled=true;clearInterval(id);};
  },[connStatus.state]);

  /* Alpaca 60s scan */
  useEffect(()=>{
    if(connStatus.state!=="connected")return;
    let cancelled=false;
    const scan=async()=>{
      try{
        const actives=await alpaca.getMostActives(credsRef.current,settingsRef.current.mostActivesCount);
        if(cancelled)return;
        const syms=actives.map(a=>a.symbol).filter(s=>s&&s.length<=5);
        const snaps=await alpaca.getSnapshots(syms,credsRef.current);
        if(cancelled)return;
        const s=settingsRef.current;
        const newRadarItems=[];
        for(const sym of syms){
          const snap=snaps[sym];if(!snap)continue;
          const price=snap.latestTrade?.p||snap.minuteBar?.c||0;
          const prevClose=snap.prevDailyBar?.c||0;
          const open=snap.dailyBar?.o||0;
          const volume=snap.minuteBar?.v||0;
          const vwap=snap.dailyBar?.vw||0;
          if(!price)continue;
          updateMkt(sym,price,volume,prevClose,open);
          if(vwap>0)getMkt(sym).vwap=vwap;
          getMkt(sym).source="alpaca";
          priceRef.current[sym]=price;
          const d=getMkt(sym);
          const{isPreMarket}=getEST();
          if(isPreMarket&&d.gapPct>=s.gapMinPct&&price>=s.priceMin&&price<=s.priceMax)
            newRadarItems.push({ticker:sym,price,gapPct:d.gapPct,volume,rvol:d.rvol,prevClose,source:"Alpaca"});
        }
        if(newRadarItems.length)setRadar(prev=>{const ex=prev.filter(r=>!newRadarItems.find(n=>n.ticker===r.ticker));return[...newRadarItems,...ex].sort((a,b)=>b.gapPct-a.gapPct).slice(0,30);});
        setAlpacaTickers(syms);
        setAlpacaLastScan(new Date().toISOString());
        setTickerData(prev=>{const next={...prev};for(const sym of syms)next[sym]={...getMkt(sym)};return next;});
      }catch(e){setAlpacaErrors(p=>[{t:Date.now(),msg:`scan: ${e.message||e}`},...p.slice(0,9)]);}
    };
    scan();const id=setInterval(scan,settings.scanIntervalMs);return()=>{cancelled=true;clearInterval(id);};
  },[connStatus.state,settings.scanIntervalMs]);

  /* Yahoo Finance gap scanner — every 2 minutes, no API key needed */
  useEffect(()=>{
    let cancelled=false;
    const scan=async()=>{
      try{
        const s=settingsRef.current;
        const gappers=await fetchYahooGappers(s.gapMinPct,s.priceMin,s.priceMax);
        if(cancelled||!gappers.length)return;
        const syms=gappers.map(g=>g.symbol).filter(s=>s&&s.length<=6);
        const quotes=await fetchYahooQuotes(syms);
        if(cancelled)return;
        const newRadarItems=[];
        const newSyms=[];
        for(const sym of syms){
          const q=quotes[sym]||{};
          const g=gappers.find(x=>x.symbol===sym)||{};
          const price=q.price||g.price||0;
          const prevClose=q.prevClose||g.prevClose||0;
          const volume=q.volume||g.volume||0;
          const changeP=q.changeP||g.changeP||0;
          if(!price)continue;
          updateMkt(sym,price,volume,prevClose,q.open||0);
          getMkt(sym).source="yahoo";
          priceRef.current[sym]=price;
          if(changeP>=s.gapMinPct)
            newRadarItems.push({ticker:sym,price,gapPct:changeP,volume,rvol:getMkt(sym).rvol,prevClose,source:"Yahoo"});
          newSyms.push(sym);
        }
        if(newRadarItems.length)setRadar(prev=>{const ex=prev.filter(r=>!newRadarItems.find(n=>n.ticker===r.ticker));return[...newRadarItems,...ex].sort((a,b)=>b.gapPct-a.gapPct).slice(0,30);});
        setYahooTickers(prev=>[...new Set([...prev,...newSyms])]);
        setYahooLastScan(new Date().toISOString());
        setTickerData(prev=>{const next={...prev};for(const sym of newSyms)next[sym]={...getMkt(sym)};return next;});
      }catch(e){setYahooScanErrors(n=>n+1);}
    };
    scan();const id=setInterval(scan,120000);return()=>{cancelled=true;clearInterval(id);};
  },[settings.gapMinPct,settings.priceMin,settings.priceMax]);

  /* WebSocket real-time stream */
  useEffect(()=>{
    if(connStatus.state!=="connected"||!allTickers.length)return;
    let ws=null,reconnectTimer=null;
    const connect=()=>{
      setWsStatus("connecting");
      try{
        ws=new WebSocket("wss://stream.data.alpaca.markets/v2/iex");
        ws.onopen=()=>ws.send(JSON.stringify({action:"auth",key:credsRef.current.keyId,secret:credsRef.current.secret}));
        ws.onmessage=(e)=>{
          try{
            const msgs=JSON.parse(e.data);
            for(const msg of msgs){
              if(msg.T==="success"&&msg.msg==="authenticated"){
                setWsStatus("live");
                ws.send(JSON.stringify({action:"subscribe",trades:allTickersRef.current.slice(0,100)}));
              }
              if(msg.T==="t"&&msg.S&&msg.p){
                const sym=msg.S,p=msg.p,v=msg.s||0;
                updateMkt(sym,p,v);
                priceRef.current[sym]=p;
                setTickerData(prev=>({...prev,[sym]:{...getMkt(sym),price:p}}));
              }
            }
          }catch(err){}
        };
        ws.onerror=()=>setWsStatus("error");
        ws.onclose=()=>{setWsStatus("reconnecting");reconnectTimer=setTimeout(connect,2000);};
      }catch(e){setWsStatus("error");reconnectTimer=setTimeout(connect,3000);}
    };
    connect();
    return()=>{clearTimeout(reconnectTimer);try{if(ws)ws.close();}catch(e){}setWsStatus("off");};
  },[connStatus.state,allTickers.length]);

  /* BTC poll */
  useEffect(()=>{
    let cancelled=false;
    const providers=[
      {name:"Coinbase",fetch:async()=>{const r=await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=Number(j?.data?.amount);if(!p||isNaN(p))throw new Error("bad");return p;}},
      {name:"CoinGecko",fetch:async()=>{const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=j?.bitcoin?.usd;if(!p)throw new Error("bad");return p;}},
      {name:"Binance",fetch:async()=>{const r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const p=Number(j?.price);if(!p||isNaN(p))throw new Error("bad");return p;}},
    ];
    async function poll(){
      const errs=[];
      for(const prov of providers){
        try{const p=await prov.fetch();if(cancelled)return;const t=Date.now();setBtcPrice(p);setBtcLastFetch(t);setBtcSource(prov.name);setBtcError(null);setBtcSeries(prev=>{const next=[...prev,{t,p}];return next.filter(x=>x.t>=t-3600000);});setBtcPolls(n=>n+1);priceRef.current["BTC"]=p;updateMkt("BTC",p,0);return;}
        catch(e){errs.push(`${prov.name}: ${e.message}`);}
      }
      if(!cancelled){setBtcError(errs.join(" · "));setBtcErrors(n=>n+1);setBtcSource(null);}
    }
    poll();const id=setInterval(poll,settings.pollMs);return()=>{cancelled=true;clearInterval(id);};
  },[settings.pollMs]);

  useEffect(()=>{const id=setInterval(()=>{if(btcLastFetch)setStale(Date.now()-btcLastFetch>settingsRef.current.pollMs*2);},2000);return()=>clearInterval(id);},[btcLastFetch]);

  /* Exit checks */
  useEffect(()=>{
    const open=tradesRef.current.openTrades;if(!open.length)return;
    const now=Date.now(),tol=settingsRef.current.assertTolerancePct,s=settingsRef.current;
    for(const trade of open){
      if(trade.ticker==="BTC")continue;
      const d=getMkt(trade.ticker);const px=priceRef.current[trade.ticker];if(!px)continue;
      let hit=null;
      if(px>=trade.tp)hit="TP1";
      else if(px<=trade.sl)hit="SL";
      else if(d.rvol>0&&d.rvol<s.rvolExit)hit="RVOL_FADE";
      if(hit){
        const closePrice=hit==="TP1"?trade.tp:px;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
        if(hit==="SL"||hit==="RVOL_FADE"){const loss=Math.abs((closePrice-trade.entry)/trade.entry*trade.size);setDailyLoss(d=>{const nl=d+loss;if(nl>=settingsRef.current.dailyLossLimit)setCircuitBreaker(true);return nl;});}
        dispatch({type:"CLOSE",tradeId:trade.id,closePrice,reason:hit,t:now,tolerance:tol});
      }
    }
  },[tickerData]);

  useEffect(()=>{
    const open=tradesRef.current.openTrades.filter(t=>t.ticker==="BTC");if(!open.length)return;
    const now=Date.now(),tol=settingsRef.current.assertTolerancePct;
    for(const trade of open){
      const px=btcPrice;if(!px)continue;
      let hit=null;
      if(trade.direction==="LONG"){if(px>=trade.tp)hit="TP1";else if(px<=trade.sl)hit="SL";}
      else{if(px<=trade.tp)hit="TP1";else if(px>=trade.sl)hit="SL";}
      if(hit)dispatch({type:"CLOSE",tradeId:trade.id,closePrice:hit==="TP1"?trade.tp:px,reason:hit,t:now,tolerance:tol});
    }
  },[btcPrice]);

  /* Entry loop */
  useEffect(()=>{
    if(!running)return;
    const fire=async()=>{
      if(circuitBreaker){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:"🚨 Circuit breaker"},...p.slice(0,49)]);return;}
      const open=new Set(tradesRef.current.openTrades.map(t=>t.ticker));
      const balance=tradesRef.current.balance;
      const s=settingsRef.current;
      const{minsFromOpen,isPreMarket}=getEST();
      for(const ticker of allTickersRef.current){
        if(open.has(ticker))continue;
        let check=null,strategy=null;
        if(s.preMarketEnabled&&isPreMarket){
          const c=checkPreMarketEntry(ticker,s);
          if(c.pass){check=c;strategy="PRE";}
          else setScanLog(p=>[{t:nowIso(),ticker,reason:`[PRE] ${c.reason}`},...p.slice(0,49)]);
        }
        if(!check&&s.gapMomentumEnabled&&minsFromOpen>=0&&minsFromOpen<=60){
          const c=checkGapEntry(ticker,s);
          if(c.pass){check=c;strategy="GAP";}
          else if(!c.preMarket)setScanLog(p=>[{t:nowIso(),ticker,reason:`[GAP] ${c.reason}`},...p.slice(0,49)]);
        }
        if(!check&&s.continuationEnabled&&minsFromOpen>=1&&minsFromOpen<=360){
          const c=checkContEntry(ticker,s);
          if(c.pass){check=c;strategy="CONT";}
          else setScanLog(p=>[{t:nowIso(),ticker,reason:`[CONT] ${c.reason}`},...p.slice(0,49)]);
        }
        if(!check)continue;
        const d=getMkt(ticker);const px=d.price;if(!px)continue;
        const tpPct=strategy==="PRE"?s.preMarketTpPct:strategy==="GAP"?s.tpPct1:s.contTpPct;
        const slPct=strategy==="PRE"?s.preMarketSlPct:strategy==="GAP"?s.slPct:s.contSlPct;
        const sl=strategy==="GAP"?Math.max(d.firstCandleLow||px*(1-slPct/100),px*(1-slPct/100)):px*(1-slPct/100);
        const tp=px*(1+tpPct/100);
        const size=Math.min(s.maxTradeSize,balance*0.02);
        setSignals(prev=>[{id:`${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,tpPct,slPct,size,rvol:d.rvol,gapPct:d.gapPct,rsi:calcRSI(d.priceHistory),vwap:d.vwap,strategy,rr:((tp-px)/(px-sl)),createdAt:nowIso()},...prev].slice(0,50));
        let alpacaOrderId=null;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
          try{
            let body;
            if(strategy==="PRE"){const qty=Math.max(1,Math.floor(size/px));body={symbol:ticker,qty:String(qty),side:"buy",type:"market",time_in_force:"day",extended_hours:true};}
            else body={symbol:ticker,notional:size.toFixed(2),side:"buy",type:"market",time_in_force:"day"};
            const order=await aPost("/v2/orders",body,credsRef.current);
            alpacaOrderId=order.id;
          }catch(e){setAlpacaErrors(p=>[{t:Date.now(),msg:`order ${ticker}: ${e.message||e}`},...p.slice(0,9)]);continue;}
        }
        dispatch({type:"OPEN",trade:{id:`t-${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,slPct,tpPct,size,vwap:d.vwap,rvol:d.rvol,gapPct:d.gapPct,strategy,openedAt:nowIso(),openPrice:px,alpacaOrderId}});
        open.add(ticker);
      }
    };
    fire();const id=setInterval(fire,settings.scanIntervalMs);return()=>clearInterval(id);
  },[running,settings.scanIntervalMs,connStatus.state,circuitBreaker]);

  const manualClose=(trade)=>{
    const px=priceRef.current[trade.ticker]??trade.entry;
    if(modeRef.current==="alpaca"&&connStatus.state==="connected"&&trade.ticker!=="BTC")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
    dispatch({type:"CLOSE",tradeId:trade.id,closePrice:px,reason:"MANUAL",t:Date.now(),tolerance:settingsRef.current.assertTolerancePct});
  };

  const stats=useMemo(()=>{
    const closed=trades.closedTrades;
    const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<0);
    const winRate=closed.length?(wins.length/closed.length)*100:0;
    const avgWin=wins.length?wins.reduce((a,b)=>a+b.pnlPct,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((a,b)=>a+b.pnlPct,0)/losses.length:0;
    const avgRR=wins.length&&losses.length?avgWin/Math.abs(avgLoss):null;
    const avgHold=closed.length?closed.reduce((a,b)=>a+b.holdMs,0)/closed.length/1000:0;
    let peak=-Infinity,maxDD=0;
    for(const p of trades.equity){if(p.v>peak)peak=p.v;const dd=((p.v-peak)/peak)*100;if(dd<maxDD)maxDD=dd;}
    return{total:closed.length,open:trades.openTrades.length,winRate,avgRR,avgHoldSec:avgHold,maxDD,pnl:trades.balance-STARTING_BALANCE,pnlPct:((trades.balance-STARTING_BALANCE)/STARTING_BALANCE)*100};
  },[trades]);

  const btcDelta=useMemo(()=>{if(btcSeries.length<2)return null;const f=btcSeries[0].p,l=btcSeries[btcSeries.length-1].p;return{abs:l-f,pct:((l-f)/f)*100};},[btcSeries]);
  const estNow=getEST();const S=styles;
  const wsColor=wsStatus==="live"?"#7CFFB2":wsStatus==="connecting"||wsStatus==="reconnecting"?"#FFB627":"#5a5a5a";

  return(
    <div style={S.shell}>
      <header style={S.header}>
        <div style={S.brand}><span style={S.brandDot}/><span style={S.brandText}>TRADEEDGE</span><span style={S.brandSub}>// MOMENTUM SCANNER</span></div>
        <div style={S.headerRight}>
          {circuitBreaker&&<div style={{...S.pill,borderColor:"#FF7A7A",color:"#FF7A7A"}}><span style={{...S.pillDot,background:"#FF7A7A"}}/>🚨 CIRCUIT BREAKER</div>}
          <div style={{...S.pill,borderColor:"#5a5a5a",color:"#5a5a5a"}}>EST {String(estNow.h).padStart(2,"0")}:{String(estNow.m).padStart(2,"0")} {estNow.isPreMarket?"PRE-MKT":estNow.isMarketOpen?"OPEN":"CLOSED"}</div>
          {settings.preMarketEnabled&&<div style={{...S.pill,borderColor:"#a78bfa",color:"#a78bfa",fontSize:9}}>PRE-MKT</div>}
          {settings.gapMomentumEnabled&&<div style={{...S.pill,borderColor:"#7CFFB2",color:"#7CFFB2",fontSize:9}}>GAP</div>}
          {settings.continuationEnabled&&<div style={{...S.pill,borderColor:"#FFB627",color:"#FFB627",fontSize:9}}>CONT</div>}
          {connStatus.state==="connected"&&<div style={{...S.pill,borderColor:wsColor,color:wsColor,fontSize:9}}><span style={{width:5,height:5,borderRadius:"50%",background:wsColor,display:"inline-block",marginRight:4,animation:wsStatus==="live"?"pulse 1.5s infinite":"none"}}/>{wsStatus==="live"?"WS LIVE":wsStatus.toUpperCase()}</div>}
          <AlpacaPill connStatus={connStatus} mode={execMode}/>
          <StatusPill running={running} stale={stale} btcError={btcError}/>
          <button onClick={()=>setRunning(r=>!r)} style={{...S.runBtn,...(running?S.runBtnStop:{})}}>{running?"■ STOP":"▶ START"}</button>
          <button onClick={()=>setSettingsOpen(o=>!o)} style={{...S.resetBtn,...(settingsOpen?{borderColor:"#FFB627",color:"#FFB627"}:{})}}>⚙ SETTINGS</button>
          <button onClick={()=>{dispatch({type:"RESET"});setSignals([]);setDailyLoss(0);setCircuitBreaker(false);setScanLog([]);setRadar([]);setYahooTickers([]);setAlpacaTickers([]);}} style={S.resetBtn}>RESET</button>
        </div>
      </header>

      {settingsOpen&&<SettingsDrawer settings={settings} onChange={setSettings} onReset={()=>setSettings(DEFAULT_SETTINGS)} onClose={()=>setSettingsOpen(false)} creds={creds} onCredsChange={setCreds} connStatus={connStatus} onTest={testConnection} execMode={execMode} onModeChange={setExecMode} alpacaAccount={alpacaAccount} alpacaErrors={alpacaErrors} anthropicKey={anthropicKey} onAnthropicKeyChange={setAnthropicKey}/>}

      <section style={S.row}>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardHead}>
            <div><div style={S.cardLabel}>LIVE FEED — BTC/USD</div>
              <div style={S.cardBigNum}>${btcPrice?fmt(btcPrice,2):"—"} {btcDelta&&<span style={{...S.delta,color:btcDelta.abs>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(btcDelta.pct)} since open</span>}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,auto)",gap:16}}>
              <Diag label="SOURCE" value={btcSource||"—"} bad={!btcSource}/><Diag label="LAST POLL" value={btcLastFetch?shortTime(new Date(btcLastFetch).toISOString()):"—"}/>
              <Diag label="POLLS" value={btcPolls}/><Diag label="ERRORS" value={btcErrors} bad={btcErrors>0}/><Diag label="CADENCE" value={`${settings.pollMs/1000}s`}/>
            </div>
          </div>
          <div style={{height:180,marginTop:12}}>
            <ResponsiveContainer>
              <AreaChart data={btcSeries} margin={{top:6,right:10,left:0,bottom:0}}>
                <defs><linearGradient id="btcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FFB627" stopOpacity={0.4}/><stop offset="100%" stopColor="#FFB627" stopOpacity={0}/></linearGradient></defs>
                <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
                <YAxis domain={["auto","auto"]} stroke="#5a5a5a" fontSize={10} tickFormatter={v=>`$${(v/1000).toFixed(1)}k`}/>
                <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"BTC"]}/>
                <Area type="monotone" dataKey="p" stroke="#FFB627" strokeWidth={1.5} fill="url(#btcg)" isAnimationActive={false}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
          {btcError&&<div style={S.errorBar}>ALL PROVIDERS FAILED</div>}
          {stale&&!btcError&&<div style={S.warnBar}>⚠ STALE</div>}
        </div>
        <div style={{...S.card,flex:1,minWidth:260}}>
          <div style={S.cardLabel}>RUN STATS</div>
          <div style={S.bigEquity}>${fmt(trades.balance,2)} <span style={{color:stats.pnl>=0?"#7CFFB2":"#FF7A7A",fontSize:13}}>{fmtPct(stats.pnlPct)}</span></div>
          <div style={S.statGrid}>
            <Stat label="TRADES" v={`${stats.total}`}/><Stat label="OPEN" v={`${stats.open}`}/>
            <Stat label="WIN RATE" v={`${stats.winRate.toFixed(1)}%`}/><Stat label="AVG R:R" v={stats.avgRR?stats.avgRR.toFixed(2):"—"}/>
            <Stat label="MAX DD" v={`${stats.maxDD.toFixed(2)}%`} bad={stats.maxDD<-2}/><Stat label="AVG HOLD" v={`${stats.avgHoldSec.toFixed(0)}s`}/>
          </div>
          <div style={{marginTop:10,background:"#060606",border:"1px solid #1a1a1a",padding:"10px 12px",borderRadius:2}}>
            <div style={S.cardLabel}>DAILY LOSS</div>
            <div style={{fontSize:16,fontWeight:500,color:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#e8e8e8",marginTop:4}}>-${fmt(dailyLoss,2)} <span style={{fontSize:10,color:"#5a5a5a"}}>/ ${settings.dailyLossLimit}</span></div>
            <div style={{marginTop:6,height:4,background:"#1a1a1a",borderRadius:2}}><div style={{height:"100%",width:`${Math.min(100,(dailyLoss/settings.dailyLossLimit)*100)}%`,background:circuitBreaker?"#FF7A7A":dailyLoss>settings.dailyLossLimit*0.7?"#FFB627":"#7CFFB2",borderRadius:2}}/></div>
          </div>
        </div>
      </section>

      <BTCPanel btcPrice={btcPrice} btcSeries={btcSeries} trades={trades} dispatch={dispatch} priceRef={priceRef} settingsRef={settingsRef} tradeSize={tradeSize} setTradeSize={setTradeSize} anthropicKey={anthropicKey}/>

      {connStatus.state==="connected"&&alpacaAccount&&<AlpacaAccountCard account={alpacaAccount} positions={alpacaPositions} mode={execMode} errors={alpacaErrors}/>}

      <section style={S.card}>
        <div style={S.cardLabel}>EQUITY CURVE</div>
        <div style={{height:90,marginTop:8}}>
          <ResponsiveContainer>
            <LineChart data={trades.equity} margin={{top:8,right:10,left:0,bottom:0}}>
              <XAxis dataKey="t" tickFormatter={t=>new Date(t).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",hour12:false})} stroke="#5a5a5a" fontSize={10} minTickGap={40}/>
              <YAxis stroke="#5a5a5a" fontSize={10} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:"#0d0d0d",border:"1px solid #2a2a2a",fontFamily:"JetBrains Mono,monospace",fontSize:11}} labelFormatter={t=>new Date(t).toLocaleTimeString()} formatter={v=>[`$${fmt(v,2)}`,"Equity"]}/>
              <ReferenceLine y={STARTING_BALANCE} stroke="#3a3a3a" strokeDasharray="3 3"/>
              <Line type="monotone" dataKey="v" stroke="#7CFFB2" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </section>

      {radar.length>0&&(
        <section style={{...S.card,borderLeft:"2px solid #7CFFB2"}}>
          <div style={{...S.cardLabel,color:"#7CFFB2"}}>🌅 GAP RADAR — {radar.length} GAPPERS (Alpaca + Yahoo Finance)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginTop:8}}>
            {radar.map(r=>(
              <div key={r.ticker} style={{background:"#060606",border:"1px solid #0e3a22",padding:10,borderRadius:2}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,color:"#7CFFB2"}}>{r.ticker}</div>
                  <div style={{fontSize:9,color:r.source==="Yahoo"?"#FFB627":"#5a5a5a",border:`1px solid ${r.source==="Yahoo"?"#FFB627":"#2a2a2a"}`,padding:"1px 4px",borderRadius:1}}>{r.source==="Yahoo"?"YF":"ALP"}</div>
                </div>
                <div style={{fontSize:15,marginTop:4}}>${fmt(r.price,2)}</div>
                <div style={{fontSize:11,color:"#7CFFB2",marginTop:2}}>GAP {fmtPct(r.gapPct)}</div>
                <div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>RVOL {r.rvol>0?r.rvol.toFixed(1)+"x":"—"} · prev ${fmt(r.prevClose,2)}</div>
              </div>
            ))}
          </div>
        </section>
      )}

      <section style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div style={S.cardLabel}>MOMENTUM SCANNER — {allTickers.length} SYMBOLS</div>
          <div style={{display:"flex",gap:12,fontSize:9,color:"#5a5a5a"}}>
            <span>Alpaca: {alpacaLastScan?shortTime(alpacaLastScan):"—"}</span>
            <span style={{color:"#FFB627"}}>Yahoo: {yahooLastScan?shortTime(yahooLastScan):"—"}{yahooScanErrors>0?` (${yahooScanErrors} err)`:""}</span>
            <span style={{color:wsColor}}>{wsStatus==="live"?"● WS LIVE":"● WS "+wsStatus}</span>
          </div>
        </div>
        {!allTickers.length?<div style={S.empty}>Scanning via Yahoo Finance (free) + Alpaca (when connected)…</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>TICKER</th><th style={S.th}>SRC</th><th style={S.thR}>PRICE</th>
                <th style={S.thR}>GAP%</th><th style={S.thR}>RVOL</th><th style={S.thR}>RSI</th>
                <th style={S.thR}>VWAP</th><th style={S.thR}>1ST CANDLE</th><th style={S.th}>STATUS</th>
              </tr></thead>
              <tbody>
                {allTickers.map(ticker=>{
                  const d=tickerData[ticker]||getMkt(ticker);
                  const rsi=calcRSI(d.priceHistory||[]);
                  const gapC=checkGapEntry(ticker,settings);
                  const contC=settings.continuationEnabled?checkContEntry(ticker,settings):null;
                  const preC=settings.preMarketEnabled?checkPreMarketEntry(ticker,settings):null;
                  const hasPos=trades.openTrades.find(o=>o.ticker===ticker);
                  const isReady=gapC.pass||(contC?.pass)||(preC?.pass);
                  const src=d.source||"—";
                  return(
                    <tr key={ticker} style={{background:isReady?"#0a1a0a":hasPos?"#1a1a0a":"transparent"}}>
                      <td style={{...S.td,fontWeight:700,color:isReady?"#7CFFB2":hasPos?"#FFB627":"#e8e8e8"}}>{ticker}{hasPos?" 📌":""}</td>
                      <td style={{...S.td,fontSize:9,color:src==="yahoo"?"#FFB627":"#5a5a5a"}}>{src==="yahoo"?"YF":"ALP"}</td>
                      <td style={S.tdR}>${fmt(d.price,2)}</td>
                      <td style={{...S.tdR,color:d.gapPct>=settings.gapMinPct?"#7CFFB2":d.gapPct>0?"#FFB627":"#5a5a5a"}}>{d.gapPct?fmtPct(d.gapPct):"—"}</td>
                      <td style={{...S.tdR,color:d.rvol>=settings.rvolEntry?"#7CFFB2":d.rvol>=2?"#FFB627":"#5a5a5a"}}>{d.rvol>0?`${d.rvol.toFixed(1)}x`:"—"}</td>
                      <td style={{...S.tdR,color:rsi>=settings.rsiMin&&rsi<=settings.rsiMax?"#7CFFB2":"#5a5a5a"}}>{rsi.toFixed(0)}</td>
                      <td style={{...S.tdR,color:d.price>d.vwap?"#7CFFB2":"#5a5a5a"}}>{d.vwap?`$${fmt(d.vwap,2)}`:"—"}</td>
                      <td style={{...S.tdR,color:"#5a5a5a"}}>{d.firstCandleHigh>0?`H:$${fmt(d.firstCandleHigh,2)}`:"—"}</td>
                      <td style={{...S.td,fontSize:9}}>
                        {preC?.pass&&<span style={{color:"#a78bfa"}}>✅ PRE READY</span>}
                        {!preC?.pass&&gapC.pass&&<span style={{color:"#7CFFB2"}}>✅ GAP READY</span>}
                        {!preC?.pass&&!gapC.pass&&contC?.pass&&<span style={{color:"#FFB627"}}>✅ CONT READY</span>}
                        {!preC?.pass&&!gapC.pass&&!contC?.pass&&gapC.preMarket&&<span style={{color:"#7CFFB2"}}>🌅 {d.gapPct.toFixed(1)}% gap</span>}
                        {!preC?.pass&&!gapC.pass&&!contC?.pass&&!gapC.preMarket&&<span style={{color:"#3a3a3a"}}>{gapC.reason}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>OPEN POSITIONS ({trades.openTrades.filter(t=>t.ticker!=="BTC").length})</div>
          {!trades.openTrades.filter(t=>t.ticker!=="BTC").length?<div style={S.empty}>{running?"scanning…":"press START"}</div>:(
            <table style={S.table}>
              <thead><tr><th style={S.th}>SYM</th><th style={S.th}>MODE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>NOW</th><th style={S.thR}>TP</th><th style={S.thR}>SL</th><th style={S.thR}>RVOL</th><th style={S.thR}>UPL</th><th style={S.th}></th></tr></thead>
              <tbody>{trades.openTrades.filter(t=>t.ticker!=="BTC").map(o=>{
                const px=priceRef.current[o.ticker]??o.entry,upl=((px-o.entry)/o.entry)*100,d=getMkt(o.ticker);
                const modeColor=o.strategy==="PRE"?"#a78bfa":o.strategy==="GAP"?"#7CFFB2":"#FFB627";
                return(<tr key={o.id}>
                  <td style={S.td}>{o.ticker}</td>
                  <td style={S.td}><span style={{fontSize:9,padding:"2px 5px",borderRadius:1,border:`1px solid ${modeColor}`,color:modeColor}}>{o.strategy||"GAP"}</span></td>
                  <td style={S.tdR}>${fmt(o.entry,2)}</td><td style={S.tdR}>${fmt(px,2)}</td>
                  <td style={{...S.tdR,color:"#7CFFB2"}}>${fmt(o.tp,2)}</td>
                  <td style={{...S.tdR,color:"#FF7A7A"}}>${fmt(o.sl,2)}</td>
                  <td style={{...S.tdR,color:d.rvol>0&&d.rvol<settings.rvolExit?"#FF7A7A":"#7CFFB2"}}>{d.rvol>0?`${d.rvol.toFixed(1)}x`:"—"}</td>
                  <td style={{...S.tdR,color:upl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(upl)}</td>
                  <td style={S.td}><button onClick={()=>manualClose(o)} style={S.closeBtn}>CLOSE</button></td>
                </tr>);
              })}</tbody>
            </table>
          )}
        </div>
        <div style={{...S.card,flex:2}}>
          <div style={S.cardLabel}>TRADE JOURNAL ({trades.closedTrades.length})</div>
          {!trades.closedTrades.length?<div style={S.empty}>no closed trades yet</div>:(
            <div style={{maxHeight:260,overflow:"auto"}}>
              <table style={S.table}>
                <thead><tr><th style={S.th}>TIME</th><th style={S.th}>SYM</th><th style={S.th}>MODE</th><th style={S.thR}>ENTRY</th><th style={S.thR}>EXIT</th><th style={S.th}>RSN</th><th style={S.thR}>GAP</th><th style={S.thR}>RVOL</th><th style={S.thR}>PNL%</th><th style={S.thR}>PNL$</th><th style={S.thR}>HOLD</th></tr></thead>
                <tbody>{trades.closedTrades.map(c=>{
                  const modeColor=c.strategy==="PRE"?"#a78bfa":c.strategy==="GAP"?"#7CFFB2":"#FFB627";
                  return(<tr key={c.id}>
                    <td style={S.td}>{shortTime(c.closedAt)}</td>
                    <td style={S.td}>{c.ticker}{c.aiTrade?" 🤖":""}</td>
                    <td style={S.td}><span style={{fontSize:9,padding:"2px 4px",borderRadius:1,border:`1px solid ${modeColor}`,color:modeColor}}>{c.strategy||"—"}</span></td>
                    <td style={S.tdR}>${fmt(c.entry,2)}</td><td style={S.tdR}>${fmt(c.closePrice,2)}</td>
                    <td style={{...S.td,color:c.reason==="TP1"||c.reason==="TP2"?"#7CFFB2":c.reason==="MANUAL"?"#FFB627":"#FF7A7A",fontSize:9}}>{c.reason}</td>
                    <td style={{...S.tdR,color:"#FFB627"}}>{c.gapPct?fmtPct(c.gapPct):"—"}</td>
                    <td style={S.tdR}>{c.rvol?`${c.rvol.toFixed(1)}x`:"—"}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(c.pnlPct)}</td>
                    <td style={{...S.tdR,color:c.pnl>=0?"#7CFFB2":"#FF7A7A"}}>{c.pnl>=0?"+":""}{fmt(c.pnl,2)}</td>
                    <td style={S.tdR}>{(c.holdMs/1000).toFixed(0)}s</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          )}
        </div>
      </section>

      <section style={S.row}>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>ENTRIES TAKEN ({signals.length})</div>
          {!signals.length?<div style={S.empty}>no entries yet</div>:(
            <div style={{maxHeight:140,overflow:"auto"}}>{signals.map(s=>{
              const mc=s.strategy==="PRE"?"#a78bfa":s.strategy==="GAP"?"#7CFFB2":"#FFB627";
              return<div key={s.id} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.createdAt)}</span><span style={{fontWeight:700,minWidth:50,color:mc}}>{s.ticker}</span><span style={{fontSize:9,padding:"1px 4px",borderRadius:1,border:`1px solid ${mc}`,color:mc,marginRight:6}}>{s.strategy}</span><span style={{fontSize:10,color:"#a0a0a0"}}>gap {fmtPct(s.gapPct)} · rvol {s.rvol?.toFixed(1)}x · rsi {s.rsi?.toFixed(0)} · entry ${fmt(s.entry,2)} · tp ${fmt(s.tp,2)} · sl ${fmt(s.sl,2)}</span></div>;
            })}</div>
          )}
        </div>
        <div style={{...S.card,flex:1}}>
          <div style={S.cardLabel}>SCAN LOG ({scanLog.length})</div>
          {!scanLog.length?<div style={S.empty}>no rejections</div>:(
            <div style={{maxHeight:140,overflow:"auto"}}>{scanLog.map((s,i)=><div key={i} style={S.sigRow}><span style={{color:"#5a5a5a",minWidth:60}}>{shortTime(s.t)}</span><span style={{fontWeight:700,minWidth:50}}>{s.ticker}</span><span style={{fontSize:10,color:"#FF7A7A"}}>{s.reason}</span></div>)}</div>
          )}
        </div>
      </section>

      <footer style={S.footer}>yahoo finance + alpaca scanner · {allTickers.length} symbols · gap {settings.gapMinPct}%+ · price ${settings.priceMin}-${settings.priceMax} · tp +{settings.tpPct1}% sl -{settings.slPct}% · circuit ${settings.dailyLossLimit}</footer>
    </div>
  );
}

function StatusPill({running,stale,btcError}){let color="#7CFFB2",text="RUNNING";if(!running){color="#5a5a5a";text="IDLE";}if(running&&(stale||btcError)){color="#FFB627";text="DEGRADED";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function AlpacaPill({connStatus,mode}){let color="#5a5a5a",text="ALPACA OFF";if(connStatus.state==="testing"){color="#FFB627";text="ALPACA…";}else if(connStatus.state==="connected"){color=mode==="alpaca"?"#FFB627":"#7CFFB2";text=mode==="alpaca"?"ALPACA LIVE":"ALPACA READY";}else if(connStatus.state==="error"){color="#FF7A7A";text="ALPACA ERR";}return<div style={{...styles.pill,borderColor:color,color}}><span style={{...styles.pillDot,background:color}}/>{text}</div>;}
function Diag({label,value,bad}){return<div style={{textAlign:"right"}}><div style={{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"}}>{label}</div><div style={{fontSize:13,marginTop:2,color:bad?"#FF7A7A":"#e8e8e8"}}>{value}</div></div>;}
function Stat({label,v,bad}){return<div style={styles.statCell}><div style={styles.statLabel}>{label}</div><div style={{...styles.statVal,color:bad?"#FF7A7A":"#e8e8e8"}}>{v}</div></div>;}

function AlpacaAccountCard({account,positions,mode,errors}){
  const equity=Number(account.equity),bp=Number(account.buying_power),lastEq=Number(account.last_equity),dayPnl=equity-lastEq,dayPnlPct=lastEq?(dayPnl/lastEq)*100:0;
  return<section style={{...styles.card,borderLeft:"2px solid #FFB627"}}><div style={styles.cardHead}><div><div style={styles.cardLabel}>ALPACA PAPER · {account.account_number}{mode==="alpaca"?<span style={{color:"#FFB627",marginLeft:10}}>· ORDERS LIVE</span>:<span style={{color:"#5a5a5a",marginLeft:10}}>· read-only</span>}</div><div style={styles.cardBigNum}>${fmt(equity,2)} <span style={{...styles.delta,color:dayPnl>=0?"#7CFFB2":"#FF7A7A"}}>{fmtPct(dayPnlPct)} today</span></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,auto)",gap:16}}><Diag label="BUYING POWER" value={`$${fmt(bp,0)}`}/><Diag label="CASH" value={`$${fmt(Number(account.cash),0)}`}/><Diag label="POSITIONS" value={positions.length}/><Diag label="STATUS" value={account.status}/></div></div>{errors.length>0&&<div style={{marginTop:12}}><div style={styles.cardLabel}>API ERRORS</div><div style={{maxHeight:60,overflow:"auto",fontSize:10,color:"#FF7A7A"}}>{errors.slice(0,3).map((e,i)=><div key={i}><span style={{color:"#5a5a5a"}}>{shortTime(new Date(e.t).toISOString())}</span> {e.msg}</div>)}</div></div>}</section>;
}

function SettingsDrawer({settings,onChange,onReset,onClose,creds,onCredsChange,connStatus,onTest,execMode,onModeChange,alpacaAccount,anthropicKey,onAnthropicKeyChange}){
  const set=(k,v)=>onChange({...settings,[k]:v});
  return(
    <section style={styles.settingsCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><div style={styles.cardLabel}>SETTINGS</div><div style={{fontSize:10,color:"#5a5a5a",marginTop:2}}>changes apply immediately</div></div>
        <div style={{display:"flex",gap:8}}><button onClick={onReset} style={styles.resetBtn}>RESTORE DEFAULTS</button><button onClick={onClose} style={styles.resetBtn}>CLOSE</button></div>
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>STRATEGY MODES</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <button onClick={()=>set("preMarketEnabled",!settings.preMarketEnabled)} style={{...styles.modeBtn,...(settings.preMarketEnabled?{background:"#1a0e3a",borderColor:"#a78bfa",color:"#a78bfa"}:{})}}>
            PRE-MARKET<div style={styles.modeBtnSub}>4am–9:30am · gap + volume</div>
            <div style={{marginTop:6,fontSize:9,color:settings.preMarketEnabled?"#a78bfa":"#5a5a5a"}}>{settings.preMarketEnabled?"● ENABLED":"○ DISABLED"}</div>
          </button>
          <button onClick={()=>set("gapMomentumEnabled",!settings.gapMomentumEnabled)} style={{...styles.modeBtn,...(settings.gapMomentumEnabled?styles.modeBtnActive:{})}}>
            GAP MOMENTUM<div style={styles.modeBtnSub}>9:30–10:30am · breakout</div>
            <div style={{marginTop:6,fontSize:9,color:settings.gapMomentumEnabled?"#7CFFB2":"#5a5a5a"}}>{settings.gapMomentumEnabled?"● ENABLED":"○ DISABLED"}</div>
          </button>
          <button onClick={()=>set("continuationEnabled",!settings.continuationEnabled)} style={{...styles.modeBtn,...(settings.continuationEnabled?styles.modeBtnActiveAlpaca:{})}}>
            CONTINUATION<div style={styles.modeBtnSub}>9:30am–3:30pm · all-day</div>
            <div style={{marginTop:6,fontSize:9,color:settings.continuationEnabled?"#FFB627":"#5a5a5a"}}>{settings.continuationEnabled?"● ENABLED":"○ DISABLED"}</div>
          </button>
        </div>
        {settings.preMarketEnabled&&(
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <NumField label="PRE-MKT TP %" value={settings.preMarketTpPct} min={2} max={30} step={0.5} onChange={v=>set("preMarketTpPct",v)} help="wider — pre-market moves fast"/>
            <NumField label="PRE-MKT SL %" value={settings.preMarketSlPct} min={1} max={15} step={0.5} onChange={v=>set("preMarketSlPct",v)} help="wider — pre-market is volatile"/>
            <div style={{...styles.alpacaWarn,gridColumn:"1/-1"}}>⚠ Uses whole share qty orders with extended_hours:true · IEX data is thinner before 7am</div>
          </div>
        )}
        {settings.continuationEnabled&&(
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <NumField label="MIN MOVE %" value={settings.contMinMove} min={1} max={20} step={0.5} onChange={v=>set("contMinMove",v)} help="up X% from open"/>
            <NumField label="MIN RVOL" value={settings.contRvolMin} min={1} max={10} step={0.5} onChange={v=>set("contRvolMin",v)}/>
            <NumField label="RSI MIN" value={settings.contRsiMin} min={40} max={70} step={1} onChange={v=>set("contRsiMin",v)}/>
            <NumField label="RSI MAX" value={settings.contRsiMax} min={60} max={95} step={1} onChange={v=>set("contRsiMax",v)}/>
            <NumField label="TP %" value={settings.contTpPct} min={0.5} max={10} step={0.5} onChange={v=>set("contTpPct",v)}/>
            <NumField label="SL %" value={settings.contSlPct} min={0.5} max={5} step={0.5} onChange={v=>set("contSlPct",v)}/>
          </div>
        )}
      </div>
      <div style={{...styles.settingGroup,borderColor:"#7CFFB2",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#7CFFB2"}}>ANTHROPIC API KEY — BTC AI</div>
        <div style={{...styles.alpacaWarn,marginBottom:10}}>⚠ memory only · console.anthropic.com</div>
        <SecretField label="ANTHROPIC API KEY" value={anthropicKey} placeholder="sk-ant-api03-…" onChange={onAnthropicKeyChange} mask/>
        {anthropicKey&&<div style={{marginTop:6,fontSize:10,color:"#7CFFB2"}}>✓ key set — {anthropicKey.slice(0,16)}…</div>}
      </div>
      <div style={{...styles.settingGroup,borderColor:"#FFB627",marginBottom:14}}>
        <div style={{...styles.settingGroupTitle,color:"#FFB627"}}>ALPACA PAPER ACCOUNT</div>
        <div style={styles.alpacaWarn}>⚠ paper-trading keys only · never paste live keys here</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <SecretField label="API KEY ID" value={creds.keyId} placeholder="PK…" onChange={v=>onCredsChange({...creds,keyId:v.trim()})} mask={false}/>
          <SecretField label="SECRET KEY" value={creds.secret} placeholder="long random string" onChange={v=>onCredsChange({...creds,secret:v.trim()})} mask/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={onTest} style={styles.testBtn} disabled={connStatus.state==="testing"}>{connStatus.state==="testing"?"TESTING…":"▶ TEST CONNECTION"}</button>
          <ConnIndicator connStatus={connStatus}/>
        </div>
        {connStatus.state==="connected"&&<div style={{marginTop:12}}>
          <div style={styles.fieldLabel}>EXECUTION MODE</div>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={()=>onModeChange("simulated")} style={{...styles.modeBtn,...(execMode==="simulated"?styles.modeBtnActive:{})}}>SIMULATED<div style={styles.modeBtnSub}>local paper only</div></button>
            <button onClick={()=>onModeChange("alpaca")} style={{...styles.modeBtn,...(execMode==="alpaca"?styles.modeBtnActiveAlpaca:{})}}>ALPACA PAPER<div style={styles.modeBtnSub}>real orders</div></button>
          </div>
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:14}}>
        <SettingGroup title="ENTRY FILTERS">
          <NumField label="MIN GAP %" value={settings.gapMinPct} min={1} max={50} step={1} onChange={v=>set("gapMinPct",v)} help="min gap % from prev close"/>
          <NumField label="MIN RVOL" value={settings.rvolEntry} min={1} max={20} step={0.5} onChange={v=>set("rvolEntry",v)} help="gap strategy RVOL"/>
          <NumField label="EXIT RVOL" value={settings.rvolExit} min={1} max={10} step={0.5} onChange={v=>set("rvolExit",v)} help="exit if RVOL drops below"/>
          <NumField label="RSI MIN" value={settings.rsiMin} min={30} max={70} step={1} onChange={v=>set("rsiMin",v)}/>
          <NumField label="RSI MAX" value={settings.rsiMax} min={50} max={95} step={1} onChange={v=>set("rsiMax",v)}/>
          <NumField label="PRICE MIN $" value={settings.priceMin} min={0.01} max={50} step={0.1} onChange={v=>set("priceMin",v)} help="set to 0.1 for penny stocks"/>
          <NumField label="PRICE MAX $" value={settings.priceMax} min={1} max={1000} step={1} onChange={v=>set("priceMax",v)}/>
        </SettingGroup>
        <SettingGroup title="EXITS AND RISK">
          <NumField label="TP1 %" value={settings.tpPct1} min={1} max={20} step={0.5} onChange={v=>set("tpPct1",v)}/>
          <NumField label="TP2 %" value={settings.tpPct2} min={2} max={50} step={1} onChange={v=>set("tpPct2",v)}/>
          <NumField label="HARD STOP %" value={settings.slPct} min={0.5} max={10} step={0.5} onChange={v=>set("slPct",v)}/>
          <NumField label="MAX TRADE SIZE $" value={settings.maxTradeSize} min={10} max={100000} step={10} onChange={v=>set("maxTradeSize",v)}/>
          <NumField label="DAILY LOSS LIMIT $" value={settings.dailyLossLimit} min={50} max={10000} step={50} onChange={v=>set("dailyLossLimit",v)} help="circuit breaker"/>
        </SettingGroup>
        <SettingGroup title="TIMING">
          <NumField label="SCAN INTERVAL MS" value={settings.scanIntervalMs} min={10000} max={300000} step={5000} onChange={v=>set("scanIntervalMs",v)} help="Alpaca full scan cadence"/>
          <NumField label="MOST ACTIVES COUNT" value={settings.mostActivesCount} min={10} max={50} step={5} onChange={v=>set("mostActivesCount",v)}/>
          <NumField label="BTC POLL MS" value={settings.pollMs} min={10000} max={120000} step={1000} onChange={v=>set("pollMs",v)}/>
        </SettingGroup>
      </div>
    </section>
  );
}

function SettingGroup({title,children}){return<div style={styles.settingGroup}><div style={styles.settingGroupTitle}>{title}</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{children}</div></div>;}
function NumField({label,value,min,max,step,onChange,help}){const[draft,setDraft]=useState(String(value));useEffect(()=>{setDraft(String(value));},[value]);const commit=()=>{const n=Number(draft);if(isNaN(n)){setDraft(String(value));return;}const c=Math.max(min,Math.min(max,n));onChange(c);setDraft(String(c));};return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={styles.fieldLabel}>{label}</div><input type="number" value={draft} min={min} max={max} step={step} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}} style={styles.input}/>{help&&<div style={{fontSize:9,color:"#3a3a3a",marginTop:2}}>{help}</div>}</label>;}
function SecretField({label,value,placeholder,onChange,mask}){const[revealed,setRevealed]=useState(false);return<label style={{display:"flex",flexDirection:"column",gap:3}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={styles.fieldLabel}>{label}</div>{mask&&<button type="button" onClick={()=>setRevealed(r=>!r)} style={styles.eyeBtn}>{revealed?"HIDE":"SHOW"}</button>}</div><input type={mask&&!revealed?"password":"text"} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} spellCheck={false} autoComplete="off" style={styles.input}/></label>;}
function ConnIndicator({connStatus}){const cm={disconnected:"#5a5a5a",testing:"#FFB627",connected:"#7CFFB2",error:"#FF7A7A"};const color=cm[connStatus.state]||"#5a5a5a";return<div style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}><span style={{...styles.pillDot,background:color}}/><span style={{color,fontWeight:700,letterSpacing:1.5}}>{connStatus.state.toUpperCase()}</span>{connStatus.message&&<span style={{color:"#a0a0a0",fontSize:10}}>{connStatus.message}</span>}</div>;}

  shell:{fontFamily:"'JetBrains Mono',ui-monospace,monospace",background:"#060606",color:"#e8e8e8",minHeight:"100vh",padding:16,display:"flex",flexDirection:"column",gap:12},
  header:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 12px",borderBottom:"1px solid #1a1a1a",flexWrap:"wrap",gap:8},

  brandDot:{width:8,height:8,background:"#FFB627",borderRadius:1,boxShadow:"0 0 12px #FFB627"},

  brandSub:{color:"#5a5a5a",fontSize:11,letterSpacing:1},

  runBtnStop:{background:"#FF7A7A"},
  resetBtn:{background:"transparent",color:"#e8e8e8",border:"1px solid #2a2a2a",padding:"8px 14px",fontSize:11,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2},
  closeBtn:{background:"transparent",border:"1px solid #3a3a3a",color:"#a0a0a0",fontSize:9,letterSpacing:1,fontFamily:"inherit",cursor:"pointer",padding:"3px 7px",borderRadius:2},
  row:{display:"flex",gap:12,flexWrap:"wrap"},
  card:{background:"#0d0d0d",border:"1px solid #1a1a1a",padding:14,borderRadius:2,flex:1,minWidth:0},

  cardLabel:{fontSize:10,letterSpacing:2,color:"#5a5a5a",fontWeight:700,marginBottom:6},
  cardBigNum:{fontSize:26,fontWeight:500,letterSpacing:-0.5},
  delta:{fontSize:11,marginLeft:8,fontWeight:500},

  warnBar:{marginTop:10,padding:"6px 10px",background:"#3a2a0e",color:"#FFB627",fontSize:11,borderRadius:2},
  bigEquity:{fontSize:22,marginTop:4,fontWeight:500},
  statGrid:{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8},
  statCell:{background:"#060606",padding:"8px 10px",border:"1px solid #1a1a1a",borderRadius:2},
  statLabel:{fontSize:9,letterSpacing:1.5,color:"#5a5a5a"},
  statVal:{fontSize:13,marginTop:2,fontWeight:500},
  settingsCard:{background:"#0d0d0d",border:"1px solid #1a1a1a",borderLeft:"2px solid #FFB627",padding:16,borderRadius:2},
  settingGroup:{background:"#060606",border:"1px solid #1a1a1a",padding:12,borderRadius:2},
  settingGroupTitle:{fontSize:9,letterSpacing:2,color:"#FFB627",fontWeight:700,marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1a1a1a"},
  fieldLabel:{fontSize:9,letterSpacing:1.5,color:"#5a5a5a",fontWeight:700},
  input:{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#e8e8e8",padding:"6px 8px",fontSize:12,fontFamily:"'JetBrains Mono',monospace",borderRadius:2,outline:"none",width:"100%"},
  alpacaWarn:{fontSize:10,color:"#FFB627",background:"#3a2a0e",padding:"6px 10px",borderRadius:2,letterSpacing:0.3,lineHeight:1.5},
  testBtn:{background:"#FFB627",color:"#0d0d0d",border:"none",padding:"8px 14px",fontSize:10,fontWeight:700,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2},
  eyeBtn:{background:"transparent",color:"#5a5a5a",border:"none",fontSize:9,letterSpacing:1,fontFamily:"inherit",cursor:"pointer",padding:0},
  modeBtn:{flex:1,background:"#060606",color:"#e8e8e8",border:"1px solid #2a2a2a",padding:"10px 12px",fontSize:11,fontWeight:700,letterSpacing:1.5,fontFamily:"inherit",cursor:"pointer",borderRadius:2,textAlign:"left"},
  modeBtnSub:{fontSize:9,fontWeight:400,letterSpacing:0.3,color:"#5a5a5a",marginTop:4},
  modeBtnActive:{background:"#0e3a22",borderColor:"#7CFFB2",color:"#7CFFB2"},
  modeBtnActiveAlpaca:{background:"#3a2a0e",borderColor:"#FFB627",color:"#FFB627"},
  empty:{color:"#5a5a5a",fontSize:12,padding:"20px 0",textAlign:"center"},
  table:{fontSize:11,marginTop:8},
  th:{textAlign:"left",color:"#5a5a5a",fontWeight:400,fontSize:9,letterSpacing:1.5,padding:"6px 8px",borderBottom:"1px solid #1a1a1a"},
  thR:{textAlign:"right",color:"#5a5a5a",fontWeight:400,fontSize:9,letterSpacing:1.5,padding:"6px 8px",borderBottom:"1px solid #1a1a1a"},
  td:{padding:"6px 8px",borderBottom:"1px solid #131313"},
  tdR:{padding:"6px 8px",borderBottom:"1px solid #131313",textAlign:"right"},
  sigRow:{display:"flex",gap:14,padding:"6px 4px",borderBottom:"1px solid #131313",fontSize:11,alignItems:"center"},
  footer:{textAlign:"center",color:"#3a3a3a",fontSize:10,letterSpacing:1.5,marginTop:4,padding:8},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
