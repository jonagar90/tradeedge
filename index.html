const STARTING_BALANCE = DEFAULT_SETTINGS.startingBalance;

const fmt=(n,d=2)=>n===null||n===undefined||Number.isNaN(n)?"—":Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=(n,d=2)=>n===null||n===undefined?"—":`${n>=0?"+":""}${n.toFixed(d)}%`;
const nowIso=()=>new Date().toISOString();
const shortTime=iso=>iso?new Date(iso).toLocaleTimeString(undefined,{hour12:false}):"—";

const getEST=()=>{
  const est=new Date(new Date().getTime()-(4*3600000));
  const h=est.getUTCHours(),m=est.getUTCMinutes();
  const minsFromOpen=(h-9)*60+(m-30);
  return{h,m,minsFromOpen,isPreMarket:h>=4&&minsFromOpen<0,isMarketOpen:minsFromOpen>=0&&minsFromOpen<=390};
};

/* ================================================================
   MARKET REGIME DETECTOR
   ================================================================ */
const regime={
  current:"UNKNOWN", // TRENDING | CHOPPY | NO_TRADE
  failureRate:0,
  recentSignals:[], // {result:'WIN'|'LOSS', t}
  noTradeUntil:0,
};

function updateRegime(result){
  const now=Date.now();
  regime.recentSignals.push({result,t:now});
  // keep last 10 signals from last 30 min
  regime.recentSignals=regime.recentSignals.filter(s=>now-s.t<1800000).slice(-10);
  const losses=regime.recentSignals.filter(s=>s.result==="LOSS").length;
  regime.failureRate=regime.recentSignals.length>0?(losses/regime.recentSignals.length)*100:0;
  // Require minimum 5 trades before regime classification — 1-2 losses is statistical noise,
  // not a regime change. Without this, two random small losses lock the bot in NO_TRADE.
  if(regime.recentSignals.length<5){regime.current="TRENDING";return;}
  if(regime.failureRate>=60){regime.current="NO_TRADE";regime.noTradeUntil=now+1800000;}
  else if(regime.failureRate>=40){regime.current="CHOPPY";}
  else{regime.current="TRENDING";}
}

function getRegimeMultiplier(){
  if(regime.current==="TRENDING")return 1.0;
  if(regime.current==="CHOPPY")return 0.5;
  if(regime.current==="NO_TRADE")return 0;
  // Initial "UNKNOWN" state — before any wins/losses have occurred.
  // Previously returned 0, which silently zeroed out position size and blocked all trades.
  // Default to full size (1.0) until regime adjusts based on actual results.
  return 1.0;
}

/* ================================================================
   PER-TICKER MARKET DATA + STATE MACHINE
   ================================================================ */
const mktData={};
const getMkt=t=>{
  if(!mktData[t])mktData[t]={
    price:0,prevClose:0,open:0,preMarketHigh:0,
    volume:0,
    priceHistory:[],   // raw ticks
    candles1m:[],      // 1m OHLCV
    currentCandle:null,
    candles5m:[],      // 5m OHLCV — used for 5-min RSI in Quality Setup lane
    currentCandle5m:null,
    openingRangeHigh:0,   // first 15 min high after market open
    openingRangeLow:0,    // first 15 min low after market open
    openingRangeDone:false,
    ema9:0,ema21:0,ema50:0,
    vwapNum:0,vwapDen:0,vwap:0,
    // Premarket-specific indicators (reset at the open). Regular-session VWAP above mixes
    // premarket+RTH volume, which is wrong for a premarket strategy — these track premarket alone.
    pmVwapNum:0,pmVwapDen:0,pmVwap:0,
    pmHigh:0,pmLow:0,pmVolume:0,pmOpen:0,
    pmVwapReset:false,    // flips true once we've cleared premarket accumulators at the open
    firstCandleHigh:0,firstCandleLow:0,firstCandleDone:false,
    rvol:0,gapPct:0,
    atr:0,atrHistory:[],
    // New data fields (populated by Polygon/FMP fetchers)
    floatShares:0,        // 0 = unknown, populated by FMP
    hasCatalyst:false,    // populated by Polygon news scan
    matchedKeywords:[],   // which catalyst keywords matched
    catalystArticles:0,   // count of recent articles
    // State machine
    state:"IDLE", // IDLE→WATCHING→PULLBACK→CONFIRM→ENTERED
    breakoutLevel:0,breakoutVolume:0,breakoutTime:0,
    pullbackLow:0,pullbackCandles:0,
    confirmCandle:null,
    // scoring
    score:0,
    // tracking
    slHits:0,lastSlTime:0,failedBreakouts:0,lastFailTime:0,
    // exit counters
    vwapBelowCount:0,rvolLowCount:0,redCandleCount:0,
    // partial exit tracking
    partialDone:false,
    source:"alpaca",
  };
  return mktData[t];
};

function calcEMA(prices,period){
  if(prices.length<period)return prices[prices.length-1]||0;
  const k=2/(period+1);
  let ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);
  return ema;
}

function calcRSI(prices){
  if(prices.length<2)return 50;
  let g=0,l=0;
  for(let i=1;i<prices.length;i++){const d=prices[i]-prices[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const n=prices.length-1;
  return 100-(100/(1+(g/n)/Math.max(l/n,0.0001)));
}

// 5-min RSI — computed from the closes of completed 5-min candles.
// Standard period is 14, but we accept whatever 5m candles we have (min 2).
// Returns 50 (neutral) if insufficient data.
function calcRSI5m(candles5m,period=14){
  if(!candles5m||candles5m.length<2)return 50;
  // Use last `period` candle closes (need at least 2 closes to compute changes)
  const closes=candles5m.slice(-period-1).map(c=>c.close);
  return calcRSI(closes);
}

// "Holding EMA9" — true if the EMA9 is acting as support rather than resistance.
// Used for QUALITY lane to catch stocks consolidating/breaking out above EMA9, instead of
// requiring price > EMA9 at every single tick (which rejects valid setups during consolidation).
//
// Three conditions, ALL must be true:
//   1. Current price is at or near EMA9 (within 0.3% on either side — wider on the upside)
//   2. At least one recent candle has touched EMA9 (proves we're using it as a level)
//   3. None of the recent candle CLOSES were below EMA9 × 0.998 (closes must hold, wicks ok)
//
// This catches the "higher highs, higher lows, holding EMA9 like a trampoline" pattern.
// Rejects stocks where EMA9 just got broken to the downside (asymmetric protection).
function isHoldingEma9(candles1m,ema9Current,priceNow,lookback=5){
  if(!ema9Current||ema9Current<=0)return false;
  if(!candles1m||candles1m.length<lookback)return false;
  // Condition 1: price close to EMA9 — allow up to 5% above (extended is ok), max 0.3% below
  if(priceNow<ema9Current*0.997)return false;
  if(priceNow>ema9Current*1.05)return false; // way above = not actually testing EMA9, different setup
  const recent=candles1m.slice(-lookback);
  // Condition 2: at least one candle low has touched within 0.5% of EMA9
  // (we approximate "EMA9 at that time" with current EMA9 since EMA9 moves slowly)
  const touched=recent.some(c=>c.low<=ema9Current*1.005&&c.low>=ema9Current*0.995);
  if(!touched)return false;
  // Condition 3: all recent closes must be at or above EMA9 (with 0.2% tolerance for noise)
  const allClosesHeld=recent.every(c=>c.close>=ema9Current*0.998);
  if(!allClosesHeld)return false;
  return true;
}

/* ================================================================
   STRUCTURAL STOP-LOSS — anchored to price action, not arbitrary %
   ================================================================
   Replaces the fixed -1.5% SL with one based on real structure:
     - VWAP × (1 - vwapBufferPct/100)         e.g. $0.314 × 0.995 = $0.312
     - swing low (last N candles)             lowest of last 5 candle lows
   We use the TIGHTER of those two (closer to entry — more conservative protection)
   then ENFORCE a hard floor at the maxSlPct cap.
   Result: tight stops when the structure is tight, wider when the chart shows wider
   support — but never wider than maxSlPct, so a disaster trade can't blow you up.
*/
function calcStructuralSL(entryPrice,vwap,candles1m,opts){
  const o=opts||{};
  const vwapBufferPct=o.vwapBufferPct||0.5;   // place SL 0.5% under VWAP
  const swingLookback=o.swingLookback||5;     // 5 1-min candles
  const swingBufferPct=o.swingBufferPct||0.2; // place SL 0.2% under swing low
  const maxSlPct=o.maxSlPct||3;               // never more than 3% below entry
  const minSlPct=o.minSlPct||0.5;             // never tighter than 0.5% below entry
  // Floor: never wider than max%
  const hardFloor=entryPrice*(1-maxSlPct/100);
  // Ceiling: never tighter than min%
  const hardCeiling=entryPrice*(1-minSlPct/100);
  // Compute candidate SLs
  const candidates=[];
  if(vwap>0&&vwap<entryPrice){
    candidates.push(vwap*(1-vwapBufferPct/100));
  }
  if(candles1m&&candles1m.length>=swingLookback){
    const recent=candles1m.slice(-swingLookback);
    const swingLow=Math.min(...recent.map(c=>c.low));
    if(swingLow>0&&swingLow<entryPrice){
      candidates.push(swingLow*(1-swingBufferPct/100));
    }
  }
  // No usable candidates (no VWAP yet, no candles) — fall back to fixed-pct SL at midpoint
  if(candidates.length===0){
    const midSlPct=(maxSlPct+minSlPct)/2;
    return entryPrice*(1-midSlPct/100);
  }
  // Use the HIGHER of the candidates (closer to entry = tighter, more conservative)
  let sl=Math.max(...candidates);
  // Clamp between hard floor and hard ceiling
  if(sl<hardFloor)sl=hardFloor;       // never wider than max%
  if(sl>hardCeiling)sl=hardCeiling;   // never tighter than min%
  // HARD GUARANTEE: a long's stop must be below entry. If bad input data ever produces an SL
  // at/above entry (e.g., stale VWAP from when the stock was higher), fall back to a clean
  // fixed-% stop below entry. Prevents the "stop above entry = instant fake exit" bug.
  if(sl>=entryPrice){
    sl=entryPrice*(1-maxSlPct/100);
  }
  return sl;
}

function calcATR(candles,period=14){
  if(candles.length<2)return 0;
  const trs=candles.slice(-period).map((c,i,a)=>{
    if(i===0)return c.high-c.low;
    const prev=a[i-1];
    return Math.max(c.high-c.low,Math.abs(c.high-prev.close),Math.abs(c.low-prev.close));
  });
  return trs.reduce((a,b)=>a+b,0)/trs.length;
}

function updateMkt(ticker,price,volume,prevClose,open){
  const d=getMkt(ticker);
  const{h,m,minsFromOpen}=getEST();
  const now=Date.now();
  d.price=price;
  if(prevClose>0)d.prevClose=prevClose;
  if(open>0)d.open=open;
  if(d.prevClose>0)d.gapPct=((d.open||price)-d.prevClose)/d.prevClose*100;
  if(minsFromOpen<0&&price>d.preMarketHigh)d.preMarketHigh=price;
  if(volume>0){d.vwapNum+=price*volume;d.vwapDen+=volume;d.vwap=d.vwapDen>0?d.vwapNum/d.vwapDen:price;d.volume+=volume;}
  // ── Premarket-specific indicators (4:00am–9:30am ET) ──────────────────────
  if(minsFromOpen<0){
    // Premarket session high/low
    if(d.pmHigh===0||price>d.pmHigh)d.pmHigh=price;
    if(d.pmLow===0||price<d.pmLow)d.pmLow=price;
    if(d.pmOpen===0)d.pmOpen=price; // first premarket print
    // Premarket VWAP — separate accumulator from regular session
    if(volume>0){
      d.pmVwapNum+=price*volume;
      d.pmVwapDen+=volume;
      d.pmVwap=d.pmVwapDen>0?d.pmVwapNum/d.pmVwapDen:price;
      d.pmVolume+=volume;
    }
  } else if(!d.pmVwapReset){
    // At the open, freeze premarket VWAP value but stop accumulating into it.
    // The regular-session VWAP (d.vwap) takes over from here.
    d.pmVwapReset=true;
  }
  // First candle tracking
  if(minsFromOpen===0){if(price>d.firstCandleHigh)d.firstCandleHigh=price;if(d.firstCandleLow===0||price<d.firstCandleLow)d.firstCandleLow=price;}
  if(minsFromOpen===1&&!d.firstCandleDone)d.firstCandleDone=true;
  // Price history & EMAs
  d.priceHistory.push(price);if(d.priceHistory.length>100)d.priceHistory.shift();
  if(d.priceHistory.length>=9)d.ema9=calcEMA(d.priceHistory,9);
  if(d.priceHistory.length>=21)d.ema21=calcEMA(d.priceHistory,21);
  if(d.priceHistory.length>=50)d.ema50=calcEMA(d.priceHistory,50);
  // 1m candle building
  const minKey=`${h}:${String(m).padStart(2,"0")}`;
  if(!d.currentCandle||d.currentCandle.key!==minKey){
    if(d.currentCandle)d.candles1m.push({...d.currentCandle});
    if(d.candles1m.length>60)d.candles1m.shift();
    d.currentCandle={key:minKey,open:price,high:price,low:price,close:price,volume:volume||0,t:now};
  } else {
    d.currentCandle.high=Math.max(d.currentCandle.high,price);
    d.currentCandle.low=Math.min(d.currentCandle.low,price);
    d.currentCandle.close=price;
    d.currentCandle.volume+=(volume||0);
  }
  // 5m candle building — bucket minutes into 5-min slots (0-4 = slot 0, 5-9 = slot 1, etc.)
  const fiveMinSlot=Math.floor(m/5)*5;
  const fiveMinKey=`${h}:${String(fiveMinSlot).padStart(2,"0")}`;
  if(!d.currentCandle5m||d.currentCandle5m.key!==fiveMinKey){
    if(d.currentCandle5m)d.candles5m.push({...d.currentCandle5m});
    if(d.candles5m.length>30)d.candles5m.shift(); // keep last 30 = 2.5 hours
    d.currentCandle5m={key:fiveMinKey,open:price,high:price,low:price,close:price,volume:volume||0,t:now};
  } else {
    d.currentCandle5m.high=Math.max(d.currentCandle5m.high,price);
    d.currentCandle5m.low=Math.min(d.currentCandle5m.low,price);
    d.currentCandle5m.close=price;
    d.currentCandle5m.volume+=(volume||0);
  }
  // Opening Range (first 15 min after open) — high/low for breakout detection
  if(minsFromOpen>=0&&minsFromOpen<15){
    if(price>d.openingRangeHigh)d.openingRangeHigh=price;
    if(d.openingRangeLow===0||price<d.openingRangeLow)d.openingRangeLow=price;
  }
  if(minsFromOpen===15&&!d.openingRangeDone)d.openingRangeDone=true;
  // ATR
  if(d.candles1m.length>=2){const atr=calcATR(d.candles1m);d.atr=atr;d.atrHistory.push(atr);if(d.atrHistory.length>14)d.atrHistory.shift();}
  // RVOL is now set externally by the Alpaca scanner using time-scaled 20-day baseline.
  // The old per-minute rolling average was broken (always produced ~1.0x for new tickers).
  // State machine update — returns true if ticker just entered CONFIRM state
  return updateStateMachine(ticker,price,volume);
}

/* ================================================================
   STATE MACHINE: IDLE → WATCHING → PULLBACK → CONFIRM
   ================================================================ */
function updateStateMachine(ticker,price,volume){
  const d=getMkt(ticker);
  const{minsFromOpen}=getEST();
  // Only active during regular trading hours (full session, not just first 6 hours)
  if(minsFromOpen<0||minsFromOpen>390)return false;
  const prevState=d.state;

  switch(d.state){
    case"IDLE":
      // Detect breakout above first candle high or recent resistance
      if(d.firstCandleDone&&price>d.firstCandleHigh*1.002&&d.rvol>=5&&volume>0){
        d.state="WATCHING";
        d.breakoutLevel=price;
        d.breakoutVolume=volume;
        d.breakoutTime=Date.now();
        d.pullbackCandles=0;
      }
      break;

    case"WATCHING":
      // Wait for pullback (retracement toward VWAP/EMA9)
      if(Date.now()-d.breakoutTime>300000){d.state="IDLE";break;} // 5 min timeout
      const retraceTarget=Math.max(d.vwap,d.ema9)*0.999;
      if(price<=d.breakoutLevel*0.985&&price>=retraceTarget){
        d.state="PULLBACK";
        d.pullbackLow=price;
        d.pullbackCandles=0;
      }
      // If price extends without pullback — too extended, skip
      if(price>d.breakoutLevel*1.10){d.state="IDLE";}
      break;

    case"PULLBACK":
      d.pullbackCandles++;
      if(price<d.pullbackLow)d.pullbackLow=price;
      // Pullback failed — closed below VWAP or EMA9
      if(price<d.vwap*0.995||price<d.ema9*0.995){
        d.state="IDLE";d.failedBreakouts++;d.lastFailTime=Date.now();
        break;
      }
      // Too many pullback candles = momentum lost
      if(d.pullbackCandles>6){d.state="IDLE";break;}
      // Continuation candle: price pushes back above pullback high
      if(price>d.breakoutLevel*0.99&&d.rvol>=3&&d.currentCandle&&d.currentCandle.close>d.currentCandle.open){
        d.state="CONFIRM";
        d.confirmCandle={price,volume,ema9:d.ema9,ema21:d.ema21,vwap:d.vwap,t:Date.now()};
      }
      break;

    case"CONFIRM":
      // Confirmation is valid for 2 candles then reset
      if(Date.now()-d.confirmCandle?.t>120000){d.state="IDLE";}
      break;
  }
  // Return true if we just entered CONFIRM state — caller can use this to trigger fire() immediately
  return prevState!=="CONFIRM"&&d.state==="CONFIRM";
}

/* ================================================================
   TICKER SCORING (0-100)
   ================================================================ */
function scoreTickker(ticker,s){
  const d=getMkt(ticker);
  let score=0;
  // RVOL (25 pts)
  if(d.rvol>=10)score+=25;
  else if(d.rvol>=5)score+=15;
  else if(d.rvol>=2)score+=5;
  // Gap quality (20 pts)
  if(d.gapPct>=20)score+=20;
  else if(d.gapPct>=10)score+=12;
  else if(d.gapPct>=5)score+=6;
  // Trend strength — EMA alignment (20 pts)
  if(d.ema9>d.ema21&&d.ema21>0&&d.ema9>d.ema9*0.999)score+=20;
  else if(d.ema9>d.ema21)score+=12;
  // Structure score (20 pts)
  // Higher lows in last 5 candles
  const last5=d.candles1m.slice(-5);
  if(last5.length>=3){
    const lows=last5.map(c=>c.low);
    const higherLows=lows.every((l,i)=>i===0||l>=lows[i-1]);
    if(higherLows)score+=10;
  }
  // State machine confirmation
  if(d.state==="CONFIRM")score+=10;
  // Liquidity (15 pts) — based on RVOL × price as proxy for dollar volume
  const dollarVol=d.rvol*d.price*1000;
  if(dollarVol>5000000)score+=15;
  else if(dollarVol>1000000)score+=8;
  else score+=2;
  // Penalty — failed breakouts
  if(d.failedBreakouts>=3&&Date.now()-d.lastFailTime<1800000)score-=30;
  // Penalty — recent SL
  if(s.cooldownEnabled&&Date.now()-d.lastSlTime<s.cooldownMs)score=-100;
  d.score=Math.max(0,Math.min(100,score));
  return d.score;
}

/* ================================================================
   ENTRY CHECK — ALL LAYERS MUST PASS
   ================================================================ */
function checkEntry(ticker,s){
  const d=getMkt(ticker);
  const{minsFromOpen,isMarketOpen,isPreMarket}=getEST();
  const now=Date.now();
  const rsi=calcRSI(d.priceHistory);

  // ═══════════════════════════════════════════════════════════════════════
  // PREMARKET STRATEGY (Option C) — dedicated indicators, limit-order entries
  // Runs from preMarketStartHour (7am) until the open. Uses premarket VWAP / high / volume
  // instead of regular-session indicators (which need RTH data to be meaningful).
  // ═══════════════════════════════════════════════════════════════════════
  if(isPreMarket){
    if(!s.preMarketEnabled)return{pass:false,reason:"Premarket trading disabled"};
    // Only trade from the configured start hour (default 7am) — pre-7am is too thin
    if(h<(s.preMarketStartHour||7))return{pass:false,reason:`Premarket starts ${s.preMarketStartHour||7}am (now ${h}:${String(m).padStart(2,"0")})`};
    // Price range
    if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price $${d.price.toFixed(2)} outside range`};
    // Gap requirement (premarket gaps tend to be large; higher bar than RTH)
    if(d.gapPct<(s.preMarketMinGap||15))return{pass:false,reason:`PM gap ${d.gapPct.toFixed(1)}% < ${s.preMarketMinGap||15}%`};
    // Cumulative premarket volume — absolute shares, since RVOL is unreliable premarket
    if(d.pmVolume<(s.preMarketMinVolume||50000))return{pass:false,reason:`PM vol ${Math.round(d.pmVolume).toLocaleString()} < ${(s.preMarketMinVolume||50000).toLocaleString()}`};
    // Must be holding above premarket VWAP (strength)
    if(d.pmVwap>0&&d.price<d.pmVwap)return{pass:false,reason:`Below PM VWAP ($${d.price.toFixed(2)} vs $${d.pmVwap.toFixed(2)})`};
    // Not over-extended above premarket VWAP (anti-chasing)
    const pmExtPct=d.pmVwap>0?((d.price-d.pmVwap)/d.pmVwap)*100:0;
    if(pmExtPct>(s.preMarketMaxExtPct||8))return{pass:false,reason:`PM ext ${pmExtPct.toFixed(1)}% > ${s.preMarketMaxExtPct||8}% (chasing)`};
    // RSI not overbought
    if(rsi>(s.preMarketRsiMax||75))return{pass:false,reason:`PM RSI ${rsi.toFixed(0)} > ${s.preMarketRsiMax||75}`};
    // Must be near or breaking the premarket high (momentum confirmation), not fading from it
    if(d.pmHigh>0&&d.price<d.pmHigh*0.97)return{pass:false,reason:`Faded ${(((d.pmHigh-d.price)/d.pmHigh)*100).toFixed(1)}% off PM high`};
    return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,strategy:"PRE",score:Math.max(d.score,75),vwap:d.pmVwap,ema9:d.ema9,pmExtPct};
  }

  if(!isMarketOpen)return{pass:false,reason:"Market closed"};

  // Time filters
  if(minsFromOpen>60&&!s.continuationEnabled)return{pass:false,reason:"After 10:30am — GAP window closed"};
  if(minsFromOpen>360)return{pass:false,reason:"After 3:30pm"};
  const{h,m}=getEST();
  // Dead zone 11:30am-2pm unless continuation explicitly on
  if(s.regimeBrakeEnabled&&h===11&&m>=30&&h<14&&regime.current==="CHOPPY")return{pass:false,reason:"Dead zone (11:30-2pm choppy)"};
  // 30 min before close
  if(minsFromOpen>360)return{pass:false,reason:"< 30 min to close"};

  // Regime gate (skippable for testing via regimeBrakeEnabled)
  if(s.regimeBrakeEnabled){
    if(regime.current==="NO_TRADE")return{pass:false,reason:`🚫 NO_TRADE regime (${regime.failureRate.toFixed(0)}% fail rate)`};
    if(regime.current==="CHOPPY"&&d.gapPct<15)return{pass:false,reason:"CHOPPY regime — gap < 15% required"};
  }

  // Price filter
  if(d.price<s.priceMin||d.price>s.priceMax)return{pass:false,reason:`Price $${d.price.toFixed(2)} outside $${s.priceMin}-$${s.priceMax}`};

  // Cooldown / blacklist (skippable for testing via cooldownEnabled)
  if(s.cooldownEnabled&&now-d.lastSlTime<s.cooldownMs)return{pass:false,reason:`Cooldown — SL hit ${Math.round((now-d.lastSlTime)/60000)}m ago`};
  // Post-exit cooldown — prevents re-entry immediately after ANY exit on this ticker
  // (TP, SL, RSI_EXIT, EMA9_TRAIL — all of them). Separate from SL cooldown above.
  // Always-on safety, not gated by cooldownEnabled testing toggle.
  const lastExit=(typeof window!=="undefined"&&window.__tradeedgeExitTimes&&window.__tradeedgeExitTimes[ticker])||0;
  const postExitMs=s.postExitCooldownMs||300000;
  if(lastExit>0&&now-lastExit<postExitMs){
    const minsAgo=((now-lastExit)/60000).toFixed(1);
    return{pass:false,reason:`Post-exit cooldown — closed ${minsAgo}m ago (need ${(postExitMs/60000).toFixed(0)}m)`};
  }
  if(d.failedBreakouts>=3&&now-d.lastFailTime<1800000)return{pass:false,reason:`Blacklisted — 3 failed breakouts`};

  // Score gate
  const score=scoreTickker(ticker,s);
  if(score<s.minScore)return{pass:false,reason:`Score ${score}/100 < ${s.minScore} min`};

  // Gap requirement
  if(d.gapPct<s.gapMinPct)return{pass:false,reason:`Gap ${d.gapPct.toFixed(1)}% < ${s.gapMinPct}%`};

  // === ⭐ QUALITY SETUP LANE (strict A+ filters) ===
  // The most selective lane. All 10 conditions must be true. Designed for highest probability
  // setups during the 9:45-10:30am morning momentum window. Expected to fire 0-3 trades per day.
  if(s.qualitySetupEnabled&&minsFromOpen>=(s.qualityWindowStartMins||15)&&minsFromOpen<=(s.qualityWindowEndMins||60)){
    // Compute the criteria — track each individually so we can report which one failed
    const checks={};
    // 1. Float — must be < qualityMaxFloat. If floatShares is 0, data hasn't arrived yet, fail safe.
    checks.float=d.floatShares>0&&d.floatShares<=(s.qualityMaxFloat||20000000);
    // 2. Gap within range
    checks.gap=d.gapPct>=(s.qualityMinGap||20)&&d.gapPct<=(s.qualityMaxGap||150);
    // 3. RVOL ≥ threshold (15x default)
    checks.rvol=d.rvol>=(s.qualityMinRvol||15);
    // 4. Catalyst — news with matching keywords in last 24h
    checks.catalyst=!s.qualityRequireCatalyst||d.hasCatalyst===true;
    // 5. Price > VWAP AND respecting EMA9 (either above it OR holding it as support)
    checks.aboveVwap=d.vwap>0&&d.price>d.vwap;
    // EMA9 check: either clearly above EMA9, OR consolidating against it as support.
    // The "isHoldingEma9" path catches stocks that are coiling above EMA9 making higher
    // highs and higher lows — which previously got rejected by the strict price > ema9 check.
    checks.aboveEma9=d.ema9>0&&(d.price>d.ema9||isHoldingEma9(d.candles1m,d.ema9,d.price));
    // 6. 5-min RSI in range 45-68 (computed on 5-min candle closes, not ticks)
    const rsi5m=calcRSI5m(d.candles5m);
    checks.rsi=rsi5m>=(s.qualityRsiMin||45)&&rsi5m<=(s.qualityRsiMax||68);
    // 7. Breakout confirmation — price above PMH or Opening Range High
    const pmHigh=d.preMarketHigh||0;
    const orh=d.openingRangeHigh||0;
    const breakoutLevel=Math.max(pmHigh,orh);
    checks.breakout=breakoutLevel>0&&d.price>breakoutLevel;
    // 8. Volume surge — current 1-min volume >= 2x avg of last 10 1-min candles
    let volSurge=false;
    if(d.candles1m.length>=10&&d.currentCandle){
      const last10=d.candles1m.slice(-10);
      const avgVol=last10.reduce((a,c)=>a+(c.volume||0),0)/10;
      const currentVol=d.currentCandle.volume||0;
      volSurge=avgVol>0&&currentVol>=avgVol*(s.qualityVolumeSurgeMultiplier||2);
    }
    checks.volSurge=volSurge;
    // 9. Structure — higher low formed in last 3 5m candles OR strong green candle closing near highs
    let structure=false;
    if(d.candles5m.length>=3){
      const last3=d.candles5m.slice(-3);
      const higherLows=last3.every((c,i)=>i===0||c.low>=last3[i-1].low);
      const lastCandle=last3[last3.length-1];
      const candleRange=lastCandle.high-lastCandle.low;
      const candleBody=lastCandle.close-lastCandle.open;
      const isGreen=candleBody>0;
      const closesNearHigh=candleRange>0&&((lastCandle.high-lastCandle.close)/candleRange)<0.25;
      structure=higherLows||(isGreen&&closesNearHigh);
    }
    checks.structure=structure;
    // All must pass
    const allPass=Object.values(checks).every(v=>v===true);
    if(allPass){
      return{
        pass:true,
        rsi:rsi5m,
        rvol:d.rvol,
        gapPct:d.gapPct,
        strategy:"QUALITY",
        score:Math.max(score,85), // boost score so it ranks above IGNITION/INTRADAY
        vwap:d.vwap,
        ema9:d.ema9
      };
    }
    // Report the FIRST failing criterion for visibility
    const failed=Object.entries(checks).find(([k,v])=>!v);
    if(failed){
      const reasons={
        float:d.floatShares>0?`Float ${(d.floatShares/1e6).toFixed(1)}M > ${(s.qualityMaxFloat/1e6).toFixed(0)}M max`:"Float data not loaded",
        gap:`Gap ${d.gapPct.toFixed(1)}% outside ${s.qualityMinGap}-${s.qualityMaxGap}%`,
        rvol:`RVOL ${d.rvol.toFixed(1)}x < ${s.qualityMinRvol}x min`,
        catalyst:"No catalyst (no 📰 news)",
        aboveVwap:`Below VWAP ($${(d.price).toFixed(2)} vs $${(d.vwap||0).toFixed(2)})`,
        aboveEma9:`Below EMA9 & not holding it as support ($${(d.price).toFixed(2)} vs $${(d.ema9||0).toFixed(2)})`,
        rsi:`5m RSI ${rsi5m.toFixed(0)} outside ${s.qualityRsiMin}-${s.qualityRsiMax}`,
        breakout:`No breakout (price $${d.price.toFixed(2)} ≤ ref $${breakoutLevel.toFixed(2)})`,
        volSurge:"No 1-min vol surge (< 2x avg)",
        structure:"No higher-low or strong green candle",
      };
      // Note: we DON'T return here — we let the trade fall through to IGNITION/INTRADAY/standard
      // lanes. The failure reason is captured in d.lastQualityFail for diagnostics.
      d.lastQualityFail=reasons[failed[0]]||failed[0];
    }
  }

  // === ⚡⚡ EARLY IGNITION (first 5 minutes after open, relaxed criteria) ===
  // Designed to catch parabolic runners in the first 5 minutes when normal indicators (VWAP,
  // EMA) don't yet have enough data. Higher gap requirement compensates for relaxed other rules.
  // DISABLED by default — high-risk lane. Lots of false signals possible.
  if(s.earlyIgnitionEnabled&&minsFromOpen>=0&&minsFromOpen<=(s.earlyIgnitionWindowMins||5)){
    const earlyIgnitionPass=
      d.gapPct>=(s.earlyIgnitionMinGap||15)&&
      d.rvol>=(s.earlyIgnitionMinRvol||5)&&
      rsi<=(s.earlyIgnitionRsiMax||80)&&
      // Must have a prev close (sanity check)
      d.prevClose>0&&
      // Must be in price range
      d.price>=s.priceMin&&d.price<=s.priceMax;
    if(earlyIgnitionPass){
      return{
        pass:true,
        rsi,
        rvol:d.rvol,
        gapPct:d.gapPct,
        strategy:"EARLY_IGN",
        score:Math.max(score,75),
        vwap:d.vwap,
        ema9:d.ema9
      };
    }
  }

  // === MOMENTUM IGNITION EXCEPTION (Aggressive Open Entry) ===
  // Bypass the strict pullback-state requirement for high-conviction setups within the first N minutes.
  // Designed to catch parabolic morning runners that never give a clean pullback.
  // NOTE: requires minsFromOpen >= 0 — only fires AFTER market open. In premarket, minsFromOpen is
  // negative, and Alpaca rejects regular market orders ("extended hours order must be limit").
  const ignitionEnabled=s.momentumIgnitionEnabled&&minsFromOpen>=0&&minsFromOpen<=(s.ignitionWindowMins||15);
  if(ignitionEnabled){
    const pmHigh=d.preMarketHigh||d.open||0;
    const isBreakingPMHigh=s.breakPreMarketHigh?(d.price>pmHigh*1.005):true;
    const isIgnition=
      d.gapPct>=(s.ignitionMinGap||12)&&
      d.rvol>=(s.ignitionMinRvol||8)&&
      isBreakingPMHigh&&
      d.price>Math.max(d.vwap||0,d.ema9||0)*0.995&&
      rsi>=52;
    if(isIgnition){
      return{
        pass:true,
        rsi,
        rvol:d.rvol,
        gapPct:d.gapPct,
        strategy:"IGNITION",
        score:Math.max(d.score||0,78),
        vwap:d.vwap,
        ema9:d.ema9
      };
    }
  }

  // === INTRADAY MOMENTUM EXCEPTION (10:30am-3:00pm lane) ===
  // Catches midday breakouts that happen after the morning ignition window has closed.
  // Different criteria: no gap (irrelevant by midday), uses last-hour high instead of premarket high,
  // tighter VWAP-extension limit, and avoids the dead zone unless RVOL is exceptional.
  const intradayWindowOpen=s.intradayMomentumEnabled&&minsFromOpen>(s.ignitionWindowMins||15)&&minsFromOpen<=330;
  if(intradayWindowOpen){
    // Dead zone check: 11:30am-1:30pm is statistically the worst window for momentum
    const{h:hh,m:mm}=getEST();
    const minOfDay=hh*60+mm;
    const inDeadZone=minOfDay>=(11*60+30)&&minOfDay<=(13*60+30);
    const deadZoneOK=!inDeadZone||!s.intradayAvoidDeadZone||d.rvol>=(s.intradayDeadZoneRvolOverride||15);
    if(deadZoneOK){
      // Compute last-hour high from candles1m (need at least 30 candles for this to be meaningful)
      const recentCandles=(d.candles1m||[]).slice(-60);
      const lastHourHigh=recentCandles.length>=30?Math.max(...recentCandles.map(c=>c.high)):0;
      // VWAP extension (anti-chase)
      const vwapExt=d.vwap>0?((d.price-d.vwap)/d.vwap)*100:0;
      const isIntradayMomentum=
        recentCandles.length>=30&&
        lastHourHigh>0&&
        d.price>lastHourHigh*(1+(s.intradayBreakoutPct||0.3)/100)&&  // breaking last-hour high
        d.rvol>=(s.intradayMinRvol||6)&&                              // volume re-expansion
        d.vwap>0&&d.price>d.vwap&&                                    // above VWAP (trending)
        vwapExt<=(s.intradayMaxVwapExt||8)&&                          // not over-extended
        d.ema9>0&&d.ema21>0&&d.ema9>d.ema21&&                         // EMA bullish
        rsi>=55&&rsi<=78;                                             // RSI sweet spot
      if(isIntradayMomentum){
        return{
          pass:true,
          rsi,
          rvol:d.rvol,
          gapPct:d.gapPct,
          strategy:"INTRADAY",
          score:Math.max(d.score||0,72),
          vwap:d.vwap,
          ema9:d.ema9
        };
      }
    }
  }

  // State machine — must be in CONFIRM state
  if(d.state!=="CONFIRM")return{pass:false,reason:`State: ${d.state} (need CONFIRM)`};

  // EMA alignment
  if(d.ema9>0&&d.ema21>0&&d.ema9<d.ema21)return{pass:false,reason:`EMA9 < EMA21 — no trend`};

  // VWAP filter
  if(d.vwap>0&&d.price<d.vwap)return{pass:false,reason:`Below VWAP $${d.vwap.toFixed(2)}`};

  // RSI filter — not overextended
  if(rsi>80)return{pass:false,reason:`RSI ${rsi.toFixed(0)} > 80 — overextended`};
  if(rsi<50)return{pass:false,reason:`RSI ${rsi.toFixed(0)} < 50 — weak momentum`};

  // ATR compression check — skip if volatility too low
  if(d.atr>0&&d.atrHistory.length>=5){
    const avgAtr=d.atrHistory.reduce((a,b)=>a+b,0)/d.atrHistory.length;
    if(d.atr<avgAtr*0.5)return{pass:false,reason:"ATR compressed — choppy"};
  }

  // RVOL
  if(d.rvol>0&&d.rvol<s.rvolEntry)return{pass:false,reason:`RVOL ${d.rvol.toFixed(1)}x < ${s.rvolEntry}x`};

  // Too extended from VWAP — chasing
  if(d.vwap>0){
    const extPct=((d.price-d.vwap)/d.vwap)*100;
    if(extPct>15)return{pass:false,reason:`Price ${extPct.toFixed(1)}% above VWAP — chasing`};
  }

  const strategy=minsFromOpen<=60?"GAP":"CONT";
  return{pass:true,rsi,rvol:d.rvol,gapPct:d.gapPct,strategy,score,vwap:d.vwap,ema9:d.ema9};
}

/* ================================================================
   EXIT COUNTERS
   ================================================================ */
const exitCounters={};
const getCounter=t=>{if(!exitCounters[t])exitCounters[t]={vwapBelow:0,rvolLow:0,redCandles:0};return exitCounters[t];};
const resetCounter=t=>{exitCounters[t]={vwapBelow:0,rvolLow:0,redCandles:0};};

// Per-ticker post-exit cooldown — prevents the bot from immediately re-buying a ticker
// it just sold. Stamped by the CLOSE reducer; read by checkEntry.
// Lives on window so the reducer (which runs in a "pure" function context) can write to it
// without React state machinery.
if(typeof window!=="undefined"&&!window.__tradeedgeExitTimes)window.__tradeedgeExitTimes={};

/* ================================================================
   TRADE REPORT GENERATOR
   Produces both human-readable text and structured JSON per closed trade.
   Designed for evaluation by an AI analyst or experienced day trader.
   ================================================================ */
function buildTradeReport(trade,tradeIndex){
  const ctx=trade.entryContext||{};
  const isWin=trade.pnl>=0;
  const holdSec=Math.floor((trade.holdMs||0)/1000);
  const holdMin=Math.floor(holdSec/60);
  const holdRemSec=holdSec%60;
  const maxPx=trade.maxPrice||trade.closePrice;
  const minPx=trade.minPrice||trade.closePrice;
  const mfePct=((maxPx-trade.entry)/trade.entry)*100;
  const maePct=((minPx-trade.entry)/trade.entry)*100;
  const captureRatio=mfePct>0?((trade.pnlPct/mfePct)*100):0;
  const openedDate=new Date(trade.openedAt);
  const closedDate=new Date(trade.closedAt);
  const openTime=openedDate.toLocaleString(undefined,{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  const closeTime=closedDate.toLocaleString(undefined,{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  const dateStr=openedDate.toLocaleString(undefined,{timeZone:"America/New_York",weekday:"short",month:"short",day:"2-digit"});

  // Heuristic analysis — auto-flag patterns worth reviewing
  const observations=[];
  if(isWin&&trade.reason==="TP_FINAL")observations.push("✓ Hit hard cap target — runner caught a big move");
  if(isWin&&trade.reason==="TP_PARTIAL")observations.push("✓ Captured Stage 1 profit at +3% — moved SL to breakeven");
  if(trade.reason==="SL")observations.push("✗ Stopped out at hard SL — entry timing or thesis was wrong");
  if(trade.reason==="VWAP_STOP")observations.push("✗ Lost VWAP — momentum failed, exit was protective");
  if(trade.reason==="EMA9_TRAIL")observations.push("✓ Runner trailed on EMA9 — locked in profit on the way down");
  if(trade.reason==="RVOL_FADE")observations.push("△ Volume dried up — exit avoided dead-money hold");
  if(trade.reason==="EOD_CLOSE")observations.push("△ Force-closed at end of day — trade did not resolve naturally");
  if(trade.reason==="MANUAL")observations.push("△ Manually closed by user");
  if(trade.reason==="RSI_EXIT")observations.push("✓ RSI overbought (≥82) — exited runner before reversal");
  if(trade.reason==="NO_PROGRESS")observations.push("△ Runner went flat 30+ min without new high — capital opportunity cost");
  if(mfePct>=1.5&&trade.pnlPct<0.3)observations.push(`? MFE was +${mfePct.toFixed(2)}% but exit was only ${trade.pnlPct.toFixed(2)}% — consider tighter trailing stop`);
  if(maePct<=-1&&isWin)observations.push(`? MAE went to ${maePct.toFixed(2)}% before recovering — entry timing could be earlier`);
  if(holdSec<120&&!isWin)observations.push("? Stopped out fast (<2min) — likely chasing or noise entry");
  if(holdSec>1800&&trade.pnlPct<0.5&&trade.pnlPct>-0.5)observations.push("? Held >30min for negligible move — capital opportunity cost");
  if(captureRatio>0&&captureRatio<25)observations.push(`? Only captured ${captureRatio.toFixed(0)}% of max favorable move`);

/* ================================================================
   PROPER RVOL — time-scaled vs 20-day avg daily volume
   ================================================================ */
// Module-level errors queue — anyone can push, App drains it into alpacaErrors state
const dataErrors=[];
function reportDataError(msg){
  dataErrors.unshift({t:Date.now(),msg:msg});
  if(dataErrors.length>20)dataErrors.length=20;
}

// Cache: {TICKER: {avgVol: number, fetchedAt: timestamp, fetching: bool}}
// Lives across scans, refreshes once per day per ticker.
const avgVolCache={};
const CACHE_TTL_MS=24*60*60*1000; // 1 day

// Computes RVOL given today's cumulative volume and the 20-day average.
// Time-scales today's volume up to a full-day equivalent.
// e.g. at 60 mins into the 390-min day, multiply by 6.5x to project to EOD.
// Returns 0 if baseline not yet available (caller should treat as "unknown").
function computeRvol(dayVolume,avgDailyVol,minsFromOpen){
  if(!avgDailyVol||avgDailyVol<=0)return 0;
  if(!dayVolume||dayVolume<=0)return 0;
  // Premarket / before open: minsFromOpen<0, just compare raw (don't scale up infinitely)
  if(minsFromOpen<=0)return dayVolume/avgDailyVol;
  // Cap the scale factor so we don't blow up in the last few minutes of the day
  const mins=Math.max(minsFromOpen,30); // at least 30 mins for stability
  const scale=Math.min(390/mins,13); // max 13x scale (covers first 30 min)
  return(dayVolume*scale)/avgDailyVol;
}

// Async fetch + cache the 20-day avg daily volume. Returns the cached value (or 0 if not ready).
async function getAvgDailyVol(sym,creds){
  const cached=avgVolCache[sym];
  if(cached&&!cached.fetching&&Date.now()-cached.fetchedAt<CACHE_TTL_MS)return cached.avgVol;
  if(cached?.fetching)return 0; // already in flight
  avgVolCache[sym]={avgVol:cached?.avgVol||0,fetchedAt:cached?.fetchedAt||0,fetching:true};
  try{
    const bars=await alpaca.getDailyBars(sym,creds,25);
    if(!bars.length){avgVolCache[sym].fetching=false;return 0;}
    // Use the most recent 20 bars (excluding today if present)
    const recent=bars.slice(-21,-1).length>=10?bars.slice(-21,-1):bars.slice(-20);
    const vols=recent.map(b=>b.v||0).filter(v=>v>0);
    if(!vols.length){avgVolCache[sym].fetching=false;return 0;}
    const avgVol=vols.reduce((a,b)=>a+b,0)/vols.length;
    avgVolCache[sym]={avgVol,fetchedAt:Date.now(),fetching:false};
    return avgVol;
  }catch(e){
    avgVolCache[sym]={...avgVolCache[sym],fetching:false};
    return 0;
  }
}

/* ================================================================
   FINNHUB — news catalyst detection + shares outstanding (float)
   Free tier: 60 calls/min. We rate-limit to 1 call/sec for safety.
   Single API key handles both news and profile endpoints.
   ================================================================ */

// Global rate limiter — ensures we never exceed ~1 call/sec to Finnhub
// regardless of how many tickers want data at once.
// IMPORTANT: reserves the slot BEFORE awaiting, so concurrent callers see the updated
// timestamp and queue behind each other instead of all racing past at zero.
let finnhubNextSlot=0;
const FINNHUB_MIN_GAP_MS=1100; // 1.1s between calls = ~55 calls/min, safe margin under 60/min
async function finnhubRateGate(){
  const now=Date.now();
  // Atomically reserve the next slot. If queue is empty (now>=nextSlot), reserve now.
  // Otherwise, reserve nextSlot+gap (puts us at the end of the queue).
  const mySlot=Math.max(now,finnhubNextSlot);
  finnhubNextSlot=mySlot+FINNHUB_MIN_GAP_MS;
  const wait=mySlot-now;
  if(wait>0)await new Promise(r=>setTimeout(r,wait));
}

// News cache — catalyst detection by keyword
const newsCache={}; // {TICKER: {fetchedAt, articles:[], hasCatalyst, fetching, matchedKeywords:[]}}
const NEWS_CACHE_TTL_MS=30*60*1000; // 30 min
const CATALYST_KEYWORDS=[
  "fda","contract","merger","earnings","partnership","approval",
  "acquisition","deal","agreement","results","announcement",
  "approved","awarded","acquires","acquired","signs","completes","announces",
  "reports","beats","clinical","phase","trial","license","launch","launches"
];

// Retry helper for Finnhub — handles 5xx errors with exponential backoff.
// Retries up to N times on 5xx (server-side issues) or network errors.
// Does NOT retry on 4xx (client errors like invalid key or unknown ticker) — those won't fix themselves.
async function finnhubFetchWithRetry(url,maxRetries=3){
  let lastErr;
  for(let attempt=0;attempt<=maxRetries;attempt++){
    if(attempt>0){
      // Exponential backoff: 1s, 2s, 4s
      const backoff=Math.min(1000*Math.pow(2,attempt-1),5000);
      await new Promise(r=>setTimeout(r,backoff));
      await finnhubRateGate(); // re-queue against the global rate limiter
    }
    try{
      const r=await fetch(url);
      if(r.ok)return await r.json();
      // 4xx is client error — don't retry
      if(r.status>=400&&r.status<500){
        throw new Error(`HTTP ${r.status}`);
      }
      // 5xx — retry
      lastErr=new Error(`HTTP ${r.status}`);
    }catch(e){
      lastErr=e;
      // Network-level errors retry too
    }
  }
  throw lastErr||new Error("retry exhausted");
}

async function fetchFinnhubNews(ticker,apiKey){
  const cached=newsCache[ticker];
  if(cached&&!cached.fetching&&Date.now()-cached.fetchedAt<NEWS_CACHE_TTL_MS)return cached;
  if(cached?.fetching)return cached;
  newsCache[ticker]={...(cached||{}),fetching:true};
  try{
    await finnhubRateGate();
    // Finnhub company-news: requires from/to dates (YYYY-MM-DD), looks back 2 days to catch late-night PRs
    const today=new Date();
    const twoDaysAgo=new Date(Date.now()-2*86400000);
    const fmt=d=>d.toISOString().split("T")[0];
    const url=`${PROXY}/finnhub/company-news?symbol=${encodeURIComponent(ticker)}&from=${fmt(twoDaysAgo)}&to=${fmt(today)}&token=${apiKey}`;
    const articles=await finnhubFetchWithRetry(url);
    // Filter to last 24h only (Finnhub returns up to 2 days, we want 24h for "recent catalyst")
    const cutoff=Date.now()/1000-24*3600;
    const recent=Array.isArray(articles)?articles.filter(a=>a.datetime>=cutoff):[];
    // Catalyst detection: scan headline + summary for keywords
    let hasCatalyst=false;
    const matched=new Set();
    for(const a of recent){
      const text=`${a.headline||""} ${a.summary||""}`.toLowerCase();
      for(const kw of CATALYST_KEYWORDS){
        if(text.includes(kw)){hasCatalyst=true;matched.add(kw);}
      }
    }
    const result={fetchedAt:Date.now(),articles:recent,hasCatalyst,matchedKeywords:Array.from(matched),fetching:false};
    newsCache[ticker]=result;
    return result;
  }catch(e){
    reportDataError(`${ticker}: Finnhub news failed — ${e.message||e}`);
    newsCache[ticker]={...(cached||{fetchedAt:0,articles:[],hasCatalyst:false,matchedKeywords:[]}),fetching:false};
    return newsCache[ticker];
  }
}

// Profile cache — shares outstanding (used as float proxy)
const floatCache={}; // {TICKER: {floatShares, fetchedAt, fetching}}
const FLOAT_CACHE_TTL_MS=24*60*60*1000; // 24 hours

async function fetchFinnhubProfile(ticker,apiKey){
  const cached=floatCache[ticker];
  if(cached&&!cached.fetching&&Date.now()-cached.fetchedAt<FLOAT_CACHE_TTL_MS)return cached.floatShares;
  if(cached?.fetching)return cached?.floatShares||0;
  floatCache[ticker]={...(cached||{floatShares:0,fetchedAt:0}),fetching:true};
  try{
    await finnhubRateGate();
    const url=`${PROXY}/finnhub/stock/profile2?symbol=${encodeURIComponent(ticker)}&token=${apiKey}`;
    const j=await finnhubFetchWithRetry(url);
    // Finnhub returns shareOutstanding in millions (e.g. 5.23 = 5.23M shares)
    const sharesMillions=j?.shareOutstanding||0;
    const floatShares=sharesMillions*1e6;
    floatCache[ticker]={floatShares,fetchedAt:Date.now(),fetching:false};
    return floatShares;
  }catch(e){
    reportDataError(`${ticker}: Finnhub profile failed — ${e.message||e}`);
    floatCache[ticker]={...(cached||{floatShares:0,fetchedAt:0}),fetching:false};
    return cached?.floatShares||0;
  }
}

/* ================================================================
   PREWARM — seed candle history + price history for new tickers
   so RSI/EMA work immediately instead of waiting 14 minutes
   ================================================================ */
const prewarmCache={}; // {TICKER: {primedAt, fetching}}
const PREWARM_TTL_MS=4*60*60*1000; // 4 hours

async function prewarmTicker(sym,creds){
  const cached=prewarmCache[sym];
  if(cached?.fetching)return false;
  if(cached&&Date.now()-cached.primedAt<PREWARM_TTL_MS)return false; // already primed recently
  prewarmCache[sym]={primedAt:cached?.primedAt||0,fetching:true};
  try{
    const bars=await alpaca.getRecentMinuteBars(sym,creds,30);
    if(!bars.length){prewarmCache[sym].fetching=false;return false;}
    const d=getMkt(sym);
    // Seed priceHistory with the closing prices of recent bars (used by EMA/RSI calcs)
    // Only seed if we don't have meaningful history yet — don't overwrite live data
    if(d.priceHistory.length<20){
      const closes=bars.map(b=>b.c).filter(c=>c>0);
      // Keep last 50 to leave room for live ticks
      d.priceHistory=closes.slice(-50);
    }
    // Seed candles1m with recent bars
    if(d.candles1m.length<10){
      d.candles1m=bars.slice(-30).map(b=>({o:b.o,h:b.h,l:b.l,c:b.c,v:b.v||0,t:new Date(b.t).getTime()}));
    }
    prewarmCache[sym]={primedAt:Date.now(),fetching:false};
    return true;
  }catch(e){
    prewarmCache[sym]={...prewarmCache[sym],fetching:false};
    return false;
  }
}

/* ================================================================
   ALPACA HELPERS
   ================================================================ */
const aH=c=>({"APCA-API-KEY-ID":c.keyId,"APCA-API-SECRET-KEY":c.secret,"Content-Type":"application/json"});

// Wait for a market order to fill on Alpaca, return the actual fill price.
// Polls the order status for up to maxWaitMs. Falls back to the snapshot price if it can't
// confirm the fill within the window (rare — but in that case the bot's internal state will
// drift from Alpaca, which the reconciliation panel will surface).
async function waitForFill(orderId,creds,maxWaitMs=5000){
  const startTime=Date.now();
  let attempts=0;
  // Poll interval scales with the total wait window. Short waits (RTH market orders, 5s)
  // poll quickly; long waits (premarket limit orders, 90s) poll slowly to conserve API calls.
  // Rule: aim for ~1 poll every 3 seconds, hard-capped at 12 polls total regardless of window.
  // This keeps a 90s premarket wait to ~12 calls instead of ~90 — critical for the 200/min limit.
  const baseInterval=Math.max(3000,Math.floor(maxWaitMs/12));
  const maxPolls=12;
  while(Date.now()-startTime<maxWaitMs&&attempts<maxPolls){
    attempts++;
    let got429=false;
    try{
      const r=await fetch(`${PROXY}/v2/orders/${orderId}`,{headers:aH(creds)});
      if(r.status===429){
        got429=true; // rate limited — back off harder
      } else if(r.ok){
        const order=await r.json();
        if(order.status==="filled"||order.status==="partially_filled"){
          const filledPrice=parseFloat(order.filled_avg_price||"0");
          const filledQty=parseInt(order.filled_qty||"0",10);
          if(filledPrice>0&&filledQty>0){
            return{filledPrice,filledQty,status:order.status,attempts};
          }
        }
        if(order.status==="rejected"||order.status==="canceled"||order.status==="expired"){
          return{filledPrice:0,filledQty:0,status:order.status,attempts};
        }
      }
    }catch(e){/* keep trying */}
    // Wait before next poll. If we got 429, double the wait to let the limit recover.
    const wait=got429?baseInterval*2:baseInterval;
    await new Promise(r=>setTimeout(r,wait));
  }
  return{filledPrice:0,filledQty:0,status:"timeout",attempts};
}
async function aGet(path,creds,data=false){const r=await fetch(`${data?`${PROXY}/data`:PROXY}${path}`,{headers:aH(creds)});if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,120)}`);}return r.json();}
async function aPost(path,body,creds){const r=await fetch(`${PROXY}${path}`,{method:"POST",headers:aH(creds),body:JSON.stringify(body)});if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`HTTP ${r.status} ${t.slice(0,200)}`);}return r.json();}

// Cancel ALL open/pending orders for a specific ticker.
// Critical because Alpaca returns 403 ("opposite side order exists") if you try to close
// a position while a buy/sell order is still pending on the same symbol.
async function cancelOrdersForTicker(ticker,creds){
  try{
    // Get all open orders for this symbol
    const r=await fetch(`${PROXY}/v2/orders?status=open&symbols=${ticker}`,{headers:aH(creds)});
    if(!r.ok)return;
    const orders=await r.json();
    if(!Array.isArray(orders)||orders.length===0)return;
    // Cancel each one
    for(const o of orders){
      try{
        await fetch(`${PROXY}/v2/orders/${o.id}`,{method:"DELETE",headers:aH(creds)});
      }catch(e){/* ignore individual cancel failures */}
    }
    // Small delay so Alpaca processes the cancels before we try the next thing
    await new Promise(r=>setTimeout(r,300));
  }catch(e){/* non-fatal — if cancel fails, the next operation will surface the error */}
}

// Fetch the actual position size on Alpaca for a ticker (returns 0 if none).
// Used to reconcile bot state with broker state before placing partial sells.
async function getAlpacaPositionQty(ticker,creds){
  try{
    const r=await fetch(`${PROXY}/v2/positions/${ticker}`,{headers:aH(creds)});
    if(r.status===404)return 0;
    if(!r.ok)return 0;
    const j=await r.json();
    return Math.abs(parseInt(j.qty||"0",10))||0;
  }catch(e){return 0;}
}

// Place a partial SELL order for a specific share quantity.
// Used by Stage 1 and Stage 2 to actually move shares off Alpaca, not just bot state.
// Returns true on success, false on failure (caller decides what to do).
async function sellAlpacaShares(ticker,qty,creds){
  if(!qty||qty<1)return false;
  // Cancel any pending orders first so Alpaca doesn't reject with "opposite order exists"
  await cancelOrdersForTicker(ticker,creds);
  try{
    const body={symbol:ticker,qty:String(qty),side:"sell",type:"market",time_in_force:"day"};
    const r=await fetch(`${PROXY}/v2/orders`,{method:"POST",headers:aH(creds),body:JSON.stringify(body)});
    return r.ok;
  }catch(e){return false;}
}

async function closeAlpacaPos(ticker,creds){
  // FIRST: cancel any pending orders on this symbol so Alpaca doesn't reject with "opposite order exists"
  await cancelOrdersForTicker(ticker,creds);
  // THEN: close the remaining position via DELETE /v2/positions/{ticker}
  // This closes whatever quantity is left, even if it differs from what the bot expected.
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(`${PROXY}/v2/positions/${ticker}`,{method:"DELETE",headers:aH(creds)});
      if(r.ok||r.status===404)return true;
    }catch(e){}
    await new Promise(res=>setTimeout(res,500));
  }
  return false;
}
// Module-level data feed selector, kept in sync with settings.dataFeed by a useEffect below.
// "iex" = free partial feed; "sip" = paid Algo Trader Plus consolidated feed.
let DATA_FEED="iex";
const alpaca={
  getAccount:c=>aGet("/v2/account",c),
  getPositions:c=>aGet("/v2/positions",c),
  getMostActives:async(c,n=30)=>{for(const p of[`/v1beta1/screener/stocks/most-actives?by=volume&top=${n}`,`/v2/stocks/most-actives?by=volume&top=${n}`]){try{const r=await aGet(p,c,true);const l=r?.most_actives||r?.stocks||[];if(l.length>0)return l;}catch(e){}}return[];},
  getSnapshots:async(syms,c)=>{if(!syms.length)return{};const result={};for(let i=0;i<syms.length;i+=50){try{const r=await aGet(`/v2/stocks/snapshots?symbols=${syms.slice(i,i+50).join(",")}&feed=${DATA_FEED}`,c,true);Object.assign(result,r||{});}catch(e){}}return result;},
  // Fetches daily bars for the last `days` trading days for a single ticker.
  // Returns array of {v: volume, c: close} or empty array on failure.
  getDailyBars:async(sym,c,days=25)=>{
    try{
      const endDate=new Date();
      const startDate=new Date(Date.now()-35*86400000);
      const start=startDate.toISOString().split("T")[0];
      const end=endDate.toISOString().split("T")[0];
      const r=await aGet(`/v2/stocks/${sym}/bars?timeframe=1Day&start=${start}&end=${end}&limit=${days}&feed=${DATA_FEED}&adjustment=raw`,c,true);
      const bars=r?.bars||[];
      if(!bars.length)reportDataError(`${sym}: dailyBars returned empty`);
      return bars;
    }catch(e){
      reportDataError(`${sym}: dailyBars failed — ${e.message||e}`);
      return[];
    }
  },
  // Fetches recent 1-minute bars for prewarming RSI/EMA calculations.
  // Uses a 48-hour window so we always capture yesterday's regular trading session
  // (premarket-only windows return empty on the free IEX feed).
  getRecentMinuteBars:async(sym,c,limit=50)=>{
    try{
      // SIP historical REST blocks the most-recent ~15 min ("recent SIP data" restriction).
      // Pull the window ending 16 min ago to stay clear (clock-skew safe). Real-time prices
      // come from the WebSocket stream, which has separate entitlement — these bars are only
      // for warming up EMA/RSI, so a 16-min lag on the warmup is harmless.
      // IEX has no such restriction, so it can end at "now".
      const sipLagMs=(DATA_FEED==="sip")?16*60*1000:0;
      const endDate=new Date(Date.now()-sipLagMs);
      const startDate=new Date(Date.now()-48*60*60*1000);
      const start=startDate.toISOString();
      const end=endDate.toISOString();
      // limit=50 + sort=desc gets the 50 most recent bars (yesterday's last hour + today so far)
      const r=await aGet(`/v2/stocks/${sym}/bars?timeframe=1Min&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&limit=${limit}&feed=${DATA_FEED}&adjustment=raw&sort=desc`,c,true);
      // Reverse to chronological order so EMA/RSI calcs process them in order
      const bars=(r?.bars||[]).slice().reverse();
      // Empty warmup bars are NOT a real error — thin/halted tickers may have no bars in the
      // window, and live prices still come from the WebSocket. Log quietly to console only,
      // don't spam the Alpaca Errors panel (which is for real failures the user must act on).
      if(!bars.length)console.debug(`${sym}: minuteBars empty (48h window) — using WS prices`);
      return bars;
    }catch(e){
      reportDataError(`${sym}: minuteBars failed — ${e.message||e}`);
      return[];
    }
  },
};

/* ================================================================
   REDUCER
   ================================================================ */
const initialState={balance:STARTING_BALANCE,openTrades:[],closedTrades:[],equity:[{t:Date.now(),v:STARTING_BALANCE}]};
function reducer(state,action){
  switch(action.type){
    case"OPEN":
      if(state.openTrades.some(o=>o.ticker===action.trade.ticker))return state;
      if(state.openTrades.length>=action.maxOpen)return state;
      return{...state,openTrades:[...state.openTrades,action.trade]};
    case"CLOSE_PARTIAL":{
      const trade=state.openTrades.find(o=>o.id===action.tradeId);
      if(!trade||trade.partialDone)return state;
      // Stage 1 P&L = (dollars closed) × (% price change)
      // dollars closed = current size × sizePct fraction
      // % price change = (closePrice - entry) / entry
      const dollarsClosed=trade.size*action.sizePct;
      const stage1Pnl=dollarsClosed*((action.closePrice-trade.entry)/trade.entry);
      return{...state,balance:state.balance+stage1Pnl,openTrades:state.openTrades.map(o=>o.id===action.tradeId?{
        ...o,
        partialDone:true,
        sl:o.entry,                              // SL → breakeven
        size:o.size*(1-action.sizePct),          // shrink remaining size
        stage1Price:action.closePrice,
        stage1Pnl:stage1Pnl,                     // capture for trade report
        stage1Size:dollarsClosed,
        stage1Time:action.t||Date.now(),
      }:{...o})};
    }
    case"CLOSE_STAGE2":{
      const trade=state.openTrades.find(o=>o.id===action.tradeId);
      if(!trade||trade.stage2Done||!trade.partialDone)return state;
      // Same formula — dollars closed × % price change from entry
      const dollarsClosed=trade.size*action.sizePct;
      const stage2Pnl=dollarsClosed*((action.closePrice-trade.entry)/trade.entry);
      const newSl=trade.stage1Price||trade.entry;
      return{...state,balance:state.balance+stage2Pnl,openTrades:state.openTrades.map(o=>o.id===action.tradeId?{
        ...o,
        stage2Done:true,
        sl:newSl,                                // SL → Stage 1 price (locks profit)
        size:o.size*(1-action.sizePct),          // shrink to runner only
        stage2Price:action.closePrice,
        stage2Pnl:stage2Pnl,
        stage2Size:dollarsClosed,
        stage2Time:action.t||Date.now(),
      }:{...o})};
    }
    case"CLOSE":{
      const{tradeId,closePrice,reason,t}=action;
      const trade=state.openTrades.find(o=>o.id===tradeId);
      if(!trade)return state;
      const pnlPct=trade.direction==="LONG"?((closePrice-trade.entry)/trade.entry)*100:((trade.entry-closePrice)/trade.entry)*100;
      // Final slice P&L (only the runner remaining at this point)
      const finalSlicePnl=(pnlPct/100)*trade.size;
      // Total P&L = Stage 1 + Stage 2 + final slice. This makes the journal/report show real totals.
      const stage1Pnl=trade.stage1Pnl||0;
      const stage2Pnl=trade.stage2Pnl||0;
      const totalPnl=stage1Pnl+stage2Pnl+finalSlicePnl;
      // For reporting: pnlPct on TOTAL trade (weighted across stages, using original entry).
      // We use the runner's pnlPct as the headline number since that's the "final" trade percentage,
      // but the JSON report will show per-stage breakdown.
      const assertion={expected:"—",actual:`${pnlPct.toFixed(2)}%`,pass:reason==="TP_FINAL"||reason==="TP_PARTIAL"||reason==="RSI_EXIT"||reason==="MANUAL"?totalPnl>0:true};
      const newBalance=state.balance+finalSlicePnl;
      // Stamp the exit time on lastExitTimes module-level map so we can enforce per-ticker cooldown
      if(typeof window!=="undefined"&&window.__tradeedgeExitTimes){
        window.__tradeedgeExitTimes[trade.ticker]=t;
      }
      return{...state,balance:newBalance,openTrades:state.openTrades.filter(o=>o.id!==tradeId),closedTrades:[{
        ...trade,
        closedAt:nowIso(),
        closePrice,
        reason,
        pnl:totalPnl,          // total P&L including all stages
        pnlPct,                // headline % (runner's price change vs entry)
        finalSlicePnl,         // just the runner's P&L
        holdMs:t-new Date(trade.openedAt).getTime(),
        assertion,
      },...state.closedTrades],equity:[...state.equity,{t,v:newBalance}]};
    }
    case"RESET":return{...initialState,equity:[{t:Date.now(),v:STARTING_BALANCE}]};
    default:return state;
  }
}

  useEffect(()=>{if(connStatus.state!=="connected")return;let cancelled=false;const scan=async()=>{try{

return{...prev,[sym]:next};});}}}}catch(err){}};ws.onerror=()=>setWsStatus("error");ws.onclose=()=>{setWsStatus("reconnecting");reconnectTimer=setTimeout(connect,2000);};}catch(e){setWsStatus("error");reconnectTimer=setTimeout(connect,3000);}};connect();return()=>{clearTimeout(reconnectTimer);try{if(ws)ws.close();}catch(e){}setWsStatus("off");};},[connStatus.state,allTickers.length,settings.dataFeed]);

  // Data staleness — if no Alpaca scan in 2x scan interval, mark stale
  useEffect(()=>{const id=setInterval(()=>{if(!alpacaLastScan){setStale(false);return;}const age=Date.now()-new Date(alpacaLastScan).getTime();setStale(age>settingsRef.current.scanIntervalMs*2);},2000);return()=>clearInterval(id);},[alpacaLastScan]);

  // ============================================================
  // EXIT CHECKS — ADAPTIVE WITH PARTIAL PROFIT
  // ============================================================
  useEffect(()=>{
    const open=tradesRef.current.openTrades;if(!open.length)return;
    const now=Date.now(),s=settingsRef.current;
    const est=getEST();
    // EOD force-close trigger: minutes-from-open >= (390 - eodCloseMinsBeforeClose)
    // e.g. with eodCloseMinsBeforeClose=30, this fires at minute 360 = 3:30pm ET
    const eodTriggerMins=390-(s.eodCloseMinsBeforeClose||30);
    const isEodWindow=s.eodCloseEnabled&&est.isMarketOpen&&est.minsFromOpen>=eodTriggerMins;
    for(const trade of open){
      const d=getMkt(trade.ticker);const px=priceRef.current[trade.ticker];if(!px)continue;
      const holdMs=now-new Date(trade.openedAt).getTime();
      // EOD force-close — highest priority, overrides min-hold and everything else
      if(isEodWindow){
        const closePrice=px;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed EOD close ${trade.ticker}`},...p.slice(0,9)]);});
        const isLoss=closePrice<trade.entry;
        if(isLoss){
          const loss=Math.abs((closePrice-trade.entry)/trade.entry*trade.size);
          setDailyLoss(dl=>{const nl=dl+loss;if(nl>=settingsRef.current.dailyLossLimit)setCircuitBreaker(true);return nl;});
          updateRegime("LOSS");setRegimeState(regime.current);
        } else {
          updateRegime("WIN");setRegimeState(regime.current);
        }
        resetCounter(trade.ticker);
        dispatch({type:"CLOSE",tradeId:trade.id,closePrice,reason:"EOD_CLOSE",t:now});
        continue;
      }
      if(holdMs<60000)continue; // min 60s hold (skipped for EOD above)
      // Update MFE/MAE — track peak and trough during the trade for reports
      if(px>(trade.maxPrice||trade.entry))trade.maxPrice=px;
      if(px<(trade.minPrice||trade.entry))trade.minPrice=px;
      const counter=getCounter(trade.ticker);
      const uplPct=((px-trade.entry)/trade.entry)*100;
      // Track the highest price reached during the runner phase (after Stage 2).
      // Used to detect "30 min no progress" — if we haven't made a new high in 30 min, exit runner.
      if(trade.stage2Done){
        if(!trade.runnerHigh||px>trade.runnerHigh){
          trade.runnerHigh=px;
          trade.runnerHighTime=now;
        }
      }

      // ═══════════════════════════════════════════════════════════════════
      // STAGE 1: Initial profit take at +3%
      // Close 35% of position via SELL order, move SL to breakeven
      // ═══════════════════════════════════════════════════════════════════
      if(!trade.partialDone&&uplPct>=s.tpPartialPct){
        // Calculate shares to sell — based on the ORIGINAL share count (before any partials)
        // because trade.size has been shrunk by previous closes but original shares lived on Alpaca.
        const originalShares=Math.floor((trade.originalSize||trade.size)/trade.entry);
        const sharesToSell=Math.max(1,Math.floor(originalShares*s.tpPartialSize));
        // Send real SELL order to Alpaca (if in alpaca mode)
        if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
          sellAlpacaShares(trade.ticker,sharesToSell,credsRef.current).then(ok=>{
            if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`Stage 1 sell failed for ${trade.ticker} (${sharesToSell} shares)`},...p.slice(0,9)]);
            else setScanLog(p=>[{t:nowIso(),ticker:trade.ticker,reason:`✅ Stage 1 SOLD ${sharesToSell} shares @ ~$${px.toFixed(2)}`},...p.slice(0,49)]);
          });
        }
        dispatch({type:"CLOSE_PARTIAL",tradeId:trade.id,closePrice:px,pct:uplPct,sizePct:s.tpPartialSize,sharesSold:sharesToSell});
        getMkt(trade.ticker).partialDone=true;
        continue;
      }

      // ═══════════════════════════════════════════════════════════════════
      // STAGE 2: Lock in profit at +7%
      // Close another 35% of ORIGINAL position via SELL order, SL → Stage 1 price
      // ═══════════════════════════════════════════════════════════════════
      if(trade.partialDone&&!trade.stage2Done&&s.tpStage2Enabled&&uplPct>=s.tpStage2Pct){
        const originalShares=Math.floor((trade.originalSize||trade.size)/trade.entry);
        const sharesToSell=Math.max(1,Math.floor(originalShares*s.tpStage2Size));
        if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
          sellAlpacaShares(trade.ticker,sharesToSell,credsRef.current).then(ok=>{
            if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`Stage 2 sell failed for ${trade.ticker} (${sharesToSell} shares)`},...p.slice(0,9)]);
            else setScanLog(p=>[{t:nowIso(),ticker:trade.ticker,reason:`✅ Stage 2 SOLD ${sharesToSell} shares @ ~$${px.toFixed(2)}`},...p.slice(0,49)]);
          });
        }
        dispatch({type:"CLOSE_STAGE2",tradeId:trade.id,closePrice:px,pct:uplPct,sizePct:s.tpStage2Size,sharesSold:sharesToSell});
        continue;
      }

      let hit=null;

      // ═══════════════════════════════════════════════════════════════════
      // STAGE 3 (RUNNER) — only the remaining ~30% of position lives here
      // Multiple exit triggers, prioritized:
      // 1. Hard cap (TP_FINAL) — runner reaches very high target
      // 2. Stop loss (SL/BE/Stage1) — depends on which stages have hit
      // 3. RSI exhaustion (RSI > 82) — overbought reversal warning
      // 4. No-progress timeout (runner) — 30 min without a new high = stale
      // 5. VWAP stop — soft exit if 3 consecutive ticks below VWAP
      // 6. EMA9 trail — runner exits if 3 ticks below EMA9 (after Stage 2 only)
      // 7. RVOL fade — momentum dying off
      // ═══════════════════════════════════════════════════════════════════

      // (1) Hard cap on runner
      if(px>=trade.entry*(1+s.tpFinalPct/100)){hit="TP_FINAL";resetCounter(trade.ticker);}

      // (2) Hard SL — but the SL value itself shifted via the reducer at each stage:
      //     - Before Stage 1: SL = entry × (1 - 1.5%) [original SL]
      //     - After Stage 1: SL = entry [breakeven]
      //     - After Stage 2: SL = Stage 1 price [profit locked]
      else if(px<=trade.sl){hit="SL";resetCounter(trade.ticker);}

      // (3) RSI exhaustion — only fires on the runner (after Stage 2), when momentum is overheating
      else if(trade.stage2Done&&calcRSI(d.priceHistory)>=(s.runnerRsiExit||82)){
        hit="RSI_EXIT";resetCounter(trade.ticker);
      }

      // (4) Runner no-progress timeout — if we haven't made a new high in N minutes, exit
      else if(trade.stage2Done&&trade.runnerHighTime){
        const minsFlat=(now-trade.runnerHighTime)/60000;
        if(minsFlat>=(s.runnerNoProgressMins||30)){
          hit="NO_PROGRESS";resetCounter(trade.ticker);
        }
      }

      // (5) VWAP stop — 3 consecutive ticks below VWAP. Applies pre-runner too.
      // CRITICAL: only applies if the trade ENTERED above VWAP. If you entered below VWAP
      // (e.g. a dip-buy scalp where VWAP sits high from an earlier premarket spike), VWAP was
      // never your support — so "losing" it is meaningless and would kick the runner out instantly,
      // before it can run. Those trades rely on structural SL + EMA trail instead.
      if(!hit&&trade.enteredAboveVwap&&d.vwap>0&&px<d.vwap*0.998){
        counter.vwapBelow++;counter.rvolLow=0;counter.redCandles=0;
        if(counter.vwapBelow>=3){hit="VWAP_STOP";resetCounter(trade.ticker);}
      }

      // (6) EMA9 trailing stop — 3 closes below EMA9 after Stage 2 (runner only).
      // Before Stage 2, EMA9 trail is too aggressive — we still want to give the position
      // room to develop. Once Stage 2 hits, we're protecting profit so tighter trail makes sense.
      else if(!hit&&trade.stage2Done&&d.ema9>0&&px<d.ema9*0.998){
        counter.redCandles++;
        if(counter.redCandles>=3){hit="EMA9_TRAIL";resetCounter(trade.ticker);}
      }

      // (7) RVOL fade — momentum dying. 5 ticks of low RVOL.
      else if(!hit&&d.rvol>0&&d.rvol<s.rvolExit){
        counter.rvolLow++;counter.vwapBelow=0;
        if(counter.rvolLow>=5){hit="RVOL_FADE";resetCounter(trade.ticker);}
      }

      else if(!hit){resetCounter(trade.ticker);}

      if(hit){
        const closePrice=px;
        if(modeRef.current==="alpaca"&&connStatus.state==="connected")closeAlpacaPos(trade.ticker,credsRef.current).then(ok=>{if(!ok)setAlpacaErrors(p=>[{t:Date.now(),msg:`failed close ${trade.ticker}`},...p.slice(0,9)]);});
        const isLoss=closePrice<trade.entry;
        if(isLoss){
          const loss=Math.abs((closePrice-trade.entry)/trade.entry*trade.size);
          setDailyLoss(d=>{const nl=d+loss;if(nl>=settingsRef.current.dailyLossLimit)setCircuitBreaker(true);return nl;});
          getMkt(trade.ticker).slHits++;getMkt(trade.ticker).lastSlTime=Date.now();
          updateRegime("LOSS");setRegimeState(regime.current);
        } else {
          updateRegime("WIN");setRegimeState(regime.current);
        }
        dispatch({type:"CLOSE",tradeId:trade.id,closePrice,reason:hit,t:now});
      }
    }
  },[tickerData]);

  // ============================================================
  // ENTRY LOOP
  // ============================================================
  useEffect(()=>{
    if(!running)return;
    const fire=async()=>{
      if(circuitBreaker){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:"🚨 Circuit breaker"},...p.slice(0,49)]);return;}
      if(settingsRef.current.regimeBrakeEnabled&&regime.current==="NO_TRADE"){setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:`🚫 NO_TRADE regime (${regime.failureRate.toFixed(0)}% fail rate)`},...p.slice(0,49)]);return;}
      const open=new Set(tradesRef.current.openTrades.map(t=>t.ticker));
      const openCount=tradesRef.current.openTrades.length;
      const{minsFromOpen,isPreMarket}=getEST();
      // Premarket uses a tighter position cap (premarket is riskier — thin liquidity, wide spreads).
      // RTH uses the normal maxOpenTrades.
      const effectiveMaxOpen=isPreMarket?(settingsRef.current.preMarketMaxPositions||2):settingsRef.current.maxOpenTrades;
      if(openCount>=effectiveMaxOpen){return;}
      const balance=tradesRef.current.balance;
      const s=settingsRef.current;

      // Score all tickers, sort by score, take top candidates
      const allScored=allTickersRef.current
        .filter(t=>!open.has(t))
        .map(t=>({ticker:t,score:scoreTickker(t,s)}))
        .sort((a,b)=>b.score-a.score);
      const scored=allScored.filter(t=>t.score>=s.minScore).slice(0,5);

      // 🔍 DIAGNOSTIC: log which tickers fire() is actually considering
      if(allScored.length>0&&scored.length===0){
        const top=allScored.slice(0,3).map(t=>`${t.ticker}:${t.score}`).join(", ");
        setScanLog(p=>[{t:nowIso(),ticker:"ALL",reason:`🔍 No tickers ≥ minScore ${s.minScore}. Top 3: ${top}`},...p.slice(0,49)]);
      } else if(scored.length>0){
        const list=scored.map(t=>`${t.ticker}:${t.score}`).join(", ");
        setScanLog(p=>[{t:nowIso(),ticker:"🔍 FIRE",reason:`Considering: ${list}`},...p.slice(0,49)]);
      }

      // ⭐ QUALITY DIAGNOSTIC: every ~6 scans (90s), show why top candidates aren't passing quality.
      // Helps diagnose whether quality is too strict or whether data dependencies are missing.
      if(s.qualitySetupEnabled&&minsFromOpen>=(s.qualityWindowStartMins||15)&&minsFromOpen<=(s.qualityWindowEndMins||60)){
        qualityDiagCounter.current=(qualityDiagCounter.current||0)+1;
        if(qualityDiagCounter.current%6===0){
          // Find top 2 candidates by RVOL that aren't qualifying, surface their reasons
          const topByRvol=allScored.slice(0,5).map(t=>({ticker:t.ticker,d:getMkt(t.ticker)})).filter(x=>x.d.rvol>=5).slice(0,2);
          for(const{ticker,d}of topByRvol){
            const reason=d.lastQualityFail||"no diagnostic yet";
            setScanLog(p=>[{t:nowIso(),ticker:`⭐ ${ticker}`,reason:`QUALITY fail: ${reason}`},...p.slice(0,49)]);
          }
        }
      }

      for(const {ticker} of scored){
        const check=checkEntry(ticker,s);
        if(!check.pass){
          setScanLog(p=>[{t:nowIso(),ticker,reason:check.reason},...p.slice(0,49)]);
          continue;
        }
        const d=getMkt(ticker);
        // snapshotPx = price seen when the entry decision was made. We use this to size and
        // pre-compute SL, but the ACTUAL fill price from Alpaca will replace `px` after the
        // order fills. Keep snapshotPx around so we can log the slippage.
        const snapshotPx=d.price;
        let px=snapshotPx;
        if(!px){
          setScanLog(p=>[{t:nowIso(),ticker,reason:`🔍 No price data (px=${px})`},...p.slice(0,49)]);
          continue;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // PHANTOM-PRINT GUARD — reject bad ticks before they become trades.
        // Thin premarket feeds (IEX) intermittently emit stale/phantom prints far from the
        // real market. Example: WCT real price $2.13 but a phantom $2.56 tick triggered an
        // entry with a stop ABOVE entry and a fake +20% exit. We catch this by comparing the
        // trigger price to the median of recent 1-min candle CLOSES. If the price is more than
        // maxDivergencePct away from that median, it's almost certainly a bad tick — skip.
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const recentCloses=(d.candles1m||[]).slice(-6).map(c=>c.close).filter(c=>c>0);
        if(recentCloses.length>=3){
          const sorted=[...recentCloses].sort((a,b)=>a-b);
          const medianClose=sorted[Math.floor(sorted.length/2)];
          const divergence=Math.abs((px-medianClose)/medianClose)*100;
          const onSip=(DATA_FEED==="sip");
          // SIP is the consolidated tape — real prints are trustworthy, so we tolerate much larger
          // jumps (real verticals like RMSG/FOXX move 15-25% in a candle). The tell for a TRUE
          // phantom on SIP is a big price jump with NO volume behind it. So on SIP we only reject
          // when the jump is large AND the recent candle volume is negligible.
          // On IEX (partial/stale feed), keep the original tight thresholds — phantoms are common.
          const maxDivergencePct=onSip?(isPreMarket?30:25):(isPreMarket?12:8);
          // Volume confirmation: is the latest candle backed by real volume?
          const lastVol=(d.candles1m&&d.candles1m.length)?(d.candles1m[d.candles1m.length-1].volume||0):0;
          const volumeConfirmed=lastVol>0;
          // On SIP, a large divergence WITH volume is a real move — let it through.
          const isPhantom=divergence>maxDivergencePct&&(!onSip||!volumeConfirmed);
          if(isPhantom){
            setScanLog(p=>[{t:nowIso(),ticker,reason:`🚫 Phantom-print guard: $${px.toFixed(2)} is ${divergence.toFixed(0)}% off recent median $${medianClose.toFixed(2)}${onSip?" w/ no volume":""} — bad tick, skipping`},...p.slice(0,49)]);
            continue;
          }
        }

        // STOP LOSS — compute FIRST, before sizing, because sizing depends on SL distance.
        // Structural SL is anchored to VWAP/swing low instead of arbitrary %.
        // NOTE: this initial calc uses snapshotPx; after fill we re-calc with the real price.
        let sl;
        if(s.structuralSlEnabled){
          sl=calcStructuralSL(px,d.vwap,d.candles1m,{
            vwapBufferPct:s.structuralSlVwapBufferPct,
            swingLookback:s.structuralSlSwingLookback,
            swingBufferPct:s.structuralSlSwingBufferPct,
            maxSlPct:s.structuralSlMaxPct,
            minSlPct:s.structuralSlMinPct,
          });
        } else {
          sl=px*(1-(s.slPct/100));
        }
        let actualSlPct=((px-sl)/px)*100;
        let tp=px*(1+(s.tpFinalPct/100));

        // Risk-based position sizing — uses ACTUAL SL distance, not the fixed setting.
        // This guarantees we never risk more than riskPct% of balance per trade,
        // even when structural SL placed the stop wider than the fixed 1.5%.
        const riskAmt=balance*(s.riskPct/100)*getRegimeMultiplier();
        const slDist=px-sl; // dollars per share at risk
        const calcSize=slDist>0?(riskAmt/slDist)*px:s.maxTradeSize;
        const size=Math.min(calcSize,s.maxTradeSize,balance*0.05);
        if(size<10){
          setScanLog(p=>[{t:nowIso(),ticker,reason:`🔍 Size too small: $${size.toFixed(2)} (need ≥$10)`},...p.slice(0,49)]);
          continue;
        }

        setSignals(prev=>[{id:`${ticker}-${Date.now()}`,ticker,direction:"LONG",entry:px,tp,sl,tpPct:s.tpFinalPct,slPct:s.slPct,size,rvol:d.rvol,gapPct:d.gapPct,rsi:calcRSI(d.priceHistory),vwap:d.vwap,ema9:d.ema9,strategy:check.strategy,score:check.score,rr:((tp-px)/(px-sl)),createdAt:nowIso()},...prev].slice(0,50));

        let alpacaOrderId=null;
        // Compute share quantity up-front — used by both Alpaca orders and the OPEN dispatch
        // (originalShares field). Must be declared at this scope, not inside the if-block,
        // or the OPEN dispatch below throws ReferenceError in simulated/disconnected mode.
        const qty=Math.max(1,Math.floor(size/px));
        if(modeRef.current==="alpaca"&&connStatus.state==="connected"){
          try{
            // Use whole-share quantity for all orders. Notional/fractional orders are rejected by
            // Alpaca for non-fractionable assets (most small-caps: MNTS, BRTX, etc). Whole-share
            // orders work universally. Slight precision loss (<1% of position size) is acceptable.
            // Premarket REQUIRES limit orders with extended_hours — Alpaca rejects market orders
            // outside RTH. Limit price sits slightly above current price to improve fill odds.
            let body;
            if(check.strategy==="PRE"){
              const limitPrice=+(px*(1+(s.preMarketLimitBufferPct||0.5)/100)).toFixed(2);
              body={symbol:ticker,qty:String(qty),side:"buy",type:"limit",limit_price:String(limitPrice),time_in_force:"day",extended_hours:true};
            } else {
              body={symbol:ticker,qty:String(qty),side:"buy",type:"market",time_in_force:"day"};
            }
            // Cancel any leftover/pending orders on this symbol FIRST. A stale order from a
            // previous attempt (or a prior position's order) causes Alpaca to reject the new buy
            // with 403 "opposite side market/stop order exists" — which is exactly what blocked
            // the SELX entry. Clearing first lets the legitimate entry go through.
            await cancelOrdersForTicker(ticker,credsRef.current);
            const order=await aPost("/v2/orders",body,credsRef.current);
            alpacaOrderId=order.id;
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // CRITICAL: poll Alpaca for the ACTUAL fill price (filled_avg_price).
            // Market orders rarely fill at the snapshot price the bot saw moments ago —
            // slippage, spread, and order-book depth all shift the fill. Using the
            // snapshot as our "entry" makes every downstream calculation wrong (SL, TP,
            // stage triggers, P&L, position size). This wait is non-blocking from the
            // user's perspective (they don't see the bot pause — the bot is async).
            // Premarket LIMIT orders may not fill at all — they wait for the market to come
            // to the price. So premarket gets a longer timeout, and if it doesn't fill we
